<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=0.5, maximum-scale=5, user-scalable=yes, viewport-fit=cover, interactive-widget=resizes-content">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#111111">
<title>ホームランチャー</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root{
    --bg:#ffffff;
    --card:rgba(255,255,255,.9);
    --card-solid:#ffffff;
    --card2:#f0f0f0;
    --text:#111111;
    --sub:#666666;
    --accent:#111111;
    --accent2:#111111;
    --border:#dddddd;
  }
  body.dark{
    --bg:#111111;
    --card:rgba(30,30,30,.9);
    --card-solid:#1e1e1e;
    --card2:#2a2a2a;
    --text:#ffffff;
    --sub:#aaaaaa;
    --border:#333333;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:"Hiragino Sans","Noto Sans JP",sans-serif;
    overflow:hidden;
  }
  .pager{
    position:relative;
    width:100%;height:100%;
    overflow:hidden;
  }
  .pager-inner{
    width:100%;
    height:100%;
  }
  .page{
    width:100%;
    height:100%;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 56px) 0;
  }
  .wrap{max-width:none;}

  /* page dots */
  /* feed page header */
  .page-header{
    display:flex;align-items:center;justify-content:space-between;
    margin:14px 0 14px;
  }
  .page-header h2{font-size:17px;font-weight:800;margin:0;}
  .page-icon-btn{
    background:var(--card);border:none;
    width:36px;height:36px;border-radius:50%;
    font-size:16px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 1px 4px rgba(0,0,0,.08);color:var(--text);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  }

  /* weekly weather strip — fixed above search bar, transparent on background */
  .weather-half{
    flex:0 0 65%;
    display:flex;
    align-items:center;
    gap:4px;
    padding:8px 10px;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    cursor:pointer;
    min-width:0;
  }
  .weather-half::-webkit-scrollbar{display:none;}
  .clock-half{
    flex:0 0 35%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:8px 6px;
    border-left:1px solid var(--border);
    min-width:0;
  }
  .clock-time{
    font-size:19px;font-weight:800;
    color:var(--text);
    line-height:1.1;
    letter-spacing:.02em;
    font-variant-numeric:tabular-nums;
  }
  .clock-date{
    font-size:10px;
    color:var(--text);
    opacity:.6;
    margin-top:2px;
  }
  .ws-day{
    flex:1 0 auto;
    min-width:40px;
    text-align:center;
  }
  .ws-day .ws-name{
    font-size:11px;font-weight:700;
    color:var(--text);
    margin-bottom:2px;
    opacity:.7;
  }
  .ws-day .ws-icon{font-size:18px;line-height:1;}
  .ws-day .ws-temp{
    font-size:10px;
    color:var(--text);
    opacity:.65;
    margin-top:2px;white-space:nowrap;
  }
  .ws-reload{
    background:none;border:none;
    color:var(--text);
    font-size:14px;padding:4px 6px;flex-shrink:0;opacity:.45;
  }

  /* inline weather strip at top of home (bottom bar removed; site iframes now handle weather) */

  .weather-inline{
    display:flex;
    align-items:stretch;
    gap:0;
    -webkit-user-select:none;user-select:none;
    -webkit-touch-callout:none;
    margin-bottom:4px;
  }
    position:absolute;
    z-index:30;
    background:rgba(0,0,0,.45);
    color:#fff;
    font-weight:700;
    padding:4px 9px;
    border-radius:999px;
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    font-variant-numeric:tabular-nums;
    letter-spacing:.02em;
    touch-action:none;
    cursor:grab;
    user-select:none;
    -webkit-user-select:none;
    white-space:nowrap;
  }
  .iframe-play-overlay{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.35);
    border-radius:inherit;
    font-size:40px;
    color:#fff;
    pointer-events:none;
  }
  .iframe-player{
    position:absolute;
    inset:0;
    border-radius:inherit;
    overflow:hidden;
    z-index:5;
    background:#000;
  }
  .iframe-player iframe{
    width:100%;height:100%;border:none;
  }
  .browser-clock-resize{
    position:absolute;
    right:-4px;bottom:-4px;
    width:18px;height:18px;
    background:rgba(255,255,255,.5);
    border-radius:50%;
    touch-action:none;
  }

  /* banner */
  /* feed */
  .feed-section{margin-top:18px;}
  .feed-heading{
    font-size:13px;font-weight:800;color:var(--text);
    margin-bottom:8px;display:flex;align-items:center;gap:6px;
  }
  .feed-list{display:flex;flex-direction:column;gap:10px;}
  .feed-card{
    display:block;
    background:var(--card);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 2px 6px rgba(0,0,0,.06);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  }
  .feed-thumb-img{
    width:100%;
    aspect-ratio:16/9;
    object-fit:cover;
    display:block;
  }
  .feed-link{
    display:flex;
    align-items:flex-start;
    gap:12px;
    text-decoration:none;
    color:var(--text);
    padding:14px 14px 0;
  }
  .feed-link.has-thumb{
    padding:12px 14px 0;
  }
  .feed-icon{
    width:36px;height:36px;
    border-radius:10px;
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-size:15px;font-weight:800;
    color:#fff;
  }
  .feed-card:nth-child(6n+1) .feed-icon{background:#ec4464;}
  .feed-card:nth-child(6n+2) .feed-icon{background:#f5a623;}
  .feed-card:nth-child(6n+3) .feed-icon{background:#4f8cff;}
  .feed-card:nth-child(6n+4) .feed-icon{background:#39b873;}
  .feed-card:nth-child(6n+5) .feed-icon{background:#9b6cf0;}
  .feed-card:nth-child(6n+6) .feed-icon{background:#30b6c9;}
  .feed-card-title{
    flex:1;
    font-size:14px;font-weight:700;line-height:1.5;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
  }
  .feed-meta-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:8px 14px 12px;
  }
  .feed-meta{font-size:11px;color:var(--sub);}
  .feed-share{
    background:none;border:none;color:var(--sub);font-size:17px;
    padding:4px 6px;flex-shrink:0;
  }
  .feed-empty{font-size:12px;color:var(--sub);padding:10px 2px;}

  /* favorites / read-later section */
  .fav-section-head{
    font-size:14px;font-weight:800;
    color:var(--text);
    margin-bottom:8px;
    padding-bottom:6px;
    border-bottom:2px solid var(--accent);
    opacity:.85;
  }
  .read-later-add{
    display:flex;gap:8px;
    margin-top:12px;
  }
  .read-later-add input{
    flex:1;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 12px;
    color:var(--text);
    font-size:14px;
  }
  .read-later-add button{
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:10px;
    padding:10px 14px;
    font-size:14px;font-weight:700;
    flex-shrink:0;
  }


  /* divider */
  .divider{
    height:4px;
    background:var(--accent);
    border-radius:2px;
    margin:14px 0 16px;
    opacity:.85;
  }

  /* section tabs (大カテゴリ) */
  .section-tabs{
    display:flex;
    gap:0;
    margin:8px 0 12px;
    background:linear-gradient(135deg,#1a1a1a 0%,#444444 50%,#111111 100%);
    border-radius:16px;
    padding:6px;
    box-shadow:0 4px 12px rgba(0,0,0,.3);
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
  }
  .section-tabs::-webkit-scrollbar{display:none;}
  .section-tab{
    flex:1;
    min-width:70px;
    padding:10px 8px;
    border-radius:11px;
    border:none;
    background:transparent;
    color:rgba(255,255,255,.7);
    font-size:13px;font-weight:800;
    transition:background .15s, color .15s, transform .15s;
    white-space:nowrap;
    letter-spacing:.01em;
  }
  .section-tab.active{
    background:rgba(255,255,255,.2);
    color:#fff;
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    box-shadow:0 2px 8px rgba(0,0,0,.3);
  }
  .section-tab:not(.active):active{
    background:rgba(255,255,255,.1);
  }
  .section-tab-actions{
    display:flex;align-items:center;gap:2px;
    margin-left:auto;flex-shrink:0;
  }
  .stab-btn{
    width:32px;height:32px;border-radius:50%;
    border:none;background:transparent;
    color:rgba(255,255,255,.8);font-size:15px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .stab-btn:active{background:rgba(255,255,255,.2);}
  .stab-btn-sm{
    width:26px;height:26px;font-size:13px;
    background:transparent;color:var(--text);
  }
  .stab-btn-sm:active{background:var(--card2);}
  .sec-header{
    display:flex;justify-content:flex-end;
    margin-bottom:8px;
  }
  /* search modal */
  .search-modal{
    position:fixed;inset:0;
    background:var(--bg);
    z-index:60;
    display:flex;flex-direction:column;
  }
  .search-modal-bar{
    display:flex;align-items:center;gap:8px;
    padding:10px 12px;
    padding-top:calc(env(safe-area-inset-top) + 10px);
    background:var(--card);
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  .search-modal-back{
    background:none;border:none;color:var(--text);font-size:20px;padding:4px 6px;flex-shrink:0;
  }
  .search-modal-input-wrap{
    flex:1;background:var(--card2);border-radius:10px;
    display:flex;align-items:center;padding:0 12px;height:38px;
  }
  .search-modal-input-wrap input{
    flex:1;border:none;background:transparent;
    color:var(--text);font-size:15px;outline:none;
  }
  .search-modal-go{
    background:var(--accent);color:#fff;border:none;
    border-radius:10px;padding:8px 12px;font-size:16px;flex-shrink:0;
  }
  .search-modal-body{
    flex:1;overflow-y:auto;padding:12px 14px;
  }
  .search-trend-head{
    font-size:12px;font-weight:800;color:var(--sub);
    margin:4px 0 8px;letter-spacing:.04em;
  }
  .trend-list{display:flex;flex-direction:column;gap:2px;}
  .trend-item{
    display:flex;align-items:center;gap:12px;
    padding:11px 14px;
    border-radius:10px;
    background:var(--card);
    color:var(--text);font-size:14px;
    cursor:pointer;
  }
  .trend-item:active{background:var(--card2);}
  .trend-item .trend-icon{font-size:16px;flex-shrink:0;width:22px;text-align:center;}
  .trend-item .trend-text{flex:1;}

  /* fixed bottom search bar */
  .search-bar-fixed{
    position:fixed;
    bottom:0;
    left:0;right:0;
    z-index:40;
    transition:bottom .15s;
    background:transparent;
    padding:8px 14px calc(env(safe-area-inset-bottom) + 10px);
  }
  .suggest-list{
    position:absolute;
    bottom:calc(100% + 8px);
    left:14px;right:14px;
    background:var(--card);
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 -4px 20px rgba(0,0,0,.18);
    display:none;
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    max-height:280px;
    overflow-y:auto;
  }
  .suggest-list .item{
    display:flex;align-items:center;gap:12px;
    padding:12px 18px;
    font-size:14px;
    border-bottom:1px solid var(--border);
    color:var(--text);
  }
  .suggest-list .item:last-child{border-bottom:none;}
  .suggest-list .item:active{background:var(--card2);}
  .suggest-list .item::before{content:'🔍';font-size:12px;opacity:.45;}
  /* gradient border wrapper */
  .search-box-wrap{
    background:linear-gradient(135deg,#ff6b8a 0%,#a855f7 50%,#3b82f6 100%);
    border-radius:999px;
    padding:2px;
    box-shadow:0 4px 14px rgba(168,85,247,.3);
  }
  .search-box{
    display:flex;
    align-items:center;
    background:var(--card);
    border-radius:999px;
    padding:6px 6px 6px 16px;
    border:none;
  }
  .search-g-logo{
    font-size:17px;font-weight:900;
    margin-right:4px;flex-shrink:0;
    background:linear-gradient(135deg,#ff6b8a,#a855f7,#3b82f6);
    -webkit-background-clip:text;background-clip:text;
    color:transparent;
  }
  .search-box input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:var(--text);
    font-size:16px;
    padding:10px 0;
  }
  .search-box input::placeholder{color:var(--sub);}
  .search-box button{
    background:linear-gradient(135deg,#ff6b8a,#a855f7,#3b82f6);
    color:#fff;
    border:none;
    border-radius:999px;
    width:42px;height:42px;
    font-size:18px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }

  /* extra bottom padding on home page so links aren't hidden behind search bar */
  #secHome{ transition: background 0.3s ease; border-radius: 12px; }


  /* app grid */
  .grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
    padding:0 10px;
  }
  .app-card{
    position:relative;
    background:var(--card);
    border-radius:16px;
    padding:10px 6px 8px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-decoration:none;
    color:var(--text);
    box-shadow:0 2px 8px rgba(0,0,0,.06);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  }
  .app-card .ic{
    width:56px;height:56px;
    border-radius:14px;
    overflow:hidden;
    background:var(--card2);
    display:flex;align-items:center;justify-content:center;
    margin-bottom:6px;
    font-size:24px;
    font-weight:700;
    color:var(--accent);
  }
  .app-card:nth-child(6n+1) .ic{background:#ffe1e6;}
  .app-card:nth-child(6n+2) .ic{background:#fff4d6;}
  .app-card:nth-child(6n+3) .ic{background:#e1ecff;}
  .app-card:nth-child(6n+4) .ic{background:#e1f7e8;}
  .app-card:nth-child(6n+5) .ic{background:#f0e6ff;}
  .app-card:nth-child(6n+6) .ic{background:#e6f7ff;}
  .app-card .ic img{width:100%;height:100%;object-fit:cover;display:block;}
  .app-card .name{
    font-size:12px;
    font-weight:700;
    text-align:center;
    line-height:1.3;
    word-break:break-all;
    max-width:100%;
  }
  .app-card .edit-btn{
    position:absolute;
    top:4px;right:4px;
    width:24px;height:24px;
    border-radius:50%;
    background:rgba(0,0,0,.25);
    border:none;
    color:#fff;
    font-size:12px;
    display:flex;align-items:center;justify-content:center;
  }
  .add-card{
    background:transparent;
    border:2px dashed var(--border);
    color:var(--sub);
    box-shadow:none;
    backdrop-filter:none;-webkit-backdrop-filter:none;
  }
  .add-card .ic{background:transparent;font-size:28px;color:var(--sub);}

  /* category tabs */
  .category-tabs{
    display:none;
    grid-template-columns:repeat(4, 1fr);
    gap:6px;
    max-height:82px;
    overflow-y:auto;
    margin-top:6px;
    padding-bottom:4px;
    padding-left:8px;
    padding-right:8px;
  }
  .category-tab{
    width:100%;
    height:36px;
    padding:0 6px;
    display:flex;align-items:center;justify-content:center;
    border-radius:10px;
    border:1.5px solid var(--border);
    background:var(--card2);
    color:var(--text);
    font-size:12px;font-weight:700;
    letter-spacing:.01em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    transition:background .15s, color .15s, border-color .15s;
  }
  .category-tab.active{
    background:var(--text);
    color:var(--bg);
    border-color:var(--text);
  }
  .category-tab-add{
    background:transparent!important;
    color:var(--sub);
    border:1.5px dashed var(--border)!important;
    border-radius:10px;
    font-size:18px;
    padding:0;
  }
  .category-order-list{
    display:flex;flex-direction:column;gap:6px;margin-top:6px;
  }
  .category-order-item{
    display:flex;flex-direction:column;align-items:stretch;gap:6px;
    background:var(--card2);
    border-radius:10px;
    padding:8px 12px;
    font-size:13px;
    color:var(--text);
  }
  .category-order-item-top{display:flex;align-items:center;justify-content:space-between;}
  .category-order-item .order-btns{display:flex;gap:4px;}
  .category-order-item button{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:8px;
    width:30px;height:30px;
    font-size:13px;
    color:var(--text);
  }
  .category-order-item button:disabled{opacity:.35;}
  .category-order-empty{font-size:12px;color:var(--sub);padding:4px 2px;}

  /* wide banner links */
  .layout-toggle{
    display:flex;gap:8px;margin-top:6px;
  }
  .layout-btn{
    flex:1;
    padding:10px 6px;
    border-radius:10px;
    border:1.5px solid var(--border);
    background:var(--card2);
    color:var(--sub);
    font-size:13px;font-weight:700;
  }
  .layout-btn.active{
    border-color:var(--accent);
    color:var(--accent);
  }
  .banner-links{
    display:flex;flex-direction:column;gap:12px;
    margin-top:14px;
    padding:0 10px;
  }
  .banner-links .square-row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
  }
  .banner-link-card{
    position:relative;
    display:block;
    aspect-ratio:3/1;
    border-radius:14px;
    overflow:hidden;
    background:var(--card);
    box-shadow:0 2px 8px rgba(0,0,0,.06);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  }
  .banner-link-card.square{
    aspect-ratio:1/1;
  }
  .banner-link-card.tall{
    aspect-ratio:3/2;
  }
  .banner-link-card.square .banner-link-title{
    font-size:11px;
    white-space:normal;
    overflow:visible;
    text-overflow:unset;
    border-radius:8px;
    max-width:100%;
    line-height:1.4;
    display:block;
  }
  .banner-link-card.square .banner-link-overlay{
    background:linear-gradient(to top, rgba(0,0,0,.7) 0%, rgba(0,0,0,.2) 60%, rgba(0,0,0,0) 100%);
    padding:8px 8px;
    align-items:flex-end;
  }
  .banner-link-card img{
    width:100%;height:100%;object-fit:cover;display:block;
    pointer-events:none;
    -webkit-user-select:none;user-select:none;
    -webkit-touch-callout:none;
  }
  .banner-link-card{
    -webkit-touch-callout:none;
    -webkit-user-select:none;
    user-select:none;
  }
  .banner-link-overlay{
    position:absolute;inset:0;
    display:flex;align-items:flex-end;
    padding:10px 10px;
    background:linear-gradient(to top, rgba(0,0,0,.55), rgba(0,0,0,0) 50%);
    pointer-events:none;
  }
  .banner-link-title{
    display:inline-block;
    color:#fff;
    font-size:13px;font-weight:800;
    letter-spacing:.03em;
    background:rgba(0,0,0,.52);
    backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
    padding:4px 10px;
    border-radius:999px;
    max-width:calc(100% - 36px);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  /* drag mode */
  .banner-links.drag-mode .banner-link-card{
    cursor:grab;
    transition:transform .15s, opacity .15s, box-shadow .15s;
  }
  .banner-link-card.dragging{
    opacity:.6;
    transform:scale(.96);
    box-shadow:0 8px 24px rgba(0,0,0,.25)!important;
  }

const SB_URL = 'https://lttrqfbwhyktypddgtpn.supabase.co';

const SB_HEADERS = { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };

/* keys to sync to cloud (heavy image data stays local) */
const CLOUD_SYNC_KEYS = [
  'launcherApps', 'launcherFeeds', 'launcherBannerLinks',
  'launcherBannerCategory', 'launcherCategoryOrder',
  'launcherBrowserTabs', 'launcherFavorites', 'launcherReadLater',
  'launcherTheme', 'launcherBackground', 'launcherBanner',
  'launcherBrowserHistory',
  'launcherCategoryUrls', 'launcherStartupCategory', 'launcherIframeBookmarks', 'launcherIframeBookmarksSecret', 'launcherBookmarkTabName'
];

let syncDebounceTimer = null;
/* guards against pushing a half-empty local state to the cloud before the
   initial cloud restore has finished (this caused real data loss once) */
let cloudRestoreDone = false;
let pendingSaveAfterRestore = false;

async function sbSet(key, value){
  try{
    await fetch(SB_URL + '/rest/v1/launcher_data', {
      method: 'POST',
      headers: { ...SB_HEADERS, 'Prefer': 'resolution=merge-duplicates' },
      body: JSON.stringify({ key, value, updated_at: new Date().toISOString() })
    });
  }catch(e){}
}

async function sbGet(key){
  try{
    const res = await fetch(SB_URL + '/rest/v1/launcher_data?key=eq.' + encodeURIComponent(key) + '&select=value', {
      headers: SB_HEADERS
    });
    const data = await res.json();
    return data && data[0] ? data[0].value : null;
  }catch(e){ return null; }
}

async function cloudSaveAll(){
  const promises = CLOUD_SYNC_KEYS.map(function(key){
    const val = localStorage.getItem(key);
    if(val !== null) return sbSet(key, val);
  }).filter(Boolean);
  await Promise.all(promises);
  localStorage.setItem(SB_LAST_SYNC_KEY, new Date().toISOString());
}

const SB_LAST_SYNC_KEY = 'launcherLastCloudSync';

async function cloudLoadAll(){
  const indicator = document.getElementById('syncIndicator');
  if(indicator) indicator.textContent = '☁️ 同期中...';
  try{
    const res = await fetch(SB_URL + '/rest/v1/launcher_data?key=in.(' + CLOUD_SYNC_KEYS.map(function(k){ return '"' + k + '"'; }).join(',') + ')&select=key,value,updated_at', {
      headers: SB_HEADERS
    });
    const data = await res.json();
    if(Array.isArray(data) && data.length){
      const lastSync = localStorage.getItem(SB_LAST_SYNC_KEY);
      data.forEach(function(row){
        if(row.value === null) return;
        /* only overwrite if cloud is newer than last sync */
        /* if user changed locally after last sync, keep local */
        if(!lastSync){
          /* first time: load everything from cloud */
          localStorage.setItem(row.key, row.value);
        }else{
          const cloudTime = new Date(row.updated_at).getTime();
          const syncTime = new Date(lastSync).getTime();
          if(cloudTime > syncTime){
            /* cloud updated after our last sync → use cloud */
            localStorage.setItem(row.key, row.value);
          }
          /* else: local is newer, keep local */
        }
      });
      localStorage.setItem(SB_LAST_SYNC_KEY, new Date().toISOString());
      if(indicator) indicator.textContent = '✓ 同期済み';
      setTimeout(function(){ if(indicator) indicator.textContent = ''; }, 2000);
      cloudRestoreDone = true;
      if(pendingSaveAfterRestore){ pendingSaveAfterRestore = false; schedulCloudSave(); }
      return true;
    }
  }catch(e){}
  if(indicator) indicator.textContent = '';
  cloudRestoreDone = true;
  if(pendingSaveAfterRestore){ pendingSaveAfterRestore = false; schedulCloudSave(); }
  return false;
}

/* debounced save — waits 2s after last change before saving.
   Before the initial cloud restore finishes, changes are queued instead of
   pushed immediately, so a fresh/empty local state can never overwrite the
   real cloud backup. */
function schedulCloudSave(){
  if(!cloudRestoreDone){
    pendingSaveAfterRestore = true;
    return;
  }
  clearTimeout(syncDebounceTimer);
  syncDebounceTimer = setTimeout(cloudSaveAll, 2000);
}

/* patch localStorage.setItem to auto-sync on changes */
const _origSetItem = localStorage.setItem.bind(localStorage);
localStorage.setItem = function(key, value){
  _origSetItem(key, value);
  if(CLOUD_SYNC_KEYS.indexOf(key) !== -1) schedulCloudSave();
};

  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){
      const size = 192;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const scale = Math.max(size/img.width, size/img.height);
      const w = img.width*scale, h = img.height*scale;
      ctx.drawImage(img, (size-w)/2, (size-h)/2, w, h);
      pickedIcon = canvas.toDataURL('image/png');
      showPreview(pickedIcon, appNameInput.value);
    };
    img.src = ev.target.result;
  };

  const frameWrap = document.getElementById('bookmarkViewerFrameWrap');

const bookmarkThumbFetching = {};

function fetchAndCacheBookmarkThumb(bm, onDone){
  if(bm.image || bookmarkThumbFetching[bm.id]) return;
  bookmarkThumbFetching[bm.id] = true;
  fetchLinkMeta(bm.url).then(function(meta){
    delete bookmarkThumbFetching[bm.id];
    if(meta && meta.image){
      const all = loadIframeBookmarks();
      const target = all.find(function(b){ return b.id === bm.id; });
      if(target){
        target.image = meta.image;
        saveIframeBookmarks(all);
        if(onDone) onDone(meta.image);
      }
    }
  }).catch(function(){ delete bookmarkThumbFetching[bm.id]; });
}

function moveBookmark(bm, dir){
  const all = loadIframeBookmarks();
  const idx = all.findIndex(function(b){ return b.id === bm.id; });
  if(idx === -1) return;
  const newIdx = idx + dir;
  if(newIdx < 0 || newIdx >= all.length) return;
  const tmp = all[idx];
  all[idx] = all[newIdx];
  all[newIdx] = tmp;
  saveIframeBookmarks(all);
}

function buildBookmarkCard(bm, opts){
  const card = document.createElement('div');
  card.className = 'bm-card';

  const thumb = document.createElement('div');
  thumb.className = 'bm-card-thumb';
  if(bm.image){
    const img = document.createElement('img');
    img.src = bm.image;
    thumb.appendChild(img);
  }else{
    fetchAndCacheBookmarkThumb(bm, function(imgUrl){
      const img = document.createElement('img');
      img.src = imgUrl;
      thumb.insertBefore(img, thumb.firstChild);
    });
  }
  const overlay = document.createElement('div');
  overlay.className = 'bm-card-overlay';
  const title = document.createElement('div');
  title.className = 'bm-card-title';
  title.textContent = bm.title || bm.url;
  overlay.appendChild(title);
  thumb.appendChild(overlay);

  if(opts && opts.showDelete){
    const del = document.createElement('button');
    del.className = 'bm-card-del';
    del.textContent = '✕';
    del.addEventListener('click', function(e){
      e.stopPropagation();
      const all = loadIframeBookmarks().filter(function(b){ return b.id !== bm.id; });
      saveIframeBookmarks(all);
      if(opts.onDelete) opts.onDelete();
    });
    thumb.appendChild(del);
  }

  const urlEl = document.createElement('div');
  urlEl.className = 'bm-card-url';
  urlEl.textContent = bm.url;

  const btns = document.createElement('div');
  btns.className = 'bm-card-btns';

  if(opts && opts.showReorder){
    const upBtn = document.createElement('button');
    upBtn.textContent = '▲';
    upBtn.disabled = !!opts.isFirst;
    upBtn.style.flex = '0 0 34px';
    upBtn.addEventListener('click', function(e){
      e.stopPropagation();
      moveBookmark(bm, -1);
      if(opts.onReorder) opts.onReorder();
    });
    const downBtn = document.createElement('button');
    downBtn.textContent = '▼';
    downBtn.disabled = !!opts.isLast;
    downBtn.style.flex = '0 0 34px';
    downBtn.addEventListener('click', function(e){
      e.stopPropagation();
      moveBookmark(bm, 1);
      if(opts.onReorder) opts.onReorder();
    });
    btns.appendChild(upBtn);
    btns.appendChild(downBtn);
  }

  const internalBtn = document.createElement('button');
  internalBtn.textContent = '📱 内部';
  internalBtn.addEventListener('click', function(){ opts && opts.onInternal ? opts.onInternal() : openBookmarkInFrame(bm); });
  const externalBtn = document.createElement('button');
  externalBtn.textContent = '🌐 外部';
  externalBtn.addEventListener('click', function(){ window.open(bm.url, '_blank'); });
  btns.appendChild(internalBtn);
  btns.appendChild(externalBtn);

  card.appendChild(thumb);
  card.appendChild(urlEl);
  card.appendChild(btns);
  return card;
}

  Object.keys(bookmarkIframes).forEach(function(id){
    bookmarkIframes[id].style.display = 'none';
  });

  /* opening a bookmark from the list always resets it back to the saved URL,
     discarding any deeper navigation from a previous viewing session —
     that's the whole point of a bookmark being a fixed reference point */
  let iframe = bookmarkIframes[bm.id];
  if(iframe) iframe.remove();
  iframe = document.createElement('iframe');
  iframe.style.cssText = 'width:100%;height:100%;border:none;position:absolute;top:0;left:0;';

  iframe.style.display = 'block';

/* navigation helpers: history.back()/forward() are allowed cross-origin by spec
   (they don't leak any info, just move the joint session history), so these work
   even for sites like netkeiba. reload() is same-origin only, so it falls back
   to resetting the iframe's src when the page is cross-origin. */
function navIframeBack(iframe){
  if(!iframe) return;
  try{ iframe.contentWindow.history.back(); }catch(e){}
}
function navIframeForward(iframe){
  if(!iframe) return;
  try{ iframe.contentWindow.history.forward(); }catch(e){}
}
function navIframeReload(iframe){
  if(!iframe) return;
  try{ iframe.contentWindow.location.reload(); }
  catch(e){ iframe.src = iframe.src; }
}

/* ---- manual zoom (transform-based, since native pinch-zoom in installed
   PWAs can't reliably zoom below 100% on some browsers) ---- */
function applyIframeZoom(iframe, factor){
  if(!iframe) return;
  iframe.style.transformOrigin = 'top left';
  iframe.style.transform = 'scale(' + factor + ')';
  iframe.style.width = (100 / factor) + '%';
  iframe.style.height = (100 / factor) + '%';
}

const categoryIframeZoom = {};
function getCategoryZoom(cat){ return categoryIframeZoom[cat] || 1; }
function setCategoryZoom(cat, val){
  val = Math.max(0.5, Math.min(1.5, Math.round(val * 10) / 10));
  categoryIframeZoom[cat] = val;
  applyIframeZoom(categoryIframes[cat], val);
  const label = document.getElementById('categoryIframeZoomLabel');
  if(label && cat === currentCategory) label.textContent = Math.round(val * 100) + '%';
}

function updateCategoryIframe(){
  const wrap = document.getElementById('categoryIframeWrap');
  const container = document.getElementById('categoryIframeContainer');
  const extBtn = document.getElementById('categoryIframeExternalBtn');
  const bookmarkBtn = document.getElementById('categoryIframeBookmarkBtn');
  if(!wrap || !container) return;
  const url = getCategoryUrl(currentCategory);

  /* hide every cached iframe first */
  Object.keys(categoryIframes).forEach(function(cat){
    categoryIframes[cat].style.display = 'none';
  });

  if(url){
    wrap.style.display = 'flex';
    linksContainer.style.display = 'none';
    if(extBtn) extBtn.style.display = 'flex';
    if(bookmarkBtn) bookmarkBtn.style.display = 'flex';

    let iframe = categoryIframes[currentCategory];
    if(!iframe){
      iframe = document.createElement('iframe');
      iframe.className = 'category-iframe-instance';
      iframe.style.cssText = 'width:100%;height:100%;border:none;position:absolute;top:0;left:0;';
      iframe.setAttribute('allowfullscreen', '');
      iframe.setAttribute('allow', 'clipboard-write; web-share; fullscreen');
      iframe.dataset.url = url;
      iframe.src = url;
      container.appendChild(iframe);
      categoryIframes[currentCategory] = iframe;
    }else if(iframe.dataset.url !== url){
      /* the URL was changed in settings, so this cached frame is stale — reload it */
      iframe.dataset.url = url;
      iframe.src = url;
    }
    iframe.style.display = 'block';
    applyIframeZoom(iframe, getCategoryZoom(currentCategory));
    const zoomLabel = document.getElementById('categoryIframeZoomLabel');
    if(zoomLabel) zoomLabel.textContent = Math.round(getCategoryZoom(currentCategory) * 100) + '%';

    /* scroll to top so height calculation is based on the wrap's resting position */
    const page = document.getElementById('pageHome');
    if(page) page.scrollTop = 0;
    requestAnimationFrame(resizeCategoryIframe);
    setTimeout(resizeCategoryIframe, 150);
  }else{
    wrap.style.display = 'none';
    linksContainer.style.display = '';
    if(extBtn) extBtn.style.display = 'none';
    if(bookmarkBtn) bookmarkBtn.style.display = 'none';
  }
}

function loadBannerLinks(){
  const raw = localStorage.getItem(LINKS_KEY);
  if(!raw) return [];
  try{
    const arr = JSON.parse(raw);
    if(Array.isArray(arr)) return arr;
  }catch(e){}
  return [];
}
function saveBannerLinks(){
  try{
    localStorage.setItem(LINKS_KEY, JSON.stringify(bannerLinks));
    return true;
  }catch(e){
    alert('保存に失敗しました。端末の保存容量がいっぱいの可能性があります。⚙️設定の「使用容量」を確認し、不要な画像を減らすか書き出し(バックアップ)してから整理してください。');
    return false;
  }
}

function getCategoryList(){
  const set = new Set();
  let hasUncategorized = false;
  bannerLinks.forEach(function(item){
    if(item.category && item.category.trim()){
      set.add(item.category.trim());
    }else{
      hasUncategorized = true;
    }
  });
  const cats = Array.from(set);
  if(hasUncategorized) cats.push('未分類');
  return cats;
}

function getOrderedCategories(){
  const cats = getCategoryList();
  if(cats.indexOf(BOOKMARK_TAB) === -1) cats.push(BOOKMARK_TAB);
  let order = [];
  try{
    const raw = localStorage.getItem(CATEGORY_ORDER_KEY);
    if(raw) order = JSON.parse(raw);
    if(!Array.isArray(order)) order = [];
  }catch(e){ order = []; }

  const ordered = order.filter(function(c){ return cats.indexOf(c) !== -1; });
  cats.forEach(function(c){
    if(ordered.indexOf(c) === -1) ordered.push(c);
  });
  if(JSON.stringify(ordered) !== JSON.stringify(order)){
    localStorage.setItem(CATEGORY_ORDER_KEY, JSON.stringify(ordered));
  }
  return ordered;
}

function renderCategoryTabs(){
  const cats = getOrderedCategories();
  categoryTabsEl.innerHTML = '';
  categoryTabsEl.style.display = 'grid';

  /* the bookmark tab is always kept visible regardless of secret mode
     (each mode has its own separate bookmark store), but otherwise behaves
     just like a normal category now — renameable and reorderable */
  const visible = cats.filter(function(cat){
    if(cat === BOOKMARK_TAB) return true;
    return secretMode ? isSecretCategory(cat) : !isSecretCategory(cat);
  });

  if(visible.length){
    /* always start from first category (unless the bookmark viewer tab is active) */
    if(currentCategory !== BOOKMARK_TAB && visible.indexOf(currentCategory) === -1){
      currentCategory = visible[0];
      localStorage.setItem(CATEGORY_KEY, currentCategory);
    }
    visible.forEach(function(cat){
      const tab = document.createElement('button');
      tab.className = 'category-tab' + (cat === currentCategory ? ' active' : '');
      tab.textContent = cat;
      tab.addEventListener('click', function(){
        currentCategory = cat;
        localStorage.setItem(CATEGORY_KEY, currentCategory);
        renderCategoryTabs();
        renderBannerLinks();
      });
      categoryTabsEl.appendChild(tab);
    });
  }

  /* subtle add button always at end */
  const addTab = document.createElement('button');
  addTab.className = 'category-tab category-tab-add';
  addTab.textContent = '＋';
  addTab.title = 'リンクを追加';
  addTab.addEventListener('click', function(){ openLinkAdd(); });
  categoryTabsEl.appendChild(addTab);

  scrollActiveTabIntoView();
}

function scrollActiveTabIntoView(){
  const active = categoryTabsEl.querySelector('.category-tab.active');
  if(active) active.scrollIntoView({ block: 'nearest', inline: 'center' });
}

function getFilteredLinks(){
  const cats = getOrderedCategories();
  const visible = cats.filter(function(cat){
    return secretMode ? isSecretCategory(cat) : !isSecretCategory(cat);
  });
  if(!visible.length) return bannerLinks.filter(function(item){
    const cat = (item.category && item.category.trim()) || '未分類';
    return secretMode ? isSecretCategory(cat) : !isSecretCategory(cat);
  });
  return bannerLinks.filter(function(item){
    const cat = (item.category && item.category.trim()) || '未分類';
    return cat === currentCategory;
  });
}

function renameCategory(oldName, newNameRaw){
  const newName = (newNameRaw || '').trim();
  if(!newName || newName === oldName){ renderCategoryOrderList(); return; }
  const cats = getOrderedCategories();
  if(cats.indexOf(newName) !== -1){
    alert('同じ名前のカテゴリが既にあります');
    renderCategoryOrderList();
    return;
  }
  /* the bookmark tab is a special pseudo-category — just update its name variable
     (it has no real links, category URL, or iframe cache to migrate) */
  if(oldName === BOOKMARK_TAB){
    BOOKMARK_TAB = newName;
    localStorage.setItem(BOOKMARK_TAB_NAME_KEY, newName);
  }

  /* update every link's category field */
  bannerLinks.forEach(function(item){
    const c = (item.category && item.category.trim()) || '未分類';
    if(c === oldName) item.category = newName;
  });
  saveBannerLinks();

  /* update order list */
  const order = cats.map(function(c){ return c === oldName ? newName : c; });
  localStorage.setItem(CATEGORY_ORDER_KEY, JSON.stringify(order));

  /* migrate category URL (iframe) setting */
  const urls = loadCategoryUrls();
  if(Object.prototype.hasOwnProperty.call(urls, oldName)){
    urls[newName] = urls[oldName];
    delete urls[oldName];
    saveCategoryUrls(urls);
  }

  /* keep the cached iframe (and its in-page state) alive under the new name */
  if(categoryIframes[oldName]){
    categoryIframes[newName] = categoryIframes[oldName];
    delete categoryIframes[oldName];
  }

  /* keep current selected category pointing at the renamed one */
  if(currentCategory === oldName){
    currentCategory = newName;
    localStorage.setItem(CATEGORY_KEY, newName);
  }

  /* migrate the configured startup category too */
  if(localStorage.getItem(STARTUP_CATEGORY_KEY) === oldName){
    localStorage.setItem(STARTUP_CATEGORY_KEY, newName);
  }

  renderCategoryOrderList();
  renderCategoryTabs();
  renderBannerLinks();
}

function moveCategory(index, dir){
  const cats = getOrderedCategories();
  const target = index + dir;
  if(target < 0 || target >= cats.length) return;
  const tmp = cats[index];
  cats[index] = cats[target];
  cats[target] = tmp;
  localStorage.setItem(CATEGORY_ORDER_KEY, JSON.stringify(cats));
  renderCategoryOrderList();
  renderCategoryTabs();
  renderBannerLinks();
}

const LONG_PRESS_MS = 500;

function enterDragMode(){

const CATEGORY_COLORS = ['#e85d75','#f5a623','#4f8cff','#39b873','#9b6cf0','#30b6c9','#e67e3a'];

function getCategoryColor(cat){

function makeLinkCard(item){
  const card = document.createElement('div');
  card.className = 'banner-link-card' +
    (item.layout === 'square' ? ' square' : item.layout === 'tall' ? ' tall' : '');
  card.dataset.id = item.id;

  /* apply category color as subtle tint on empty card bg only */
  const cat = (item.category && item.category.trim()) || '未分類';
  const catColor = null; /* color tint disabled */

  if(item.image){
    const img = document.createElement('img');
    img.src = item.image;
    img.alt = '';
    card.appendChild(img);
  }else{
    const empty = document.createElement('div');
    empty.className = 'banner-link-empty';
    empty.textContent = item.layout === 'square' ? '＋' : '画像未設定(タップして設定)';
    if(catColor) empty.style.background = catColor + '22';
    card.appendChild(empty);
  }

  if(item.title){
    const overlay = document.createElement('div');
    overlay.className = 'banner-link-overlay';
    const titleEl = document.createElement('div');
    titleEl.className = 'banner-link-title';
    titleEl.textContent = item.title;
    overlay.appendChild(titleEl);
    card.appendChild(overlay);
  }

  const editBtn = document.createElement('button');
  editBtn.className = 'edit-btn';
  editBtn.textContent = '✏️';
  editBtn.addEventListener('touchstart', function(e){
    e.stopPropagation();
  }, {passive:true});
  editBtn.addEventListener('touchend', function(e){
    e.stopPropagation();
    e.preventDefault();
    if(dragMode){ exitDragMode(); return; }
    openLinkEdit(item.id);
  });
  editBtn.addEventListener('click', function(e){
    e.stopPropagation();
    e.preventDefault();
  });
  /* iframe play button overlay */
  if(item.iframeCode){
    const playOverlay = document.createElement('div');
    playOverlay.className = 'iframe-play-overlay';
    playOverlay.innerHTML = '▶';
    card.appendChild(playOverlay);
  }

  card.appendChild(editBtn);

  card.addEventListener('contextmenu', function(e){ e.preventDefault(); });

  /* tap = open link / long press = drag */
  let touchStartX = 0, touchStartY = 0, touchMoved = false;

  card.addEventListener('touchstart', function(e){
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchMoved = false;
    if(dragMode){
      dragSrcId = item.id;
      card.classList.add('dragging');
      return;
    }
    longPressTimer = setTimeout(function(){
      enterDragMode();
      dragSrcId = item.id;
      card.classList.add('dragging');
    }, LONG_PRESS_MS);
  }, {passive:true});

  card.addEventListener('touchmove', function(e){
    const dx = Math.abs(e.touches[0].clientX - touchStartX);
    const dy = Math.abs(e.touches[0].clientY - touchStartY);
    if(dx > 8 || dy > 8) touchMoved = true;
    clearTimeout(longPressTimer);
    if(!dragMode || dragSrcId !== item.id) return;
    e.preventDefault();
    const touch = e.touches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    const target = el && el.closest('.banner-link-card');
    if(target && target.dataset.id && target.dataset.id !== dragSrcId){
      const srcIdx = bannerLinks.findIndex(function(a){ return a.id === dragSrcId; });
      const tgtIdx = bannerLinks.findIndex(function(a){ return a.id === target.dataset.id; });
      if(srcIdx !== -1 && tgtIdx !== -1){
        const tmp = bannerLinks[srcIdx];
        bannerLinks[srcIdx] = bannerLinks[tgtIdx];
        bannerLinks[tgtIdx] = tmp;
        saveBannerLinks();
        renderBannerLinks();
      }
    }
  }, {passive:false});

  card.addEventListener('touchend', function(e){
    clearTimeout(longPressTimer);
    if(dragMode && dragSrcId === item.id){
      card.classList.remove('dragging');
      setTimeout(exitDragMode, 400);
      return;
    }
    if(!dragMode && !touchMoved){
      if(item.iframeCode){
        e.preventDefault();
        /* show iframe player inline */
        const existing = card.querySelector('.iframe-player');
        if(existing){ existing.remove(); return; }
        const player = document.createElement('div');
        player.className = 'iframe-player';
        player.innerHTML = item.iframeCode;
        /* make iframe fill the player div */
        const iframeEl = player.querySelector('iframe');
        if(iframeEl){
          iframeEl.style.width = '100%';
          iframeEl.style.height = '100%';
          iframeEl.removeAttribute('width');
          iframeEl.removeAttribute('height');
        }
        card.appendChild(player);
        /* close on tap outside player */
        player.addEventListener('click', function(ev){ ev.stopPropagation(); });
      }else if(item.url){
        if(item.browser === 'external'){
          e.preventDefault();
          window.open(item.url, '_blank');
        }else if(item.browser === 'direct'){
          e.preventDefault();
          try{
            const intentUrl = 'intent://' + item.url.replace(/^https?:\/\//, '') +
              '#Intent;scheme=' + (item.url.startsWith('https') ? 'https' : 'http') +
              ';action=android.intent.action.VIEW' +
              ';category=android.intent.category.BROWSABLE' +
              ';end';
            location.href = intentUrl;
          }catch(ex){
            location.href = item.url;
          }
        }else{
          launchApp(item.url);
        }
      }else{
        openLinkEdit(item.id);
      }
    }
  });

  card.addEventListener('click', function(e){
    if(item.browser === 'external' || item.browser === 'direct'){
      e.preventDefault();
      e.stopPropagation();
    }
  });

  card.addEventListener('touchcancel', function(){
    clearTimeout(longPressTimer);
    touchMoved = false;
    card.classList.remove('dragging');
  });

  return card;
}

function urlToIframeCode(url){
  /* YouTube */
  let m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
  if(m) return '<iframe src="https://www.youtube.com/embed/' + m[1] + '" frameborder="0" allowfullscreen></iframe>';
  /* Vimeo */
  m = url.match(/vimeo\.com\/(\d+)/);
  if(m) return '<iframe src="https://player.vimeo.com/video/' + m[1] + '" frameborder="0" allowfullscreen></iframe>';
  /* ニコニコ動画 */
  m = url.match(/nicovideo\.jp\/watch\/((?:sm|nm|so)\d+)/);
  if(m) return '<iframe src="https://embed.nicovideo.jp/watch/' + m[1] + '" frameborder="0" allowfullscreen></iframe>';
  return null;
}

  const iframeTextarea = document.getElementById('linkIframe');

    if(code) iframeTextarea.value = code;
  }
});

async function fetchLinkMeta(url){
  try{
    const res = await fetch('https://api.microlink.io/?url=' + encodeURIComponent(url));
    const json = await res.json();
    if(json && json.status === 'success' && json.data){
      const d = json.data;
      return {
        title: (d.title || '').trim(),
        image: (d.image && d.image.url) || (d.screenshot && d.screenshot.url) || ''
      };
    }
  }catch(e){}
  return null;
}

function extractIframeSrc(iframeCode){
  if(!iframeCode) return null;
  const m = iframeCode.match(/src=["']([^"']+)["']/i);
  return m ? m[1] : null;
}

function getVideoThumbUrl(src){
  if(!src) return null;
  /* YouTube */
  let m = src.match(/youtube\.com\/embed\/([a-zA-Z0-9_-]+)/);
  if(!m) m = src.match(/youtu\.be\/([a-zA-Z0-9_-]+)/);
  if(m) return 'https://img.youtube.com/vi/' + m[1] + '/hqdefault.jpg';
  /* Vimeo */
  m = src.match(/vimeo\.com\/(?:video\/)?(\d+)/);
  if(m) return 'https://vumbnail.com/' + m[1] + '.jpg';
  return null;
}

async function autoFetchThumb(){
  const iframeCode = document.getElementById('linkIframe').value.trim();
  const url = linkUrlInput.value.trim();
  thumbStatus.textContent = '取得中...';

  /* try iframe src thumbnail first */
  if(iframeCode){
    const src = extractIframeSrc(iframeCode);
    const thumbUrl = getVideoThumbUrl(src);
    if(thumbUrl){
      /* convert to base64 via fetch */
      try{
        const res = await fetch(thumbUrl);
        const blob = await res.blob();
        const reader = new FileReader();
        reader.onload = function(ev){
          pickedLinkImage = ev.target.result;
          showLinkPreview(ev.target.result);
          thumbStatus.textContent = '✓ 取得成功';
          setTimeout(function(){ thumbStatus.textContent = ''; }, 3000);
        };
        reader.readAsDataURL(blob);
        return;
      }catch(e){}
    }
    /* fallback: microlink on iframe src */
    if(src){
      const meta = await fetchLinkMeta(src);
      if(meta && meta.image){
        pickedLinkImage = meta.image;
        showLinkPreview(meta.image);
        thumbStatus.textContent = '✓ 取得成功';
        setTimeout(function(){ thumbStatus.textContent = ''; }, 3000);
        return;
      }
    }
  }

  /* fallback: use URL */
  if(!url){ thumbStatus.textContent = ''; return; }
  const meta = await fetchLinkMeta(url);
  if(meta){
    if(meta.image){
      pickedLinkImage = meta.image;
      showLinkPreview(meta.image);
      thumbStatus.textContent = '✓ 取得成功';
    }else{
      thumbStatus.textContent = '画像なし';
    }
    if(meta.title && !linkTitleInput.value.trim()){
      linkTitleInput.value = meta.title;
    }
  }else{
    thumbStatus.textContent = '取得失敗';
  }
  setTimeout(function(){ thumbStatus.textContent = ''; }, 3000);
}

linkFileInput.addEventListener('change', function(){
  const file = linkFileInput.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){
      const maxW = 800;
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      pickedLinkImage = canvas.toDataURL('image/jpeg', 0.75);
      showLinkPreview(pickedLinkImage);
    };

const TABS_KEY = 'launcherBrowserTabs';

function saveTabs(){
  try{
    const data = btabs.map(function(t){
      return { id: t.id, url: t.url, title: t.title, pinned: t.pinned || false };
    });
    localStorage.setItem(TABS_KEY, JSON.stringify({ tabs: data, activeId: activeTabId }));
  }catch(e){}
}

function loadTabsFromStorage(){
  try{
    const raw = localStorage.getItem(TABS_KEY);
    if(!raw) return;
    const data = JSON.parse(raw);
    if(!data || !Array.isArray(data.tabs)) return;
    data.tabs.forEach(function(t){
      if(!t.url) return;
      btabs.push({ id: t.id, url: t.url, title: t.title || '', pinned: t.pinned || false, iframe: null });
    });
    if(btabs.length){
      const restoreId = data.activeId && btabs.find(function(t){ return t.id === data.activeId; }) ? data.activeId : btabs[0].id;
      activeTabId = restoreId;
      /* update URL bar to show last active URL */
      const activeTab = btabs.find(function(t){ return t.id === restoreId; });
      const urlInput = document.getElementById('browserUrlInput');
      if(activeTab && urlInput) urlInput.value = activeTab.url || '';
    }
  }catch(e){}
}

let btabs = [];
let activeTabId = null;
loadTabsFromStorage();

function normalizeUrl(raw){
  raw = raw.trim();
  if(!raw) return '';
  if(!/^https?:\/\//i.test(raw)){
    if(raw.includes('.') && !raw.includes(' ')) raw = 'https://' + raw;
    else return 'https://www.google.com/search?q=' + encodeURIComponent(raw);
  }
  return raw;
}

function renderBrowserTabs(){
  const tabList = document.getElementById('bmenuTabList');
  if(!tabList) return;
  tabList.innerHTML = '';

  const sorted = btabs.slice().sort(function(a, b){
    return (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0);
  });

  sorted.forEach(function(tab){
    const row = document.createElement('div');
    row.className = 'bmenu-tab-row' + (tab.id === activeTabId ? ' active-tab' : '');

    const favicon = document.createElement('div');
    favicon.className = 'bmenu-tab-favicon';
    try{
      if(tab.url){
        const img = document.createElement('img');
        img.src = 'https://www.google.com/s2/favicons?domain=' + new URL(tab.url).hostname + '&sz=32';
        img.onerror = function(){ favicon.textContent = tab.url ? new URL(tab.url).hostname.charAt(0).toUpperCase() : '?'; };
        favicon.appendChild(img);
      }else{ favicon.textContent = '?'; }
    }catch(e){ favicon.textContent = '?'; }

    const title = document.createElement('div');
    title.className = 'bmenu-tab-title';
    title.textContent = tab.title || tab.url || '新しいタブ';

    const pinBtn = document.createElement('button');
    pinBtn.className = 'bmenu-tab-pin';
    pinBtn.textContent = tab.pinned ? '📌' : '📍';
    pinBtn.title = tab.pinned ? '固定解除' : '固定';
    pinBtn.addEventListener('click', function(e){
      e.stopPropagation();
      tab.pinned = !tab.pinned;
      saveTabs();
      renderBrowserTabs();
    });

    row.appendChild(favicon);
    row.appendChild(title);
    row.appendChild(pinBtn);

    if(!tab.pinned){
      const closeBtn = document.createElement('button');
      closeBtn.className = 'bmenu-tab-close';
      closeBtn.textContent = '✕';
      closeBtn.addEventListener('click', function(e){
        e.stopPropagation();
        closeTab(tab.id);
        renderBrowserTabs();
      });
      row.appendChild(closeBtn);
    }

    row.addEventListener('click', function(){
      switchTab(tab.id);
      browserMenuPanel.style.display = 'none';
      goToSection('browser');
    });

    tabList.appendChild(row);
  });
}

function showFrame(tab){
  /* hide all iframes */
  btabs.forEach(function(t){
    if(t.iframe) t.iframe.style.display = 'none';
  });
  browserFrameWrap.querySelectorAll('.browser-blocked').forEach(function(el){ el.remove(); });

  if(!tab) return;
  browserUrlInput.value = tab.url || '';

  if(!tab.url){
    /* blank new tab */
    return;
  }
  if(!tab.iframe){
    const iframe = document.createElement('iframe');
    iframe.className = 'browser-iframe';
    iframe.sandbox = 'allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation-by-user-activation allow-presentation';
    iframe.setAttribute('allowfullscreen', '');
    iframe.setAttribute('allow', 'fullscreen; screen-orientation; accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture');
    iframe.src = tab.url;
    iframe.addEventListener('load', function(){
      const t2 = btabs.find(function(t){ return t.id === tab.id; });
      if(!t2 || !t2.url) return;

      /* record history on every page load */
      addHistory(t2.url, t2.title || '');

      /* try same-origin title first */
      try{
        const sameOriginTitle = iframe.contentDocument && iframe.contentDocument.title;
        if(sameOriginTitle){
          t2.title = sameOriginTitle;
          addHistory(t2.url, sameOriginTitle);
          renderBrowserTabs();
          saveTabs();
          return;
        }
      }catch(e){}

      /* cross-origin: use microlink for title */
      if(!t2.title){
        fetchLinkMeta(t2.url).then(function(meta){
          if(meta && meta.title){
            t2.title = meta.title;
            addHistory(t2.url, meta.title);
            renderBrowserTabs();
            saveTabs();
          }
        }).catch(function(){});
      }
    });
    iframe.addEventListener('error', function(){
      showBlocked(tab);
    });
    browserFrameWrap.appendChild(iframe);
    tab.iframe = iframe;
  }else{
    tab.iframe.style.display = '';
  }
}

function showBlocked(tab){
  if(!tab.iframe) return;
  tab.iframe.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'browser-blocked';
  div.innerHTML = '<div class="msg">😢 このサイトはiframe内での表示をブロックしています</div>';
  const extBtn = document.createElement('button');
  extBtn.className = 'ext-btn';
  extBtn.textContent = '🌐 外部ブラウザで開く';
  extBtn.addEventListener('click', function(){ window.open(tab.url, '_blank'); });
  div.appendChild(extBtn);
  browserFrameWrap.appendChild(div);
}

function switchTab(id){
  activeTabId = id;
  const tab = btabs.find(function(t){ return t.id === id; });
  renderBrowserTabs();
  showFrame(tab || null);
  if(typeof updateBookmarkBtn === 'function') updateBookmarkBtn();
  saveTabs();
}

function openNewTab(url){
  const id = 'btab_' + Date.now();
  const tab = { id: id, url: normalizeUrl(url), title: '', iframe: null };
  btabs.push(tab);
  switchTab(id);
  saveTabs();
}

function closeTab(id){
  const idx = btabs.findIndex(function(t){ return t.id === id; });
  if(idx === -1) return;
  const tab = btabs[idx];
  if(tab.pinned) return;
  if(tab.iframe) tab.iframe.remove();
  btabs.splice(idx, 1);
  saveTabs();
  if(btabs.length === 0){
    activeTabId = null;
    renderBrowserTabs();
    browserFrameWrap.innerHTML = '';
    browserUrlInput.value = '';
    goToSection('home');
  }else{
    const next = btabs[Math.min(idx, btabs.length - 1)];
    switchTab(next.id);
  }
}

function browserNavigate(url){
  url = normalizeUrl(url);
  if(!url) return;
  if(!activeTabId){
    openNewTab(url);
    return;
  }
  const tab = btabs.find(function(t){ return t.id === activeTabId; });
  if(!tab) return;
  tab.url = url;
  tab.title = '';
  if(tab.iframe){ tab.iframe.remove(); tab.iframe = null; }
  browserFrameWrap.querySelectorAll('.browser-blocked').forEach(function(el){ el.remove(); });
  renderBrowserTabs();
  showFrame(tab);
  addHistory(url, '');
  saveTabs();
  /* try to update history title after load */
  setTimeout(function(){
    if(tab.title) addHistory(url, tab.title);
  }, 3000);
}

  if(!url){ browserBookmarkBtn.textContent = '☆'; browserBookmarkBtn.classList.remove('starred'); return; }
  const favs = loadFavorites();
  const starred = favs.some(function(f){ return f.link === url; });

  browserBookmarkBtn.classList.toggle('starred', starred);
}
browserBookmarkBtn.addEventListener('click', async function(){
  const tab = btabs.find(function(t){ return t.id === activeTabId; });
  if(!tab || !tab.url){
    openBmPanel('fav');
    return;
  }
  const favs = loadFavorites();
  const already = favs.some(function(f){ return f.link === tab.url; });
  if(already){
    /* already bookmarked → remove */
    toggleFavorite({ link: tab.url, title: tab.title || tab.url, pubDate: new Date().toISOString(), source: '' });
    updateBookmarkBtn();
    return;
  }
  /* add with title fetch */
  browserBookmarkBtn.textContent = '⏳';
  let title = tab.title || '';
  if(!title){
    try{
      const meta = await fetchLinkMeta(tab.url);
      if(meta && meta.title) title = meta.title;
    }catch(e){}
  }
  if(!title) title = tab.url;
  tab.title = title;
  renderBrowserTabs();
  toggleFavorite({ link: tab.url, title: title, pubDate: new Date().toISOString(), source: '' });
  updateBookmarkBtn();
});

const HISTORY_KEY = 'launcherBrowserHistory';
const HISTORY_MAX = 200;

function loadHistory(){
  const raw = localStorage.getItem(HISTORY_KEY);
  if(!raw) return [];
  try{ const a = JSON.parse(raw); return Array.isArray(a) ? a : []; }catch(e){ return []; }
}
function saveHistory(items){
  try{ localStorage.setItem(HISTORY_KEY, JSON.stringify(items)); }catch(e){}
}
function addHistory(url, title){
  if(!url) return;
  let items = loadHistory();
  /* remove duplicate */
  items = items.filter(function(h){ return h.url !== url; });
  items.unshift({ url: url, title: title || url, visitedAt: new Date().toISOString() });
  if(items.length > HISTORY_MAX) items = items.slice(0, HISTORY_MAX);
  saveHistory(items);
}

function switchBmTab(tab){
  currentBmTab = tab;
  document.querySelectorAll('.bm-tab').forEach(function(b){
    b.classList.toggle('active', b.dataset.bm === tab);
  });
  bmFavList.style.display = tab === 'fav' ? '' : 'none';
  document.getElementById('bmLaterList').style.display = tab === 'later' ? '' : 'none';
  document.getElementById('bmHistoryList').style.display = tab === 'history' ? '' : 'none';
  /* always re-render to pick up latest data */
  if(tab === 'fav') renderBmFavs();
  else if(tab === 'later') renderBmLater();
  else if(tab === 'history') renderBmHistory();
}

function renderBmHistory(){
  const list = document.getElementById('bmHistoryList');
  list.innerHTML = '';

  /* clear button at top */
  const clearRow = document.createElement('div');
  clearRow.style.cssText = 'display:flex;justify-content:flex-end;padding:8px 16px;';
  const clearBtn = document.createElement('button');
  clearBtn.textContent = '🗑️ 履歴を全て削除';
  clearBtn.style.cssText = 'background:none;border:none;color:var(--sub);font-size:12px;';
  clearBtn.addEventListener('click', function(){
    localStorage.removeItem(HISTORY_KEY);
    renderBmHistory();
  });
  clearRow.appendChild(clearBtn);
  list.appendChild(clearRow);

  const items = loadHistory();
  if(!items.length){
    const empty = document.createElement('div');
    empty.style.cssText = 'padding:20px;text-align:center;color:var(--sub);font-size:13px;';
    empty.textContent = '履歴はまだありません';
    list.appendChild(empty);
    return;
  }

  let lastDate = '';
  items.forEach(function(item){
    /* date separator */
    const d = new Date(item.visitedAt);
    const dateStr = isNaN(d) ? '' : d.toLocaleDateString('ja-JP', {month:'numeric', day:'numeric', weekday:'short'});
    if(dateStr && dateStr !== lastDate){
      lastDate = dateStr;
      const sep = document.createElement('div');
      sep.style.cssText = 'padding:6px 16px;font-size:11px;font-weight:700;color:var(--sub);background:var(--card2);';
      sep.textContent = dateStr;
      list.appendChild(sep);
    }

    const row = makeBmRow(item.title, item.url, function(){
      const updated = loadHistory().filter(function(h){ return h.url !== item.url; });
      saveHistory(updated); renderBmHistory();
    }, true /* showExternal */);
    list.appendChild(row);
  });
}

function renderBmFavs(){
  bmFavList.innerHTML = '';
  const favs = loadFavorites();
  if(!favs.length){
    bmFavList.innerHTML = '<div style="padding:20px;text-align:center;color:var(--sub);font-size:13px;">お気に入りはまだありません</div>';
    return;
  }
  favs.forEach(function(item){
    const row = makeBmRow(item.title || item.link, item.link, function(){
      toggleFavorite(item); renderBmFavs();
    });
    bmFavList.appendChild(row);
  });
}

function renderBmLater(){
  bmLaterItems.innerHTML = '';
  const items = loadReadLater();
  if(!items.length){
    bmLaterItems.innerHTML = '<div style="padding:20px;text-align:center;color:var(--sub);font-size:13px;">あとで読むURLはまだありません</div>';
    return;
  }
  items.forEach(function(item){
    const row = makeBmRow(item.title || item.url, item.url, function(){
      const updated = loadReadLater().filter(function(r){ return r.url !== item.url; });
      saveReadLater(updated); renderBmLater();
    });
    bmLaterItems.appendChild(row);
  });
}

function makeBmRow(title, url, onDelete, showExternal){
  const row = document.createElement('div');
  row.className = 'bm-row';

  const icon = document.createElement('div');
  icon.className = 'bm-row-icon';
  try{ icon.textContent = new URL(url).hostname.charAt(0).toUpperCase(); }
  catch(e){ icon.textContent = '🔗'; }

  const body = document.createElement('div');
  body.className = 'bm-row-body';
  body.style.cursor = 'pointer';
  const t = document.createElement('div');
  t.className = 'bm-row-title';
  t.textContent = title;
  const u = document.createElement('div');
  u.className = 'bm-row-url';
  u.textContent = url;
  body.appendChild(t);
  body.appendChild(u);
  body.addEventListener('click', function(){
    bmPanel.style.display = 'none';
    browserNavigate(url);
  });

  if(showExternal){
    const extBtn = document.createElement('button');
    extBtn.className = 'bm-row-del';
    extBtn.textContent = '🌐';
    extBtn.title = '外部ブラウザで開く';
    extBtn.addEventListener('click', function(e){
      e.stopPropagation();
      window.open(url, '_blank');
    });
    row.appendChild(icon);
    row.appendChild(body);
    row.appendChild(extBtn);
  }else{
    row.appendChild(icon);
    row.appendChild(body);
  }

  const del = document.createElement('button');
  del.className = 'bm-row-del';
  del.textContent = '🗑️';
  del.addEventListener('click', function(e){ e.stopPropagation(); onDelete(); });
  row.appendChild(del);

  return row;
}

/* in-browser floating clock (draggable + resizable) */
(function(){
  const browserPanelEl = document.getElementById('secBrowser');
  if(!browserPanelEl) return;

  const CLOCK_POS_KEY = 'launcherBrowserClockPos';
  const defaultPos = { top: 96, right: 10, fontSize: 11 };

  function loadClockPos(){
    try{
      const raw = localStorage.getItem(CLOCK_POS_KEY);
      if(raw) return Object.assign({}, defaultPos, JSON.parse(raw));
    }catch(e){}
    return Object.assign({}, defaultPos);
  }
  function saveClockPos(pos){
    try{ localStorage.setItem(CLOCK_POS_KEY, JSON.stringify(pos)); }catch(e){}
  }

  let pos = loadClockPos();

  const clk = document.createElement('div');
  clk.className = 'browser-clock';
  clk.id = 'browserClock';

  const resizeHandle = document.createElement('div');
  resizeHandle.className = 'browser-clock-resize';
  clk.appendChild(resizeHandle);

  browserPanelEl.appendChild(clk);

  function applyPos(){
    clk.style.top = (pos.top) + 'px';
    clk.style.left = pos.left !== undefined ? pos.left + 'px' : '';
    clk.style.right = pos.left !== undefined ? '' : pos.right + 'px';
    clk.style.fontSize = pos.fontSize + 'px';
  }
  applyPos();

  function updateBrowserClock(){
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    /* keep resize handle as last child; set text via a span */
    if(!clk.querySelector('.clock-text')){
      const span = document.createElement('span');
      span.className = 'clock-text';
      clk.insertBefore(span, resizeHandle);
    }
    clk.querySelector('.clock-text').textContent = hh + ':' + mm;
  }
  updateBrowserClock();
  setInterval(updateBrowserClock, 1000 * 15);

  /* drag logic */
  let dragging = false, dragStartX = 0, dragStartY = 0, startTop = 0, startLeft = 0;

  clk.addEventListener('pointerdown', function(e){
    if(e.target === resizeHandle) return;
    dragging = true;
    clk.setPointerCapture(e.pointerId);
    clk.style.cursor = 'grabbing';
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    const rect = clk.getBoundingClientRect();
    const parentRect = browserPanelEl.getBoundingClientRect();
    startTop = rect.top - parentRect.top;
    startLeft = rect.left - parentRect.left;
  });
  clk.addEventListener('pointermove', function(e){
    if(!dragging) return;
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    pos.top = Math.max(0, startTop + dy);
    pos.left = Math.max(0, startLeft + dx);
    delete pos.right;
    applyPos();
  });
  clk.addEventListener('pointerup', function(e){
    if(!dragging) return;
    dragging = false;
    clk.style.cursor = 'grab';
    saveClockPos(pos);
  });

  /* resize logic */
  let resizing = false, resizeStartX = 0, startFontSize = 11;
  resizeHandle.addEventListener('pointerdown', function(e){
    e.stopPropagation();
    resizing = true;
    resizeHandle.setPointerCapture(e.pointerId);
    resizeStartX = e.clientX;
    startFontSize = pos.fontSize;
  });
  resizeHandle.addEventListener('pointermove', function(e){
    if(!resizing) return;
    e.stopPropagation();
    const dx = e.clientX - resizeStartX;
    pos.fontSize = Math.max(9, Math.min(40, startFontSize + dx * 0.3));
    applyPos();
  });
  resizeHandle.addEventListener('pointerup', function(e){
    if(!resizing) return;
    resizing = false;
    saveClockPos(pos);
  });
})();

function formatRelative(pubDate){
  const d = new Date(pubDate);
  if(isNaN(d.getTime())) return '';
  const diffMs = Date.now() - d.getTime();
  const diffH = Math.floor(diffMs / 3600000);
  if(diffH < 1) return '1時間以内';
  if(diffH < 24) return diffH + '時間前';
  return Math.floor(diffH / 24) + '日前';
}

const THUMB_CACHE_KEY = 'launcherThumbCache';
const THUMB_CACHE_MAX = 200;

function loadThumbCache(){
  try{
    const raw = localStorage.getItem(THUMB_CACHE_KEY);
    return raw ? JSON.parse(raw) : {};
  }catch(e){ return {}; }
}
function saveThumbCache(cache){
  try{
    const keys = Object.keys(cache);
    if(keys.length > THUMB_CACHE_MAX){
      const trimmed = {};
      keys.slice(-THUMB_CACHE_MAX).forEach(function(k){ trimmed[k] = cache[k]; });
      localStorage.setItem(THUMB_CACHE_KEY, JSON.stringify(trimmed));
    }else{
      localStorage.setItem(THUMB_CACHE_KEY, JSON.stringify(cache));
    }
  }catch(e){}
}

let thumbCache = loadThumbCache();

async function fetchAndApplyThumb(link, imgEl, iconEl){
  if(thumbCache[link] !== undefined){
    if(thumbCache[link]){
      imgEl.src = thumbCache[link];
      imgEl.style.display = 'block';
      if(iconEl) iconEl.style.display = 'none';
    }
    return;
  }
  try{
    const res = await fetch('https://api.microlink.io/?url=' + encodeURIComponent(link));
    const json = await res.json();
    if(json && json.status === 'success' && json.data){
      const d = json.data;
      const imageUrl = (d.image && d.image.url) || '';
      thumbCache[link] = imageUrl;
      saveThumbCache(thumbCache);
      if(imageUrl){
        imgEl.src = imageUrl;
        imgEl.style.display = 'block';
        if(iconEl) iconEl.style.display = 'none';
      }
    }else{
      thumbCache[link] = '';
      saveThumbCache(thumbCache);
    }
  }catch(e){
    thumbCache[link] = '';
  }
}

function getSavedFeeds(){
  const raw = localStorage.getItem(FEED_KEY);
  if(!raw) return DEFAULT_FEEDS.slice();
  try{
    const arr = JSON.parse(raw);
    if(Array.isArray(arr) && arr.length) return arr;
  }catch(e){
    // legacy: previously stored as a plain URL string
    if(raw.indexOf('http') === 0) return [raw];
  }
  return DEFAULT_FEEDS.slice();
}

function parseFeedXML(text, fallbackSourceName){
  let doc;
  try{
    doc = new DOMParser().parseFromString(text, 'text/xml');
  }catch(e){
    return [];
  }
  if(!doc || doc.querySelector('parsererror')) return [];

  let items = Array.from(doc.querySelectorAll('item'));
  if(!items.length){
    items = Array.from(doc.querySelectorAll('entry'));
  }

  const channelTitleEl = doc.querySelector('channel > title') || doc.querySelector('feed > title');
  const sourceName = channelTitleEl ? channelTitleEl.textContent.trim() : (fallbackSourceName || '');

  function getText(el, tag){
    const node = el.querySelector(tag);
    return node ? node.textContent.trim() : '';
  }
  function getLink(el){
    const linkEls = el.querySelectorAll('link');
    for(let i = 0; i < linkEls.length; i++){
      const href = linkEls[i].getAttribute('href');
      if(href) return href;
      const txt = linkEls[i].textContent && linkEls[i].textContent.trim();
      if(txt) return txt;
    }
    const guid = el.querySelector('guid');
    if(guid && guid.textContent) return guid.textContent.trim();
    return '';
  }

  return items.map(function(el){
    const pubDate = getText(el, 'pubDate') || getText(el, 'published') || getText(el, 'updated') || getText(el, 'date');
    return {
      title: getText(el, 'title'),
      link: getLink(el),
      pubDate: pubDate,
      source: {name: sourceName}
    };
  }).filter(function(it){ return it.title && it.link; });
}

function fetchWithTimeout(url, ms, isJSON){
  return Promise.race([
    fetch(url).then(function(r){
      if(!r.ok) throw new Error('http ' + r.status);
      return isJSON ? r.json() : r.text();
    }),
    new Promise(function(resolve, reject){
      setTimeout(function(){ reject(new Error('timeout')); }, ms);
    })
  ]);
}

function fetchFeedItems(url){
  const attempts = [
    {proxy: 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url), json: false},
    {proxy: 'https://corsproxy.io/?url=' + encodeURIComponent(url), json: false},
    {proxy: 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(url), json: true}
  ];
  function tryAttempt(i){
    if(i >= attempts.length) return [];
    const a = attempts[i];
    return fetchWithTimeout(a.proxy, 8000, a.json).then(function(data){
      const items = a.json ? (data.items || []) : parseFeedXML(data);
      if(!items.length) throw new Error('empty');
      return items;
    }).catch(function(){
      return tryAttempt(i + 1);
    });
  }
  return tryAttempt(0);
}

function loadFeed(){
  const feeds = getSavedFeeds();
  feedList.innerHTML = '<div class="feed-empty">読み込み中...</div>';
  const requests = feeds.map(function(url){
    return fetchFeedItems(url);
  });
  const allDone = Promise.all(requests).then(function(results){
    let all = [];
    results.forEach(function(items){ all = all.concat(items); });
    all.sort(function(a, b){
      return new Date(b.pubDate) - new Date(a.pubDate);
    });
    return all;
  });
  const hardTimeout = new Promise(function(resolve){
    setTimeout(function(){ resolve(null); }, 25000);
  });
  Promise.race([allDone, hardTimeout]).then(function(all){
    renderFeed(all || []);
  }).catch(function(){
    renderFeed([]);
  });
}
loadFeed();

        apps = data;
        saveApps(apps);
        renderGrid();
        settingsOverlay.classList.remove('show');
        alert('設定を読み込みました');
        return;
      }

      if(typeof data !== 'object' || data === null) throw new Error('invalid');

      let failedKeys = [];
      Object.keys(data).forEach(function(key){
        try{
          localStorage.setItem(key, data[key]);
        }catch(e){
          failedKeys.push(key);
        }
      });

      // reload everything from storage
      apps = loadApps();
      bannerLinks = loadBannerLinks();
      renderGrid();
      renderCategoryTabs();
      renderBannerLinks();
      renderFavorites();
      applyBackground();
      applyTheme();
      loadFeed();

      settingsOverlay.classList.remove('show');
      if(failedKeys.length){
        alert('一部のデータは容量不足のため復元できませんでした: ' + failedKeys.join(', '));
      }else{
        alert('バックアップから復元しました');
      }
    }catch(err){
      alert('読み込みに失敗しました。正しいバックアップファイルか確認してね');
    }
  };
  reader.readAsText(file);
});

function getStorageUsage(){
  let total = 0;
  for(let i = 0; i < localStorage.length; i++){
    const key = localStorage.key(i);
    const val = localStorage.getItem(key) || '';
    total += key.length + val.length;
  }
  return total;
}

function updateStorageUsage(){
  const bytes = getStorageUsage();
  const kb = (bytes / 1024).toFixed(0);
  const el = document.getElementById('storageUsage');
  if(el) el.textContent = '使用容量: 約 ' + kb + ' KB(目安上限 5,000〜10,000 KB)';
}

/* service worker */
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
</script>
