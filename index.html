<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ec4464">
<title>ホームランチャー</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root{
    --bg:#eef0f6;
    --card:#ffffff;
    --card2:#f4f5fa;
    --text:#2d2a45;
    --sub:#9a96b3;
    --accent:#ec4464;
    --accent2:#ec4464;
    --border:#e6e8f2;
  }
  body.dark{
    --bg:#1a1825;
    --card:#262333;
    --card2:#322e44;
    --text:#f1eefb;
    --sub:#a9a3c4;
    --border:#3c3852;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:"Hiragino Sans","Noto Sans JP",sans-serif;
    overflow:hidden;
  }
  .pager{
    display:flex;
    width:100%;height:100%;
    overflow-x:auto;
    overflow-y:hidden;
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;
  }
  .page{
    flex:0 0 100%;
    width:100%;height:100%;
    scroll-snap-align:start;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:env(safe-area-inset-top) 14px calc(env(safe-area-inset-bottom) + 28px) 14px;
  }
  .wrap{max-width:480px;margin:0 auto;}

  /* page dots */
  .page-dots{
    position:fixed;
    bottom:calc(env(safe-area-inset-bottom) + 8px);
    left:0;right:0;
    display:flex;justify-content:center;gap:6px;
    pointer-events:none;
    z-index:40;
  }
  .page-dots .dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--sub);opacity:.4;
    transition:opacity .2s, transform .2s;
  }
  .page-dots .dot.active{opacity:1;background:var(--accent);transform:scale(1.25);}

  /* feed page header */
  .page-header{
    display:flex;align-items:center;justify-content:space-between;
    margin:14px 0 14px;
  }
  .page-header h2{font-size:17px;font-weight:800;margin:0;}
  .page-icon-btn{
    background:var(--card);border:none;
    width:36px;height:36px;border-radius:50%;
    font-size:16px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 1px 4px rgba(0,0,0,.08);color:var(--text);
  }

  /* banner */
  .banner{
    position:relative;
    width:100%;
    height:130px;
    border-radius:18px;
    overflow:hidden;
    margin-top:12px;
    background:linear-gradient(135deg,#ff9bb0,#ec4464 55%,#8b6cf0);
    display:flex;
    align-items:flex-end;
    box-shadow:0 4px 14px rgba(236,68,100,.25);
  }
  .banner img{
    position:absolute;inset:0;
    width:100%;height:100%;
    object-fit:cover;
  }
  .banner-overlay{
    position:relative;z-index:1;
    width:100%;
    padding:12px 16px;
    background:linear-gradient(to top, rgba(0,0,0,.45), rgba(0,0,0,0));
  }
  .banner-title{
    color:#fff;
    font-size:18px;
    font-weight:800;
    letter-spacing:.04em;
    text-shadow:0 1px 4px rgba(0,0,0,.4);
  }
  .banner-sub{
    color:rgba(255,255,255,.85);
    font-size:11px;
    margin-top:2px;
    text-shadow:0 1px 3px rgba(0,0,0,.4);
  }
  .banner-edit{
    position:absolute;top:10px;right:10px;z-index:2;
    width:34px;height:34px;border-radius:50%;
    border:none;background:rgba(0,0,0,.45);color:#fff;
    font-size:15px;display:flex;align-items:center;justify-content:center;
  }

  /* banner action buttons (refresh / settings) */
  .banner-actions{
    position:absolute;bottom:10px;right:10px;z-index:2;
    display:flex;gap:8px;
  }
  .banner-icon-btn{
    width:34px;height:34px;border-radius:50%;
    border:none;background:rgba(0,0,0,.45);color:#fff;
    font-size:15px;display:flex;align-items:center;justify-content:center;
  }

  /* feed */
  .feed-section{margin-top:18px;}
  .feed-heading{
    font-size:13px;font-weight:800;color:var(--text);
    margin-bottom:8px;display:flex;align-items:center;gap:6px;
  }
  .feed-list{display:flex;flex-direction:column;gap:8px;}
  .feed-card{
    display:flex;
    align-items:center;
    gap:12px;
    background:var(--card);
    border-radius:14px;
    padding:10px 14px;
    text-decoration:none;
    color:var(--text);
    box-shadow:0 2px 6px rgba(0,0,0,.06);
  }
  .feed-thumb{
    width:60px;height:60px;
    border-radius:10px;
    overflow:hidden;
    flex-shrink:0;
    background:var(--card2);
    display:flex;align-items:center;justify-content:center;
    font-size:24px;
  }
  .feed-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .feed-body{flex:1;min-width:0;}
  .feed-card-title{
    font-size:13px;font-weight:700;line-height:1.4;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  .feed-meta{font-size:11px;color:var(--sub);margin-top:5px;}
  .feed-empty{font-size:12px;color:var(--sub);padding:10px 2px;}

  /* divider */
  .divider{
    height:4px;
    background:var(--accent);
    border-radius:2px;
    margin:14px 0 16px;
    opacity:.85;
  }

  /* search */
  .search-wrap{position:relative;margin-bottom:14px;}
  .suggest-list{
    position:absolute;left:0;right:0;top:calc(100% + 6px);
    background:var(--card);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 6px 16px rgba(0,0,0,.12);
    z-index:30;
    display:none;
  }
  .suggest-list .item{
    padding:11px 18px;
    font-size:14px;
    border-bottom:1px solid var(--border);
  }
  .suggest-list .item:last-child{border-bottom:none;}
  .suggest-list .item:active{background:var(--card2);}
  .search-box{
    display:flex;
    align-items:center;
    background:var(--card);
    border-radius:999px;
    padding:6px 6px 6px 18px;
    box-shadow:0 2px 8px rgba(0,0,0,.06);
  }
  .search-box input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:var(--text);
    font-size:16px;
    padding:10px 0;
  }
  .search-box input::placeholder{color:var(--sub);}
  .search-box button{
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:999px;
    width:42px;height:42px;
    font-size:18px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }

  /* weather */
  .weather{
    background:var(--card);
    border-radius:18px;
    padding:14px 18px;
    margin-bottom:18px;
    box-shadow:0 2px 8px rgba(0,0,0,.06);
  }
  .weather-current{
    display:flex;
    align-items:center;
    gap:14px;
    min-height:50px;
  }
  .weather .icon{font-size:34px;line-height:1;}
  .weather .info{flex:1;}
  .weather .temp{font-size:22px;font-weight:800;color:var(--text);}
  .weather .place{font-size:12px;color:var(--sub);margin-top:2px;}
  .weather .reload{
    background:none;border:none;color:var(--sub);font-size:18px;padding:6px;
  }
  .weather-week{
    display:flex;
    gap:6px;
    overflow-x:auto;
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid var(--border);
  }
  .weather-week .day{
    flex:1 0 auto;
    min-width:42px;
    text-align:center;
    font-size:11px;
    color:var(--sub);
  }
  .weather-week .day .dname{margin-bottom:2px;}
  .weather-week .day .dicon{font-size:18px;}
  .weather-week .day .dtemp{font-size:11px;color:var(--text);margin-top:2px;white-space:nowrap;}
  .weather-hint{
    font-size:10px;color:var(--sub);text-align:right;margin-top:6px;
  }

  /* app grid */
  .grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
  }
  .app-card{
    position:relative;
    background:var(--card);
    border-radius:16px;
    padding:10px 6px 8px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-decoration:none;
    color:var(--text);
    box-shadow:0 2px 8px rgba(0,0,0,.06);
  }
  .app-card .ic{
    width:56px;height:56px;
    border-radius:14px;
    overflow:hidden;
    background:var(--card2);
    display:flex;align-items:center;justify-content:center;
    margin-bottom:6px;
    font-size:24px;
    font-weight:700;
    color:var(--accent);
  }
  .app-card:nth-child(6n+1) .ic{background:#ffe1e6;}
  .app-card:nth-child(6n+2) .ic{background:#fff4d6;}
  .app-card:nth-child(6n+3) .ic{background:#e1ecff;}
  .app-card:nth-child(6n+4) .ic{background:#e1f7e8;}
  .app-card:nth-child(6n+5) .ic{background:#f0e6ff;}
  .app-card:nth-child(6n+6) .ic{background:#e6f7ff;}
  .app-card .ic img{width:100%;height:100%;object-fit:cover;display:block;}
  .app-card .name{
    font-size:12px;
    font-weight:700;
    text-align:center;
    line-height:1.3;
    word-break:break-all;
    max-width:100%;
  }
  .app-card .edit-btn{
    position:absolute;
    top:4px;right:4px;
    width:24px;height:24px;
    border-radius:50%;
    background:rgba(0,0,0,.25);
    border:none;
    color:#fff;
    font-size:12px;
    display:flex;align-items:center;justify-content:center;
  }
  .add-card{
    background:transparent;
    border:2px dashed #d6d9e8;
    color:var(--sub);
    box-shadow:none;
  }
  .add-card .ic{background:transparent;font-size:28px;color:var(--sub);}

  /* modal */
  .overlay{
    position:fixed;inset:0;
    background:rgba(0,0,0,.45);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:50;
  }
  .overlay.show{display:flex;}
  .sheet{
    background:var(--card);
    border-radius:20px 20px 0 0;
    width:100%;max-width:480px;
    padding:20px 20px calc(env(safe-area-inset-bottom) + 20px);
  }
  .sheet h2{margin:0 0 14px;font-size:16px;color:var(--text);}
  .sheet label{font-size:12px;color:var(--sub);display:block;margin:10px 0 4px;}
  .sheet input[type=text],.sheet input[type=url]{
    width:100%;
    background:var(--card2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 12px;
    color:var(--text);
    font-size:15px;
  }
  .sheet select{
    width:100%;
    background:var(--card2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 12px;
    color:var(--text);
    font-size:14px;
    -webkit-appearance:none;
    appearance:none;
  }
  .feed-checks{
    display:flex;flex-direction:column;gap:6px;margin-top:6px;
  }
  .feed-checks label{
    display:flex;align-items:center;gap:10px;
    background:var(--card2);
    border-radius:10px;
    padding:10px 12px;
    font-size:13px;
    color:var(--text);
    margin:0;
  }
  .feed-checks input{width:18px;height:18px;accent-color:var(--accent);flex-shrink:0;}
  .icon-pick{
    display:flex;align-items:center;gap:12px;margin-top:6px;
  }
  .icon-pick .preview{
    width:48px;height:48px;border-radius:12px;background:var(--card2);
    display:flex;align-items:center;justify-content:center;overflow:hidden;
    font-weight:700;color:var(--accent);font-size:20px;
  }
  .icon-pick .preview img{width:100%;height:100%;object-fit:cover;}
  .icon-pick label.file-label{
    background:var(--card2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:8px 14px;
    font-size:13px;
    color:var(--text);
    margin:0;
  }
  .sheet-actions{display:flex;gap:10px;margin-top:18px;}
  .sheet-actions button{
    flex:1;
    border:none;border-radius:12px;
    padding:12px;
    font-size:15px;font-weight:700;
  }
  .btn-save{background:var(--accent);color:#fff;}
  .btn-cancel{background:var(--card2);color:var(--text);}
  .btn-delete{background:#ffe1e6;color:#d23a55;}
</style>
</head>
<body>
<div class="pager" id="pager">

  <div class="page" id="pageHome">
    <div class="wrap">

      <div class="banner" id="banner">
        <img id="bannerImg" style="display:none;" alt="">
        <div class="banner-overlay">
          <div class="banner-title">🏠 ホームランチャー</div>
          <div class="banner-sub">Quick Search & App Launch</div>
        </div>
        <button class="banner-edit" id="bannerEditBtn" title="画像を変更">📷</button>
        <div class="banner-actions">
          <button class="banner-icon-btn" id="themeBtn" title="テーマ切替">🌙</button>
          <button class="banner-icon-btn" id="refreshBtn" title="更新">🔄</button>
          <button class="banner-icon-btn" id="settingsBtn" title="設定">⚙️</button>
        </div>
        <input type="file" id="bannerFile" accept="image/*" style="display:none;">
      </div>

      <div class="divider"></div>

      <div class="search-wrap">
        <form class="search-box" id="searchForm" autocomplete="off">
          <input type="text" id="searchInput" placeholder="Google で検索" autocomplete="off">
          <button type="submit">🔍</button>
        </form>
        <div class="suggest-list" id="suggestList"></div>
      </div>

      <div class="weather" id="weatherBox">
        <div class="weather-current">
          <div class="icon" id="wIcon">🌥️</div>
          <div class="info">
            <div class="temp" id="wTemp">--℃</div>
            <div class="place" id="wPlace">天気を取得中...</div>
          </div>
          <button class="reload" id="wReload" title="更新">↻</button>
        </div>
        <div class="weather-week" id="weatherWeek"></div>
        <div class="weather-hint">タップで週間天気予報サイトへ →</div>
      </div>

      <div class="grid" id="appGrid"></div>

    </div>
  </div>

  <div class="page" id="pageFeed">
    <div class="wrap">
      <div class="page-header">
        <h2>📰 フィード</h2>
        <button class="page-icon-btn" id="feedRefreshBtn" title="更新">🔄</button>
      </div>
      <div class="feed-list" id="feedList"></div>
    </div>
  </div>

</div>

<div class="page-dots">
  <span class="dot active" data-page="0"></span>
  <span class="dot" data-page="1"></span>
</div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <h2 id="sheetTitle">アプリを追加</h2>
    <label>アプリ名</label>
    <input type="text" id="appName" placeholder="例: 競馬予想">
    <label>URL</label>
    <input type="url" id="appUrl" placeholder="https://example.github.io/app/">
    <label>アイコン</label>
    <div class="icon-pick">
      <div class="preview" id="iconPreview">A</div>
      <label class="file-label" for="iconFile">画像を選択</label>
      <input type="file" id="iconFile" accept="image/*" style="display:none;">
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" id="btnCancel">キャンセル</button>
      <button class="btn-save" id="btnSave">保存</button>
    </div>
    <div class="sheet-actions" id="deleteRow" style="display:none;">
      <button class="btn-delete" id="btnDelete">このアプリを削除</button>
    </div>
  </div>
</div>

<div class="overlay" id="settingsOverlay">
  <div class="sheet">
    <h2>設定</h2>
    <div class="sheet-actions">
      <button class="btn-cancel" id="exportBtn">📤 書き出し</button>
      <label class="btn-save" for="importFile" style="text-align:center;display:flex;align-items:center;justify-content:center;">📥 読み込み</label>
      <input type="file" id="importFile" accept="application/json" style="display:none;">
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" id="resetBannerBtn">🖼️ ヘッダー画像をリセット</button>
    </div>
    <div class="sheet-actions">
      <label class="btn-cancel" for="bgFile" style="text-align:center;display:flex;align-items:center;justify-content:center;">🌄 背景画像を設定</label>
      <input type="file" id="bgFile" accept="image/*" style="display:none;">
      <button class="btn-cancel" id="resetBgBtn">背景をリセット</button>
    </div>
    <label>フィード選択(複数可)</label>
    <div class="feed-checks" id="feedChecks"></div>
    <label>カスタムRSS URL(任意・1件)</label>
    <input type="text" id="feedUrlInput" placeholder="https://...">
    <div class="sheet-actions">
      <button class="btn-save" id="saveFeedBtn">フィードを更新</button>
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" id="settingsCloseBtn">閉じる</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'launcherApps';
const COORD_KEY = 'launcherCoords';
const BANNER_KEY = 'launcherBanner';
const BG_KEY = 'launcherBackground';
const FEED_KEY = 'launcherFeeds';
const FEED_PRESETS = [
  {url:'https://news.google.com/rss?hl=ja&gl=JP&ceid=JP:ja', label:'📰 総合(Googleニュース)'},
  {url:'https://news.yahoo.co.jp/rss/topics/top-picks.xml', label:'Yahoo!ニュース 主要'},
  {url:'https://www3.nhk.or.jp/rss/news/cat0.xml', label:'NHKニュース'},
  {url:'https://news.google.com/rss/headlines/section/topic/SPORTS?hl=ja&gl=JP&ceid=JP:ja', label:'スポーツ'},
  {url:'https://news.google.com/rss/headlines/section/topic/BUSINESS?hl=ja&gl=JP&ceid=JP:ja', label:'経済'},
  {url:'https://news.google.com/rss/search?q=競馬&hl=ja&gl=JP&ceid=JP:ja', label:'🐎 競馬ニュース'},
  {url:'https://news.google.com/rss/search?q=JRA&hl=ja&gl=JP&ceid=JP:ja', label:'🐎 JRA関連'}
];
const DEFAULT_FEEDS = [FEED_PRESETS[0].url];

const defaultApps = [
  {id:'keiba',  name:'競馬予想', url:'', icon:'icons/keiba.png'},
  {id:'db',     name:'DB分析',   url:'', icon:'icons/dbanalysis.png'},
  {id:'mytube', name:'mytube',   url:'', icon:'icons/mytube.png'},
  {id:'pass',   name:'PassVault',url:'', icon:'icons/passvault.png'}
];

function loadApps(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw) return defaultApps.slice();
  try{
    const arr = JSON.parse(raw);
    if(Array.isArray(arr) && arr.length) return arr;
  }catch(e){}
  return defaultApps.slice();
}
function saveApps(apps){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(apps));
}

let apps = loadApps();
let editingId = null;
let pickedIcon = null;

const grid = document.getElementById('appGrid');

function initialOf(name){
  return name ? name.trim().charAt(0).toUpperCase() : '?';
}

function launchApp(url){
  if(!url) return;
  window.location.href = url;
}

function renderGrid(){
  grid.innerHTML = '';
  apps.forEach(function(app){
    const card = document.createElement('div');
    card.className = 'app-card';

    const ic = document.createElement('div');
    ic.className = 'ic';
    if(app.icon){
      const img = document.createElement('img');
      img.src = app.icon;
      img.alt = '';
      ic.appendChild(img);
    }else{
      ic.textContent = initialOf(app.name);
    }
    card.appendChild(ic);

    const nameEl = document.createElement('div');
    nameEl.className = 'name';
    nameEl.textContent = app.name;
    card.appendChild(nameEl);

    const editBtn = document.createElement('button');
    editBtn.className = 'edit-btn';
    editBtn.textContent = '✏️';
    editBtn.addEventListener('click', function(e){
      e.stopPropagation();
      e.preventDefault();
      openEdit(app.id);
    });
    card.appendChild(editBtn);

    card.addEventListener('click', function(e){
      if(!app.url){
        e.preventDefault();
        openEdit(app.id);
        return;
      }
      launchApp(app.url);
    });

    grid.appendChild(card);
  });

  const addCard = document.createElement('div');
  addCard.className = 'app-card add-card';
  const addIc = document.createElement('div');
  addIc.className = 'ic';
  addIc.textContent = '+';
  addCard.appendChild(addIc);
  const addName = document.createElement('div');
  addName.className = 'name';
  addName.textContent = '追加';
  addCard.appendChild(addName);
  addCard.addEventListener('click', function(){ openAdd(); });
  grid.appendChild(addCard);
}

/* ---- edit / add modal ---- */
const overlay = document.getElementById('overlay');
const sheetTitle = document.getElementById('sheetTitle');
const appNameInput = document.getElementById('appName');
const appUrlInput = document.getElementById('appUrl');
const iconFile = document.getElementById('iconFile');
const iconPreview = document.getElementById('iconPreview');
const deleteRow = document.getElementById('deleteRow');

function showPreview(src, name){
  iconPreview.innerHTML = '';
  if(src){
    const img = document.createElement('img');
    img.src = src;
    iconPreview.appendChild(img);
  }else{
    iconPreview.textContent = initialOf(name);
  }
}

function openAdd(){
  editingId = null;
  pickedIcon = null;
  sheetTitle.textContent = 'アプリを追加';
  appNameInput.value = '';
  appUrlInput.value = '';
  deleteRow.style.display = 'none';
  showPreview(null, '');
  overlay.classList.add('show');
}

function openEdit(id){
  const app = apps.find(function(a){ return a.id === id; });
  if(!app) return;
  editingId = id;
  pickedIcon = app.icon || null;
  sheetTitle.textContent = 'アプリを編集';
  appNameInput.value = app.name;
  appUrlInput.value = app.url || '';
  deleteRow.style.display = 'flex';
  showPreview(app.icon, app.name);
  overlay.classList.add('show');
}

function closeSheet(){
  overlay.classList.remove('show');
}

document.getElementById('btnCancel').addEventListener('click', closeSheet);

iconFile.addEventListener('change', function(){
  const file = iconFile.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){
      const size = 192;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const scale = Math.max(size/img.width, size/img.height);
      const w = img.width*scale, h = img.height*scale;
      ctx.drawImage(img, (size-w)/2, (size-h)/2, w, h);
      pickedIcon = canvas.toDataURL('image/png');
      showPreview(pickedIcon, appNameInput.value);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

document.getElementById('btnSave').addEventListener('click', function(){
  const name = appNameInput.value.trim();
  const url = appUrlInput.value.trim();
  if(!name){ appNameInput.focus(); return; }

  if(editingId){
    const app = apps.find(function(a){ return a.id === editingId; });
    app.name = name;
    app.url = url;
    app.icon = pickedIcon;
  }else{
    apps.push({
      id: 'app_' + Date.now(),
      name: name,
      url: url,
      icon: pickedIcon
    });
  }
  saveApps(apps);
  renderGrid();
  closeSheet();
});

document.getElementById('btnDelete').addEventListener('click', function(){
  apps = apps.filter(function(a){ return a.id !== editingId; });
  saveApps(apps);
  renderGrid();
  closeSheet();
});

/* ---- search + suggestions ---- */
const searchInput = document.getElementById('searchInput');
const suggestList = document.getElementById('suggestList');
let suggestTimer = null;

function openSearch(q){
  if(!q) return;
  suggestList.style.display = 'none';
  window.open('https://www.google.com/search?q=' + encodeURIComponent(q), '_blank');
}

function showSuggestions(list){
  suggestList.innerHTML = '';
  if(!list || !list.length){
    suggestList.style.display = 'none';
    return;
  }
  list.slice(0, 6).forEach(function(text){
    const item = document.createElement('div');
    item.className = 'item';
    item.textContent = text;
    item.addEventListener('click', function(){
      searchInput.value = text;
      openSearch(text);
    });
    suggestList.appendChild(item);
  });
  suggestList.style.display = 'block';
}

function fetchSuggestions(query){
  const cbName = '__sugg_' + Date.now();
  const script = document.createElement('script');
  function cleanup(){
    delete window[cbName];
    if(script.parentNode) script.parentNode.removeChild(script);
  }
  window[cbName] = function(data){
    showSuggestions(data && data[1] ? data[1] : []);
    cleanup();
  };
  script.onerror = cleanup;
  script.src = 'https://suggestqueries.google.com/complete/search?client=chrome&jsonp=' + cbName + '&hl=ja&q=' + encodeURIComponent(query);
  document.body.appendChild(script);
}

searchInput.addEventListener('input', function(){
  const q = searchInput.value.trim();
  clearTimeout(suggestTimer);
  if(!q){
    suggestList.style.display = 'none';
    return;
  }
  suggestTimer = setTimeout(function(){ fetchSuggestions(q); }, 200);
});

document.addEventListener('click', function(e){
  if(!suggestList.contains(e.target) && e.target !== searchInput){
    suggestList.style.display = 'none';
  }
});

document.getElementById('searchForm').addEventListener('submit', function(e){
  e.preventDefault();
  openSearch(searchInput.value.trim());
});

/* ---- weather ---- */
const wIcon = document.getElementById('wIcon');
const wTemp = document.getElementById('wTemp');
const wPlace = document.getElementById('wPlace');
const wReload = document.getElementById('wReload');
const weatherWeek = document.getElementById('weatherWeek');
const weekdayNames = ['日','月','火','水','木','金','土'];
let currentPlaceName = '';

function weatherEmoji(code){
  if(code === 0) return {icon:'☀️', text:'晴れ'};
  if(code === 1 || code === 2) return {icon:'🌤️', text:'晴れ時々曇り'};
  if(code === 3) return {icon:'☁️', text:'曇り'};
  if(code === 45 || code === 48) return {icon:'🌫️', text:'霧'};
  if(code >= 51 && code <= 57) return {icon:'🌦️', text:'霧雨'};
  if(code >= 61 && code <= 65) return {icon:'🌧️', text:'雨'};
  if(code === 66 || code === 67) return {icon:'🌧️', text:'凍雨'};
  if(code >= 71 && code <= 77) return {icon:'🌨️', text:'雪'};
  if(code === 80 || code === 81 || code === 82) return {icon:'🌧️', text:'にわか雨'};
  if(code === 85 || code === 86) return {icon:'🌨️', text:'にわか雪'};
  if(code >= 95) return {icon:'⛈️', text:'雷雨'};
  return {icon:'🌡️', text:''};
}

function fetchPlaceName(lat, lon){
  const url = 'https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=' + lat + '&longitude=' + lon + '&localityLanguage=ja';
  fetch(url).then(function(r){ return r.json(); }).then(function(d){
    const place = d.city || d.locality || d.principalSubdivision || '';
    if(place){
      currentPlaceName = place;
      const condition = wPlace.dataset.condition || '';
      wPlace.textContent = place + (condition ? ' ・ ' + condition : '');
    }
  }).catch(function(){});
}

function renderWeekly(daily){
  weatherWeek.innerHTML = '';
  if(!daily || !daily.time) return;
  daily.time.forEach(function(dateStr, i){
    const d = new Date(dateStr);
    const w = weatherEmoji(daily.weathercode[i]);
    const max = Math.round(daily.temperature_2m_max[i]);
    const min = Math.round(daily.temperature_2m_min[i]);

    const day = document.createElement('div');
    day.className = 'day';

    const dname = document.createElement('div');
    dname.className = 'dname';
    dname.textContent = i === 0 ? '今日' : weekdayNames[d.getDay()];

    const dicon = document.createElement('div');
    dicon.className = 'dicon';
    dicon.textContent = w.icon;

    const dtemp = document.createElement('div');
    dtemp.className = 'dtemp';
    dtemp.textContent = max + '°/' + min + '°';

    day.appendChild(dname);
    day.appendChild(dicon);
    day.appendChild(dtemp);
    weatherWeek.appendChild(day);
  });
}

function fetchWeather(lat, lon){
  const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon
    + '&current_weather=true'
    + '&daily=temperature_2m_max,temperature_2m_min,weathercode'
    + '&forecast_days=7&timezone=auto';
  fetch(url).then(function(r){ return r.json(); }).then(function(d){
    const cw = d.current_weather;
    if(cw){
      const w = weatherEmoji(cw.weathercode);
      wIcon.textContent = w.icon;
      wTemp.textContent = Math.round(cw.temperature) + '℃';
      wPlace.dataset.condition = w.text;
      wPlace.textContent = w.text;
    }
    renderWeekly(d.daily);
    fetchPlaceName(lat, lon);
  }).catch(function(){
    wPlace.textContent = '天気を取得できませんでした';
  });
}

function loadWeather(){
  const cached = localStorage.getItem(COORD_KEY);
  if(cached){
    try{
      const c = JSON.parse(cached);
      fetchWeather(c.lat, c.lon);
    }catch(e){}
  }else{
    wPlace.textContent = '位置情報を取得中...';
  }

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(function(pos){
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      localStorage.setItem(COORD_KEY, JSON.stringify({lat:lat, lon:lon}));
      fetchWeather(lat, lon);
    }, function(err){
      if(!cached){
        wPlace.textContent = '位置情報が許可されていません';
        wIcon.textContent = '📍';
      }
    });
  }
}

wReload.addEventListener('click', function(e){
  e.stopPropagation();
  wPlace.textContent = '更新中...';
  loadWeather();
});

document.getElementById('weatherBox').addEventListener('click', function(){
  const q = (currentPlaceName ? currentPlaceName + ' ' : '') + '週間天気';
  window.open('https://www.google.com/search?q=' + encodeURIComponent(q), '_blank');
});

loadWeather();

      const canvas = document.createElement('canvas');
      canvas.width = targetW; canvas.height = targetH;
      const ctx = canvas.getContext('2d');
      const scale = Math.max(targetW/img.width, targetH/img.height);
      const w = img.width*scale, h = img.height*scale;

/* ---- background image ---- */
const bgFile = document.getElementById('bgFile');
const resetBgBtn = document.getElementById('resetBgBtn');

function applyBackground(){

    document.body.style.backgroundImage = 'url(' + data + ')';

bgFile.addEventListener('change', function(){
  const file = bgFile.files[0];
  bgFile.value = '';
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){
      const maxW = 1080;
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
      try{
        localStorage.setItem(BG_KEY, dataUrl);
        applyBackground();
      }catch(e){
        alert('画像の保存に失敗しました(サイズが大きすぎるかも)');
      }
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

resetBgBtn.addEventListener('click', function(){
  localStorage.removeItem(BG_KEY);
  applyBackground();
});

/* ---- feed ---- */
const feedList = document.getElementById('feedList');

function formatRelative(pubDate){
  const d = new Date(pubDate);
  if(isNaN(d.getTime())) return '';
  const diffMs = Date.now() - d.getTime();
  const diffH = Math.floor(diffMs / 3600000);
  if(diffH < 1) return '1時間以内';
  if(diffH < 24) return diffH + '時間前';
  return Math.floor(diffH / 24) + '日前';
}

function extractThumb(item){
  if(item.thumbnail) return item.thumbnail;
  if(item.enclosure && item.enclosure.link && /^image\//.test(item.enclosure.type || '')){
    return item.enclosure.link;
  }
  const html = item.description || item.content || '';
  const m = html.match(/<img[^>]+src="([^"]+)"/i);
  return m ? m[1] : '';
}

function renderFeed(items){
  feedList.innerHTML = '';
  if(!items || !items.length){
    const empty = document.createElement('div');
    empty.className = 'feed-empty';
    empty.textContent = 'フィードを取得できませんでした';
    feedList.appendChild(empty);
    return;
  }
  items.slice(0, 14).forEach(function(item){
    const card = document.createElement('a');
    card.className = 'feed-card';
    card.href = item.link;
    card.target = '_blank';
    card.rel = 'noopener';

    const thumb = document.createElement('div');
    thumb.className = 'feed-thumb';
    const thumbUrl = extractThumb(item);
    if(thumbUrl){
      const timg = document.createElement('img');
      timg.src = thumbUrl;
      timg.alt = '';
      timg.loading = 'lazy';
      timg.onerror = function(){
        thumb.innerHTML = '';
        thumb.textContent = '📰';
      };
      thumb.appendChild(timg);
    }else{
      thumb.textContent = '📰';
    }

    const body = document.createElement('div');
    body.className = 'feed-body';

    const title = document.createElement('div');
    title.className = 'feed-card-title';
    title.textContent = item.title || '';

    const meta = document.createElement('div');
    meta.className = 'feed-meta';
    const src = (item.source && item.source.name) || item.author || '';
    const date = formatRelative(item.pubDate);
    meta.textContent = [src, date].filter(Boolean).join(' ・ ');

    body.appendChild(title);
    body.appendChild(meta);

    card.appendChild(thumb);
    card.appendChild(body);
    feedList.appendChild(card);
  });
}

function getSavedFeeds(){
  const raw = localStorage.getItem(FEED_KEY);
  if(!raw) return DEFAULT_FEEDS.slice();
  try{
    const arr = JSON.parse(raw);
    if(Array.isArray(arr) && arr.length) return arr;
  }catch(e){
    // legacy: previously stored as a plain URL string
    if(raw.indexOf('http') === 0) return [raw];
  }
  return DEFAULT_FEEDS.slice();
}

function loadFeed(){
  const feeds = getSavedFeeds();
  feedList.innerHTML = '<div class="feed-empty">読み込み中...</div>';
  const requests = feeds.map(function(url){
    const api = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(url);
    return fetch(api).then(function(r){ return r.json(); }).then(function(d){
      return d.items || [];
    }).catch(function(){ return []; });
  });
  Promise.all(requests).then(function(results){
    let all = [];
    results.forEach(function(items){ all = all.concat(items); });
    all.sort(function(a, b){
      return new Date(b.pubDate) - new Date(a.pubDate);
    });
    renderFeed(all);
  });
}
loadFeed();

/* ---- refresh button ---- */
document.getElementById('refreshBtn').addEventListener('click', function(){
  if('serviceWorker' in navigator && 'caches' in window){
    Promise.all([
      navigator.serviceWorker.getRegistrations().then(function(regs){
        return Promise.all(regs.map(function(r){ return r.update(); }));
      }),
      caches.keys().then(function(keys){
        return Promise.all(keys.map(function(k){ return caches.delete(k); }));
      })
    ]).then(function(){
      location.reload();
    }).catch(function(){
      location.reload();
    });
  }else{
    location.reload();
  }
});

/* ---- settings: backup / restore ---- */
const settingsOverlay = document.getElementById('settingsOverlay');
const feedUrlInput = document.getElementById('feedUrlInput');
const feedChecks = document.getElementById('feedChecks');

FEED_PRESETS.forEach(function(preset, i){
  const label = document.createElement('label');
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.value = preset.url;
  cb.id = 'feedCheck_' + i;
  const span = document.createElement('span');
  span.textContent = preset.label;
  label.appendChild(cb);
  label.appendChild(span);
  feedChecks.appendChild(label);
});

document.getElementById('settingsBtn').addEventListener('click', function(){
  const saved = getSavedFeeds();
  let customUrl = '';
  const checks = feedChecks.querySelectorAll('input[type=checkbox]');
  checks.forEach(function(cb){
    cb.checked = saved.indexOf(cb.value) !== -1;
  });
  saved.forEach(function(url){
    const isPreset = FEED_PRESETS.some(function(p){ return p.url === url; });
    if(!isPreset) customUrl = url;
  });
  feedUrlInput.value = customUrl;
  settingsOverlay.classList.add('show');
});
document.getElementById('settingsCloseBtn').addEventListener('click', function(){
  settingsOverlay.classList.remove('show');
});

document.getElementById('feedRefreshBtn').addEventListener('click', function(){
  loadFeed();
});

document.getElementById('saveFeedBtn').addEventListener('click', function(){
  const selected = [];
  const checks = feedChecks.querySelectorAll('input[type=checkbox]');
  checks.forEach(function(cb){
    if(cb.checked) selected.push(cb.value);
  });
  const custom = feedUrlInput.value.trim();
  if(custom) selected.push(custom);

  if(!selected.length){
    localStorage.removeItem(FEED_KEY);
  }else{
    localStorage.setItem(FEED_KEY, JSON.stringify(selected));
  }
  loadFeed();
  settingsOverlay.classList.remove('show');
});

document.getElementById('resetBannerBtn').addEventListener('click', function(){
  localStorage.removeItem(BANNER_KEY);
  applyBanner();
});

document.getElementById('exportBtn').addEventListener('click', function(){
  const data = JSON.stringify(apps, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'launcher-settings.json';
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
});

document.getElementById('importFile').addEventListener('change', function(){
  const file = this.files[0];
  this.value = '';
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    try{
      const arr = JSON.parse(ev.target.result);
      if(!Array.isArray(arr)) throw new Error('invalid');
      apps = arr;
      saveApps(apps);
      renderGrid();
      settingsOverlay.classList.remove('show');
      alert('設定を読み込みました');
    }catch(err){
      alert('読み込みに失敗しました。正しいファイルか確認してね');
    }
  };
  reader.readAsText(file);
});

/* service worker */
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
