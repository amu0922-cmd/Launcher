<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="theme-color" content="#ec4464">
<title>ホームランチャー</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root{
    --bg:#eef0f6;
    --card:rgba(255,255,255,.6);
    --card-solid:#ffffff;
    --card2:#f4f5fa;
    --text:#2d2a45;
    --sub:#9a96b3;
    --accent:#ec4464;
    --accent2:#ec4464;
    --border:#e6e8f2;
  }
  body.dark{
    --bg:#1a1825;
    --card:rgba(38,35,51,.6);
    --card-solid:#262333;
    --card2:#322e44;
    --text:#f1eefb;
    --sub:#a9a3c4;
    --border:#3c3852;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:"Hiragino Sans","Noto Sans JP",sans-serif;
    overflow:hidden;
  }
  .pager{
    position:relative;
    width:100%;height:100%;
    overflow:hidden;
  }
  .pager-inner{
    display:flex;
    width:300%;
    height:100%;
    transition:transform .35s cubic-bezier(.25,.46,.45,.94);
    will-change:transform;
  }
  .page{
    flex:0 0 calc(100% / 3);
    width:calc(100% / 3);
    height:100%;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:env(safe-area-inset-top) 14px calc(env(safe-area-inset-bottom) + 90px) 14px;
  }
  .wrap{max-width:480px;margin:0 auto;}

  /* page dots */
  .page-dots{
    position:fixed;
    bottom:calc(env(safe-area-inset-bottom) + 82px);
    left:0;right:0;
    display:flex;justify-content:center;gap:6px;
    pointer-events:none;
    z-index:40;
  }
  .page-dots .dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--sub);opacity:.4;
    transition:opacity .2s, transform .2s;
  }
  .page-dots .dot.active{opacity:1;background:var(--accent);transform:scale(1.25);}

  /* feed page header */
  .page-header{
    display:flex;align-items:center;justify-content:space-between;
    margin:14px 0 14px;
  }
  .page-header h2{font-size:17px;font-weight:800;margin:0;}
  .page-icon-btn{
    background:var(--card);border:none;
    width:36px;height:36px;border-radius:50%;
    font-size:16px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 1px 4px rgba(0,0,0,.08);color:var(--text);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  }

  /* inline weekly weather strip */
  .weather-strip{
    display:flex;
    align-items:center;
    gap:4px;
    padding:14px 4px 6px;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
  }
  .weather-strip::-webkit-scrollbar{display:none;}
  .ws-day{
    flex:1 0 auto;
    min-width:40px;
    text-align:center;
    color:var(--text);
  }
  .ws-day .ws-name{
    font-size:11px;font-weight:700;
    color:var(--sub);margin-bottom:3px;
  }
  .ws-day .ws-icon{font-size:20px;line-height:1;}
  .ws-day .ws-temp{
    font-size:10px;color:var(--sub);
    margin-top:3px;white-space:nowrap;
  }
  .ws-reload{
    background:none;border:none;color:var(--sub);
    font-size:14px;padding:4px 6px;flex-shrink:0;opacity:.6;
  }

  /* banner */
  /* toolbar row */
  .home-toolbar{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:4px;
    padding:10px 2px 0;
  }
  .toolbar-btn{
    width:36px;height:36px;border-radius:50%;
    border:none;
    background:transparent;
    color:var(--sub);
    font-size:18px;
    display:flex;align-items:center;justify-content:center;
    opacity:.7;
  }
  .toolbar-btn:active{opacity:1;background:var(--card2);}

  /* feed */
  .feed-section{margin-top:18px;}
  .feed-heading{
    font-size:13px;font-weight:800;color:var(--text);
    margin-bottom:8px;display:flex;align-items:center;gap:6px;
  }
  .feed-list{display:flex;flex-direction:column;gap:10px;}
  .feed-card{
    display:block;
    background:var(--card);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 2px 6px rgba(0,0,0,.06);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  }
  .feed-thumb-img{
    width:100%;
    aspect-ratio:16/9;
    object-fit:cover;
    display:block;
  }
  .feed-link{
    display:flex;
    align-items:flex-start;
    gap:12px;
    text-decoration:none;
    color:var(--text);
    padding:14px 14px 0;
  }
  .feed-link.has-thumb{
    padding:12px 14px 0;
  }
  .feed-icon{
    width:36px;height:36px;
    border-radius:10px;
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-size:15px;font-weight:800;
    color:#fff;
  }
  .feed-card:nth-child(6n+1) .feed-icon{background:#ec4464;}
  .feed-card:nth-child(6n+2) .feed-icon{background:#f5a623;}
  .feed-card:nth-child(6n+3) .feed-icon{background:#4f8cff;}
  .feed-card:nth-child(6n+4) .feed-icon{background:#39b873;}
  .feed-card:nth-child(6n+5) .feed-icon{background:#9b6cf0;}
  .feed-card:nth-child(6n+6) .feed-icon{background:#30b6c9;}
  .feed-card-title{
    flex:1;
    font-size:14px;font-weight:700;line-height:1.5;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
  }
  .feed-meta-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:8px 14px 12px;
  }
  .feed-meta{font-size:11px;color:var(--sub);}
  .feed-share{
    background:none;border:none;color:var(--sub);font-size:17px;
    padding:4px 6px;flex-shrink:0;
  }
  .feed-empty{font-size:12px;color:var(--sub);padding:10px 2px;}


  /* divider */
  .divider{
    height:4px;
    background:var(--accent);
    border-radius:2px;
    margin:14px 0 16px;
    opacity:.85;
  }

  /* search */
  /* fixed bottom search bar */
  .search-bar-fixed{
    position:fixed;
    bottom:calc(env(safe-area-inset-bottom) + 18px);
    left:50%;transform:translateX(-50%);
    width:calc(100% - 28px);
    max-width:452px;
    z-index:40;
    transition:bottom .15s;
  }
  .suggest-list{
    position:absolute;
    bottom:calc(100% + 8px);
    left:0;right:0;
    background:var(--card);
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 -4px 20px rgba(0,0,0,.18);
    display:none;
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    max-height:280px;
    overflow-y:auto;
  }
  .suggest-list .item{
    display:flex;align-items:center;gap:12px;
    padding:12px 18px;
    font-size:14px;
    border-bottom:1px solid var(--border);
    color:var(--text);
  }
  .suggest-list .item:last-child{border-bottom:none;}
  .suggest-list .item:active{background:var(--card2);}
  .suggest-list .item::before{content:'🔍';font-size:12px;opacity:.45;}
  .search-box{
    display:flex;
    align-items:center;
    background:var(--card);
    border-radius:999px;
    padding:6px 6px 6px 16px;
    box-shadow:0 4px 20px rgba(0,0,0,.18);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid var(--border);
  }
  .search-g-logo{
    font-size:17px;font-weight:900;
    margin-right:4px;flex-shrink:0;
    background:linear-gradient(135deg,#4285f4,#34a853,#fbbc05,#ea4335);
    -webkit-background-clip:text;background-clip:text;
    color:transparent;
  }
  .search-box input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:var(--text);
    font-size:16px;
    padding:10px 0;
  }
  .search-box input::placeholder{color:var(--sub);}
  .search-box button{
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:999px;
    width:42px;height:42px;
    font-size:18px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }

  /* extra bottom padding on home page so links aren't hidden behind search bar */
  #pageHome .wrap{
    padding-bottom:90px;
  }

  /* app grid */
  .grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
  }
  .app-card{
    position:relative;
    background:var(--card);
    border-radius:16px;
    padding:10px 6px 8px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-decoration:none;
    color:var(--text);
    box-shadow:0 2px 8px rgba(0,0,0,.06);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  }
  .app-card .ic{
    width:56px;height:56px;
    border-radius:14px;
    overflow:hidden;
    background:var(--card2);
    display:flex;align-items:center;justify-content:center;
    margin-bottom:6px;
    font-size:24px;
    font-weight:700;
    color:var(--accent);
  }
  .app-card:nth-child(6n+1) .ic{background:#ffe1e6;}
  .app-card:nth-child(6n+2) .ic{background:#fff4d6;}
  .app-card:nth-child(6n+3) .ic{background:#e1ecff;}
  .app-card:nth-child(6n+4) .ic{background:#e1f7e8;}
  .app-card:nth-child(6n+5) .ic{background:#f0e6ff;}
  .app-card:nth-child(6n+6) .ic{background:#e6f7ff;}
  .app-card .ic img{width:100%;height:100%;object-fit:cover;display:block;}
  .app-card .name{
    font-size:12px;
    font-weight:700;
    text-align:center;
    line-height:1.3;
    word-break:break-all;
    max-width:100%;
  }
  .app-card .edit-btn{
    position:absolute;
    top:4px;right:4px;
    width:24px;height:24px;
    border-radius:50%;
    background:rgba(0,0,0,.25);
    border:none;
    color:#fff;
    font-size:12px;
    display:flex;align-items:center;justify-content:center;
  }
  .add-card{
    background:transparent;
    border:2px dashed var(--border);
    color:var(--sub);
    box-shadow:none;
    backdrop-filter:none;-webkit-backdrop-filter:none;
  }
  .add-card .ic{background:transparent;font-size:28px;color:var(--sub);}

  /* category tabs */
  .category-tabs{
    display:none;
    gap:8px;
    overflow-x:auto;
    margin-top:14px;
    padding-bottom:2px;
  }
  .category-tab{
    flex:0 0 auto;
    padding:8px 16px;
    border-radius:999px;
    border:1.5px solid var(--border);
    background:var(--card);
    color:var(--text);
    font-size:13px;font-weight:700;
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  }
  .category-tab.active{
    border-color:var(--accent);
    color:var(--accent);
  }
  .category-tab-add{
    color:var(--sub);
    border-color:transparent;
    background:transparent;
    font-size:16px;
    padding:8px 10px;
    opacity:.55;
  }
  .category-order-list{
    display:flex;flex-direction:column;gap:6px;margin-top:6px;
  }
  .category-order-item{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--card2);
    border-radius:10px;
    padding:8px 12px;
    font-size:13px;
    color:var(--text);
  }
  .category-order-item .order-btns{display:flex;gap:4px;}
  .category-order-item button{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:8px;
    width:30px;height:30px;
    font-size:13px;
    color:var(--text);
  }
  .category-order-item button:disabled{opacity:.35;}
  .category-order-empty{font-size:12px;color:var(--sub);padding:4px 2px;}

  /* wide banner links */
  .layout-toggle{
    display:flex;gap:8px;margin-top:6px;
  }
  .layout-btn{
    flex:1;
    padding:10px 6px;
    border-radius:10px;
    border:1.5px solid var(--border);
    background:var(--card2);
    color:var(--sub);
    font-size:13px;font-weight:700;
  }
  .layout-btn.active{
    border-color:var(--accent);
    color:var(--accent);
  }
  .banner-links{
    display:flex;flex-direction:column;gap:12px;
    margin-top:14px;
  }
  .banner-links .square-row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
  }
  .banner-link-card{
    position:relative;
    display:block;
    aspect-ratio:3/1;
    border-radius:14px;
    overflow:hidden;
    background:var(--card);
    box-shadow:0 2px 8px rgba(0,0,0,.06);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  }
  .banner-link-card.square{
    aspect-ratio:1/1;
  }
  .banner-link-card.square .banner-link-title{
    font-size:11px;
  }
  .banner-link-card img{
    width:100%;height:100%;object-fit:cover;display:block;
  }
  .banner-link-overlay{
    position:absolute;inset:0;
    display:flex;align-items:flex-end;
    padding:10px 10px;
    background:linear-gradient(to top, rgba(0,0,0,.55), rgba(0,0,0,0) 50%);
    pointer-events:none;
  }
  .banner-link-title{
    display:inline-block;
    color:#fff;
    font-size:13px;font-weight:800;
    letter-spacing:.03em;
    background:rgba(0,0,0,.52);
    backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
    padding:4px 10px;
    border-radius:999px;
    max-width:calc(100% - 36px);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .banner-link-card .edit-btn{
    position:absolute;
    top:6px;right:6px;
    width:26px;height:26px;
    border-radius:50%;
    background:rgba(0,0,0,.35);
    border:none;
    color:#fff;
    font-size:12px;
    display:flex;align-items:center;justify-content:center;
  }
  .banner-link-empty{
    height:100%;
    display:flex;align-items:center;justify-content:center;
    text-align:center;
    font-size:12px;
    color:var(--sub);
  }
  .banner-link-add{
    border:2px dashed var(--border);
    border-radius:14px;
    height:54px;
    display:flex;align-items:center;justify-content:center;
    color:var(--sub);
    font-size:24px;
    background:transparent;
  }
  .link-preview{
    width:100%;
    min-height:60px;
    border-radius:10px;
    background:var(--card2);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
    color:var(--sub);
    font-size:12px;
    margin-top:6px;
  }
  .link-preview img{width:100%;display:block;}

  /* modal */
  .overlay{
    position:fixed;inset:0;
    background:rgba(0,0,0,.45);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:50;
  }
  .overlay.show{display:flex;}
  .sheet{
    background:var(--card-solid);
    border-radius:20px 20px 0 0;
    width:100%;max-width:480px;
    max-height:85vh;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:20px 20px calc(env(safe-area-inset-bottom) + 20px);
  }
  .sheet h2{margin:0 0 14px;font-size:16px;color:var(--text);}
  .sheet label{font-size:12px;color:var(--sub);display:block;margin:10px 0 4px;}
  .sheet input[type=text],.sheet input[type=url]{
    width:100%;
    background:var(--card2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 12px;
    color:var(--text);
    font-size:15px;
  }
  .sheet select{
    width:100%;
    background:var(--card2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 12px;
    color:var(--text);
    font-size:14px;
    -webkit-appearance:none;
    appearance:none;
  }
  .feed-checks{
    display:flex;flex-direction:column;gap:6px;margin-top:6px;
  }
  .feed-checks label{
    display:flex;align-items:center;gap:10px;
    background:var(--card2);
    border-radius:10px;
    padding:10px 12px;
    font-size:13px;
    color:var(--text);
    margin:0;
  }
  .feed-checks input{width:18px;height:18px;accent-color:var(--accent);flex-shrink:0;}
  .icon-pick{
    display:flex;align-items:center;gap:12px;margin-top:6px;
  }
  .icon-pick .preview{
    width:48px;height:48px;border-radius:12px;background:var(--card2);
    display:flex;align-items:center;justify-content:center;overflow:hidden;
    font-weight:700;color:var(--accent);font-size:20px;
  }
  .icon-pick .preview img{width:100%;height:100%;object-fit:cover;}
  .icon-pick label.file-label{
    background:var(--card2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:8px 14px;
    font-size:13px;
    color:var(--text);
    margin:0;
  }
  .sheet-actions{display:flex;gap:10px;margin-top:18px;}
  .sheet-actions button{
    flex:1;
    border:none;border-radius:12px;
    padding:12px;
    font-size:15px;font-weight:700;
  }
  .btn-save{background:var(--accent);color:#fff;}
  .btn-cancel{background:var(--card2);color:var(--text);}
  .btn-delete{background:#ffe1e6;color:#d23a55;}
</style>
</head>
<body>
<div class="pager" id="pager">
<div class="pager-inner" id="pagerInner">

  <div class="page" id="pageFavorites">
    <div class="wrap">
      <div class="page-header">
        <h2>⭐ お気に入り</h2>
      </div>
      <div class="feed-list" id="favoritesList"></div>
    </div>
  </div>

  <div class="page" id="pageHome">
    <div class="wrap">

      <!-- weekly weather strip -->
      <div class="weather-strip" id="weatherBox">
        <div class="weather-week" id="weatherWeek" style="display:contents;"></div>
        <button class="ws-reload" id="wReload" title="更新">↻</button>
      </div>

      <!-- toolbar -->
      <div class="home-toolbar">
        <button class="toolbar-btn" id="themeBtn" title="テーマ切替">🌙</button>
        <button class="toolbar-btn" id="refreshBtn" title="更新">🔄</button>
        <button class="toolbar-btn" id="settingsBtn" title="設定">⚙️</button>
      </div>

      <div class="divider"></div>

      <div class="grid" id="appGrid" style="display:none;"></div>

      <div class="category-tabs" id="categoryTabs"></div>
      <div class="banner-links" id="bannerLinks"></div>

    </div>
  </div>

  <div class="page" id="pageFeed">
    <div class="wrap">
      <div class="page-header">
        <h2>📰 フィード</h2>
        <button class="page-icon-btn" id="feedRefreshBtn" title="更新">🔄</button>
      </div>
      <div class="feed-list" id="feedList"></div>
    </div>
  </div>

</div><!-- end pager-inner -->
</div><!-- end pager -->

<div class="search-bar-fixed" id="searchBarFixed">
  <div class="suggest-list" id="suggestList"></div>
  <form class="search-box" id="searchForm" autocomplete="off">
    <span class="search-g-logo">G</span>
    <input type="text" id="searchInput" placeholder="Google で検索" autocomplete="off">
    <button type="submit">🔍</button>
  </form>
</div>

<div class="page-dots">
  <span class="dot" data-page="0"></span>
  <span class="dot active" data-page="1"></span>
  <span class="dot" data-page="2"></span>
</div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <h2 id="sheetTitle">アプリを追加</h2>
    <label>アプリ名</label>
    <input type="text" id="appName" placeholder="例: 競馬予想">
    <label>URL</label>
    <input type="url" id="appUrl" placeholder="https://example.github.io/app/">
    <label>アイコン</label>
    <div class="icon-pick">
      <div class="preview" id="iconPreview">A</div>
      <label class="file-label" for="iconFile">画像を選択</label>
      <input type="file" id="iconFile" accept="image/*" style="display:none;">
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" id="btnCancel">キャンセル</button>
      <button class="btn-save" id="btnSave">保存</button>
    </div>
    <div class="sheet-actions" id="deleteRow" style="display:none;">
      <button class="btn-delete" id="btnDelete">このアプリを削除</button>
    </div>
  </div>
</div>

<div class="overlay" id="linkOverlay">
  <div class="sheet">
    <h2 id="linkSheetTitle">リンクを追加</h2>
    <label>表示形式</label>
    <div class="layout-toggle">
      <button class="layout-btn active" id="layoutBanner" data-layout="banner">📰 横長バナー</button>
      <button class="layout-btn" id="layoutSquare" data-layout="square">🟦 正方形</button>
    </div>

<script>
const STORAGE_KEY = 'launcherApps';
const COORD_KEY = 'launcherCoords';
const BANNER_KEY = 'launcherBanner';
const BG_KEY = 'launcherBackground';
const FEED_KEY = 'launcherFeeds';
const FEED_PRESETS = [
  {url:'https://news.google.com/rss?hl=ja&gl=JP&ceid=JP:ja', label:'📰 総合(Googleニュース)'},
  {url:'https://news.yahoo.co.jp/rss/topics/top-picks.xml', label:'Yahoo!ニュース 主要'},
  {url:'https://www3.nhk.or.jp/rss/news/cat0.xml', label:'NHKニュース'},
  {url:'https://news.google.com/rss/headlines/section/topic/SPORTS?hl=ja&gl=JP&ceid=JP:ja', label:'スポーツ'},
  {url:'https://news.google.com/rss/headlines/section/topic/BUSINESS?hl=ja&gl=JP&ceid=JP:ja', label:'経済'},
  {url:'https://news.google.com/rss/search?q=競馬&hl=ja&gl=JP&ceid=JP:ja', label:'🐎 競馬ニュース'},
  {url:'https://news.google.com/rss/search?q=JRA&hl=ja&gl=JP&ceid=JP:ja', label:'🐎 JRA関連'},
  {url:'https://gigazine.net/news/rss_2.0/', label:'GIGAZINE'},
  {url:'https://blog.livedoor.jp/dqnplus/index.rdf', label:'痛いニュース(ノ∀`)'},
  {url:'https://rss.itmedia.co.jp/rss/2.0/netlab.xml', label:'ねとらぼ'},
  {url:'https://hamusoku.com/index.rdf', label:'ハムスター速報'}
];
const DEFAULT_FEEDS = [FEED_PRESETS[0].url];

const defaultApps = [
  {id:'keiba',  name:'競馬予想', url:'', icon:'icons/keiba.png'},
  {id:'db',     name:'DB分析',   url:'', icon:'icons/dbanalysis.png'},
  {id:'mytube', name:'mytube',   url:'', icon:'icons/mytube.png'},
  {id:'pass',   name:'PassVault',url:'', icon:'icons/passvault.png'}
];

function loadApps(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw) return defaultApps.slice();
  try{
    const arr = JSON.parse(raw);
    if(Array.isArray(arr) && arr.length) return arr;
  }catch(e){}
  return defaultApps.slice();
}
function saveApps(apps){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(apps));
}

let apps = loadApps();
let editingId = null;
let pickedIcon = null;

const grid = document.getElementById('appGrid');

function initialOf(name){
  return name ? name.trim().charAt(0).toUpperCase() : '?';
}

function launchApp(url){
  if(!url) return;
  window.location.href = url;
}

function renderGrid(){
  grid.innerHTML = '';
  apps.forEach(function(app){
    const card = document.createElement('div');
    card.className = 'app-card';

    const ic = document.createElement('div');
    ic.className = 'ic';
    if(app.icon){
      const img = document.createElement('img');
      img.src = app.icon;
      img.alt = '';
      ic.appendChild(img);
    }else{
      ic.textContent = initialOf(app.name);
    }
    card.appendChild(ic);

    const nameEl = document.createElement('div');
    nameEl.className = 'name';
    nameEl.textContent = app.name;
    card.appendChild(nameEl);

    const editBtn = document.createElement('button');
    editBtn.className = 'edit-btn';
    editBtn.textContent = '✏️';
    editBtn.addEventListener('click', function(e){
      e.stopPropagation();
      e.preventDefault();
      openEdit(app.id);
    });
    card.appendChild(editBtn);

    card.addEventListener('click', function(e){
      if(!app.url){
        e.preventDefault();
        openEdit(app.id);
        return;
      }
      launchApp(app.url);
    });

    grid.appendChild(card);
  });

  const addCard = document.createElement('div');
  addCard.className = 'app-card add-card';
  const addIc = document.createElement('div');
  addIc.className = 'ic';
  addIc.textContent = '+';
  addCard.appendChild(addIc);
  const addName = document.createElement('div');
  addName.className = 'name';
  addName.textContent = '追加';
  addCard.appendChild(addName);
  addCard.addEventListener('click', function(){ openAdd(); });
  grid.appendChild(addCard);
}

/* ---- edit / add modal ---- */
const overlay = document.getElementById('overlay');
const sheetTitle = document.getElementById('sheetTitle');
const appNameInput = document.getElementById('appName');
const appUrlInput = document.getElementById('appUrl');
const iconFile = document.getElementById('iconFile');
const iconPreview = document.getElementById('iconPreview');
const deleteRow = document.getElementById('deleteRow');

function showPreview(src, name){
  iconPreview.innerHTML = '';
  if(src){
    const img = document.createElement('img');
    img.src = src;
    iconPreview.appendChild(img);
  }else{
    iconPreview.textContent = initialOf(name);
  }
}

function openAdd(){
  editingId = null;
  pickedIcon = null;
  sheetTitle.textContent = 'アプリを追加';
  appNameInput.value = '';
  appUrlInput.value = '';
  deleteRow.style.display = 'none';
  showPreview(null, '');
  overlay.classList.add('show');
}

function openEdit(id){
  const app = apps.find(function(a){ return a.id === id; });
  if(!app) return;
  editingId = id;
  pickedIcon = app.icon || null;
  sheetTitle.textContent = 'アプリを編集';
  appNameInput.value = app.name;
  appUrlInput.value = app.url || '';
  deleteRow.style.display = 'flex';
  showPreview(app.icon, app.name);
  overlay.classList.add('show');
}

function closeSheet(){
  overlay.classList.remove('show');
}

document.getElementById('btnCancel').addEventListener('click', closeSheet);

iconFile.addEventListener('change', function(){
  const file = iconFile.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){
      const size = 192;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const scale = Math.max(size/img.width, size/img.height);
      const w = img.width*scale, h = img.height*scale;
      ctx.drawImage(img, (size-w)/2, (size-h)/2, w, h);
      pickedIcon = canvas.toDataURL('image/png');
      showPreview(pickedIcon, appNameInput.value);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

document.getElementById('btnSave').addEventListener('click', function(){
  const name = appNameInput.value.trim();
  const url = appUrlInput.value.trim();
  if(!name){ appNameInput.focus(); return; }

  if(editingId){
    const app = apps.find(function(a){ return a.id === editingId; });
    app.name = name;
    app.url = url;
    app.icon = pickedIcon;
  }else{
    apps.push({
      id: 'app_' + Date.now(),
      name: name,
      url: url,
      icon: pickedIcon
    });
  }
  saveApps(apps);
  renderGrid();
  closeSheet();
});

document.getElementById('btnDelete').addEventListener('click', function(){
  apps = apps.filter(function(a){ return a.id !== editingId; });
  saveApps(apps);
  renderGrid();
  closeSheet();
});

renderGrid();

/* ---- wide banner links ---- */
const LINKS_KEY = 'launcherBannerLinks';
const CATEGORY_KEY = 'launcherBannerCategory';
const CATEGORY_ORDER_KEY = 'launcherCategoryOrder';
const linksContainer = document.getElementById('bannerLinks');
const categoryTabsEl = document.getElementById('categoryTabs');
let bannerLinks = loadBannerLinks();
let currentCategory = localStorage.getItem(CATEGORY_KEY) || 'すべて';
let editingLinkId = null;
let pickedLinkImage = null;
let pickedLayout = 'banner';

function loadBannerLinks(){
  const raw = localStorage.getItem(LINKS_KEY);
  if(!raw) return [];
  try{
    const arr = JSON.parse(raw);
    if(Array.isArray(arr)) return arr;
  }catch(e){}
  return [];
}
function saveBannerLinks(){
  try{
    localStorage.setItem(LINKS_KEY, JSON.stringify(bannerLinks));
    return true;
  }catch(e){
    alert('保存に失敗しました。端末の保存容量がいっぱいの可能性があります。⚙️設定の「使用容量」を確認し、不要な画像を減らすか書き出し(バックアップ)してから整理してください。');
    return false;
  }
}

function getCategoryList(){
  const set = new Set();
  let hasUncategorized = false;
  bannerLinks.forEach(function(item){
    if(item.category && item.category.trim()){
      set.add(item.category.trim());
    }else{
      hasUncategorized = true;
    }
  });
  const cats = Array.from(set);
  if(hasUncategorized) cats.push('未分類');
  return cats;
}

function getOrderedCategories(){
  const cats = getCategoryList();
  let order = [];
  try{
    const raw = localStorage.getItem(CATEGORY_ORDER_KEY);
    if(raw) order = JSON.parse(raw);
    if(!Array.isArray(order)) order = [];
  }catch(e){ order = []; }

  const ordered = order.filter(function(c){ return cats.indexOf(c) !== -1; });
  cats.forEach(function(c){
    if(ordered.indexOf(c) === -1) ordered.push(c);
  });
  if(JSON.stringify(ordered) !== JSON.stringify(order)){
    localStorage.setItem(CATEGORY_ORDER_KEY, JSON.stringify(ordered));
  }
  return ordered;
}

function renderCategoryTabs(){
  const cats = getOrderedCategories();
  categoryTabsEl.innerHTML = '';
  categoryTabsEl.style.display = 'flex';

  if(cats.length){
    if(cats.indexOf(currentCategory) === -1) currentCategory = cats[0];
    localStorage.setItem(CATEGORY_KEY, currentCategory);
    cats.forEach(function(cat){
      const tab = document.createElement('button');
      tab.className = 'category-tab' + (cat === currentCategory ? ' active' : '');
      tab.textContent = cat;
      tab.addEventListener('click', function(){
        currentCategory = cat;
        localStorage.setItem(CATEGORY_KEY, currentCategory);
        renderCategoryTabs();
        renderBannerLinks();
      });
      categoryTabsEl.appendChild(tab);
    });
  }

  /* subtle add button always at end */
  const addTab = document.createElement('button');
  addTab.className = 'category-tab category-tab-add';
  addTab.textContent = '＋';
  addTab.title = 'リンクを追加';
  addTab.addEventListener('click', function(){ openLinkAdd(); });
  categoryTabsEl.appendChild(addTab);
}

function getFilteredLinks(){
  const cats = getOrderedCategories();
  if(!cats.length) return bannerLinks;
  return bannerLinks.filter(function(item){
    const cat = (item.category && item.category.trim()) || '未分類';
    return cat === currentCategory;
  });
}

function renderCategoryOrderList(){
  const list = document.getElementById('categoryOrderList');
  const cats = getOrderedCategories();
  list.innerHTML = '';
  if(!cats.length){
    const empty = document.createElement('div');
    empty.className = 'category-order-empty';
    empty.textContent = 'カテゴリが未設定です';
    list.appendChild(empty);
    return;
  }
  cats.forEach(function(cat, i){
    const row = document.createElement('div');
    row.className = 'category-order-item';

    const name = document.createElement('div');
    name.textContent = cat;

    const btns = document.createElement('div');
    btns.className = 'order-btns';

    const up = document.createElement('button');
    up.textContent = '▲';
    up.disabled = (i === 0);
    up.addEventListener('click', function(){ moveCategory(i, -1); });

    const down = document.createElement('button');
    down.textContent = '▼';
    down.disabled = (i === cats.length - 1);
    down.addEventListener('click', function(){ moveCategory(i, 1); });

    btns.appendChild(up);
    btns.appendChild(down);
    row.appendChild(name);
    row.appendChild(btns);
    list.appendChild(row);
  });
}

function moveCategory(index, dir){
  const cats = getOrderedCategories();
  const target = index + dir;
  if(target < 0 || target >= cats.length) return;
  const tmp = cats[index];
  cats[index] = cats[target];
  cats[target] = tmp;
  localStorage.setItem(CATEGORY_ORDER_KEY, JSON.stringify(cats));
  renderCategoryOrderList();
  renderCategoryTabs();
  renderBannerLinks();
}

function makeLinkCard(item){
  const card = document.createElement('div');
  card.className = 'banner-link-card' + (item.layout === 'square' ? ' square' : '');

  if(item.image){
    const img = document.createElement('img');
    img.src = item.image;
    img.alt = '';
    card.appendChild(img);
  }else{
    const empty = document.createElement('div');
    empty.className = 'banner-link-empty';
    empty.textContent = item.layout === 'square' ? '＋' : '画像未設定(タップして設定)';
    card.appendChild(empty);
  }

  if(item.title){
    const overlay = document.createElement('div');
    overlay.className = 'banner-link-overlay';
    const titleEl = document.createElement('div');
    titleEl.className = 'banner-link-title';
    titleEl.textContent = item.title;
    overlay.appendChild(titleEl);
    card.appendChild(overlay);
  }

  const editBtn = document.createElement('button');
  editBtn.className = 'edit-btn';
  editBtn.textContent = '✏️';
  editBtn.addEventListener('click', function(e){
    e.stopPropagation();
    e.preventDefault();
    openLinkEdit(item.id);
  });
  card.appendChild(editBtn);

  card.addEventListener('click', function(){
    if(item.url){ launchApp(item.url); }
    else{ openLinkEdit(item.id); }
  });
  return card;
}

function renderBannerLinks(){
  linksContainer.innerHTML = '';
  const filtered = getFilteredLinks();

  let squareRow = null;
  filtered.forEach(function(item){
    if(item.layout === 'square'){
      if(!squareRow){
        squareRow = document.createElement('div');
        squareRow.className = 'square-row';
        linksContainer.appendChild(squareRow);
      }
      squareRow.appendChild(makeLinkCard(item));
    }else{
      squareRow = null;
      linksContainer.appendChild(makeLinkCard(item));
    }
  });
}

const linkOverlay = document.getElementById('linkOverlay');
const linkSheetTitle = document.getElementById('linkSheetTitle');
const linkTitleInput = document.getElementById('linkTitle');
const linkCategoryInput = document.getElementById('linkCategory');
const linkUrlInput = document.getElementById('linkUrl');
const linkFileInput = document.getElementById('linkFile');

/* layout toggle buttons */
const layoutBannerBtn = document.getElementById('layoutBanner');
const layoutSquareBtn = document.getElementById('layoutSquare');
function setLayoutToggle(layout){
  pickedLayout = layout;
  layoutBannerBtn.classList.toggle('active', layout === 'banner');
  layoutSquareBtn.classList.toggle('active', layout === 'square');
}
layoutBannerBtn.addEventListener('click', function(){ setLayoutToggle('banner'); });
layoutSquareBtn.addEventListener('click', function(){ setLayoutToggle('square'); });
const linkPreview = document.getElementById('linkPreview');
const linkDeleteRow = document.getElementById('linkDeleteRow');
const thumbStatus = document.getElementById('thumbStatus');

function showLinkPreview(src){
  linkPreview.innerHTML = '';
  if(src){
    const img = document.createElement('img');
    img.src = src;
    linkPreview.appendChild(img);
  }else{
    linkPreview.textContent = '画像未設定';
  }
}

async function fetchLinkMeta(url){
  try{
    const res = await fetch('https://api.microlink.io/?url=' + encodeURIComponent(url));
    const json = await res.json();
    if(json && json.status === 'success' && json.data){
      const d = json.data;
      return {
        title: (d.title || '').trim(),
        image: (d.image && d.image.url) || (d.screenshot && d.screenshot.url) || ''
      };
    }
  }catch(e){}
  return null;
}

async function autoFetchThumb(){
  const url = linkUrlInput.value.trim();
  if(!url){ return; }
  thumbStatus.textContent = '取得中...';
  const meta = await fetchLinkMeta(url);
  if(meta){
    if(meta.image){
      pickedLinkImage = meta.image;
      showLinkPreview(meta.image);
      thumbStatus.textContent = '✓ 取得成功';
    }else{
      thumbStatus.textContent = '画像なし';
    }
    if(meta.title && !linkTitleInput.value.trim()){
      linkTitleInput.value = meta.title;
    }
  }else{
    thumbStatus.textContent = '取得失敗';
  }
  setTimeout(function(){ thumbStatus.textContent = ''; }, 3000);
}

document.getElementById('fetchThumbBtn').addEventListener('click', function(){
  autoFetchThumb();
});

document.getElementById('clearThumbBtn').addEventListener('click', function(){
  pickedLinkImage = null;
  showLinkPreview(null);
  thumbStatus.textContent = '';
});

function openLinkAdd(){
  editingLinkId = null;
  pickedLinkImage = null;
  linkSheetTitle.textContent = 'リンクを追加';
  linkTitleInput.value = '';
  linkCategoryInput.value = (currentCategory !== 'すべて' && currentCategory !== '未分類') ? currentCategory : '';
  linkUrlInput.value = '';
  linkDeleteRow.style.display = 'none';
  setLayoutToggle('banner');
  showLinkPreview(null);
  linkOverlay.classList.add('show');
}

function openLinkEdit(id){
  const item = bannerLinks.find(function(a){ return a.id === id; });
  if(!item) return;
  editingLinkId = id;
  pickedLinkImage = item.image || null;
  linkSheetTitle.textContent = 'リンクを編集';
  linkTitleInput.value = item.title || '';
  linkCategoryInput.value = item.category || '';
  linkUrlInput.value = item.url || '';
  linkDeleteRow.style.display = 'flex';
  setLayoutToggle(item.layout || 'banner');
  showLinkPreview(item.image);
  linkOverlay.classList.add('show');
}

function closeLinkSheet(){
  linkOverlay.classList.remove('show');
}

document.getElementById('linkCancel').addEventListener('click', closeLinkSheet);

linkFileInput.addEventListener('change', function(){
  const file = linkFileInput.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){
      const maxW = 800;
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      pickedLinkImage = canvas.toDataURL('image/jpeg', 0.75);
      showLinkPreview(pickedLinkImage);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

document.getElementById('linkSave').addEventListener('click', function(){
  const url = linkUrlInput.value.trim();
  const title = linkTitleInput.value.trim();
  const category = linkCategoryInput.value.trim();
  const layout = pickedLayout || 'banner';
  const before = JSON.stringify(bannerLinks);
  if(editingLinkId){
    const item = bannerLinks.find(function(a){ return a.id === editingLinkId; });
    item.url = url;
    item.title = title;
    item.category = category;
    item.layout = layout;
    item.image = pickedLinkImage;
  }else{
    if(!pickedLinkImage && !url) return;
    bannerLinks.push({
      id: 'link_' + Date.now(),
      url: url,
      title: title,
      category: category,
      layout: layout,
      image: pickedLinkImage
    });
  }
  if(!saveBannerLinks()){
    bannerLinks = JSON.parse(before);
    return;
  }
  renderCategoryTabs();
  renderBannerLinks();
  closeLinkSheet();
});

document.getElementById('linkDelete').addEventListener('click', function(){
  bannerLinks = bannerLinks.filter(function(a){ return a.id !== editingLinkId; });
  saveBannerLinks();
  renderCategoryTabs();
  renderBannerLinks();
  closeLinkSheet();
});

renderCategoryTabs();
renderBannerLinks();

/* ---- theme toggle ---- */
const THEME_KEY = 'launcherTheme';
const themeBtn = document.getElementById('themeBtn');
const themeMeta = document.querySelector('meta[name="theme-color"]');

function applyTheme(){
  const dark = localStorage.getItem(THEME_KEY) === 'dark';
  document.body.classList.toggle('dark', dark);
  themeBtn.textContent = dark ? '☀️' : '🌙';
  themeMeta.setAttribute('content', dark ? '#1a1825' : '#ec4464');
}
applyTheme();

themeBtn.addEventListener('click', function(){
  const dark = document.body.classList.contains('dark');
  localStorage.setItem(THEME_KEY, dark ? 'light' : 'dark');
  applyTheme();
});

/* ---- pager / page dots ---- */
const pager = document.getElementById('pager');
const pagerInner = document.getElementById('pagerInner');
const pageDots = document.querySelectorAll('.page-dots .dot');
const searchBarFixed = document.getElementById('searchBarFixed');
const PAGE_COUNT = 3;
let currentPage = 1; /* start on home */

function goToPage(idx, animate){
  idx = Math.max(0, Math.min(PAGE_COUNT - 1, idx));
  currentPage = idx;
  const pct = -(idx * 100 / PAGE_COUNT);
  if(animate === false){
    pagerInner.style.transition = 'none';
    pagerInner.style.transform = 'translateX(' + pct + '%)';
    pagerInner.offsetHeight; /* force reflow */
    pagerInner.style.transition = '';
  }else{
    pagerInner.style.transform = 'translateX(' + pct + '%)';
  }
  pageDots.forEach(function(d, i){ d.classList.toggle('active', i === idx); });
  searchBarFixed.style.display = idx === 1 ? '' : 'none';
}
goToPage(1, false);

/* touch swipe — needs 60px+ horizontal drag with >2:1 H/V ratio to trigger */
let tsX = 0, tsY = 0, tDX = 0, dragging = false;
pager.addEventListener('touchstart', function(e){
  if(e.touches.length !== 1) return;
  tsX = e.touches[0].clientX;
  tsY = e.touches[0].clientY;
  tDX = 0;
  dragging = true;
}, {passive:true});

pager.addEventListener('touchmove', function(e){
  if(!dragging || e.touches.length !== 1) return;
  tDX = e.touches[0].clientX - tsX;
  const dY = e.touches[0].clientY - tsY;
  /* if mostly vertical don't interfere */
  if(Math.abs(dY) > Math.abs(tDX) * 1.5){ dragging = false; return; }
}, {passive:true});

pager.addEventListener('touchend', function(){
  if(!dragging){ return; }
  dragging = false;
  const THRESHOLD = 60;
  if(tDX < -THRESHOLD) goToPage(currentPage + 1);
  else if(tDX > THRESHOLD) goToPage(currentPage - 1);
});

function weatherEmoji(code){
  if(code === 0) return {icon:'☀️', text:'晴れ'};
  if(code === 1 || code === 2) return {icon:'🌤️', text:'晴れ時々曇り'};
  if(code === 3) return {icon:'☁️', text:'曇り'};
  if(code === 45 || code === 48) return {icon:'🌫️', text:'霧'};
  if(code >= 51 && code <= 57) return {icon:'🌦️', text:'霧雨'};
  if(code >= 61 && code <= 65) return {icon:'🌧️', text:'雨'};
  if(code === 66 || code === 67) return {icon:'🌧️', text:'凍雨'};
  if(code >= 71 && code <= 77) return {icon:'🌨️', text:'雪'};
  if(code === 80 || code === 81 || code === 82) return {icon:'🌧️', text:'にわか雨'};
  if(code === 85 || code === 86) return {icon:'🌨️', text:'にわか雪'};
  if(code >= 95) return {icon:'⛈️', text:'雷雨'};
  return {icon:'🌡️', text:''};
}

  bgFile.value = '';

  const reader = new FileReader();
  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){
      const maxW = 1080;
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
      try{
        localStorage.setItem(BG_KEY, dataUrl);
        applyBackground();
      }catch(e){
        alert('画像の保存に失敗しました(サイズが大きすぎるかも)');
      }
    };
    img.src = ev.target.result;

function formatRelative(pubDate){
  const d = new Date(pubDate);
  if(isNaN(d.getTime())) return '';
  const diffMs = Date.now() - d.getTime();
  const diffH = Math.floor(diffMs / 3600000);
  if(diffH < 1) return '1時間以内';
  if(diffH < 24) return diffH + '時間前';
  return Math.floor(diffH / 24) + '日前';
}

/* ---- feed thumbnail cache ---- */
const THUMB_CACHE_KEY = 'launcherThumbCache';
const THUMB_CACHE_MAX = 200;

function loadThumbCache(){
  try{
    const raw = localStorage.getItem(THUMB_CACHE_KEY);
    return raw ? JSON.parse(raw) : {};
  }catch(e){ return {}; }
}
function saveThumbCache(cache){
  try{
    const keys = Object.keys(cache);
    if(keys.length > THUMB_CACHE_MAX){
      const trimmed = {};
      keys.slice(-THUMB_CACHE_MAX).forEach(function(k){ trimmed[k] = cache[k]; });
      localStorage.setItem(THUMB_CACHE_KEY, JSON.stringify(trimmed));
    }else{
      localStorage.setItem(THUMB_CACHE_KEY, JSON.stringify(cache));
    }
  }catch(e){}
}

let thumbCache = loadThumbCache();

async function fetchAndApplyThumb(link, imgEl, iconEl){
  if(thumbCache[link] !== undefined){
    if(thumbCache[link]){
      imgEl.src = thumbCache[link];
      imgEl.style.display = 'block';
      if(iconEl) iconEl.style.display = 'none';
    }
    return;
  }
  try{
    const res = await fetch('https://api.microlink.io/?url=' + encodeURIComponent(link));
    const json = await res.json();
    if(json && json.status === 'success' && json.data){
      const d = json.data;
      const imageUrl = (d.image && d.image.url) || '';
      thumbCache[link] = imageUrl;
      saveThumbCache(thumbCache);
      if(imageUrl){
        imgEl.src = imageUrl;
        imgEl.style.display = 'block';
        if(iconEl) iconEl.style.display = 'none';
      }
    }else{
      thumbCache[link] = '';
      saveThumbCache(thumbCache);
    }
  }catch(e){
    thumbCache[link] = '';
  }
}

function getSavedFeeds(){
  const raw = localStorage.getItem(FEED_KEY);
  if(!raw) return DEFAULT_FEEDS.slice();
  try{
    const arr = JSON.parse(raw);
    if(Array.isArray(arr) && arr.length) return arr;
  }catch(e){
    // legacy: previously stored as a plain URL string
    if(raw.indexOf('http') === 0) return [raw];
  }
  return DEFAULT_FEEDS.slice();
}

function parseFeedXML(text, fallbackSourceName){
  let doc;
  try{
    doc = new DOMParser().parseFromString(text, 'text/xml');
  }catch(e){
    return [];
  }
  if(!doc || doc.querySelector('parsererror')) return [];

  let items = Array.from(doc.querySelectorAll('item'));
  if(!items.length){
    items = Array.from(doc.querySelectorAll('entry'));
  }

  const channelTitleEl = doc.querySelector('channel > title') || doc.querySelector('feed > title');
  const sourceName = channelTitleEl ? channelTitleEl.textContent.trim() : (fallbackSourceName || '');

  function getText(el, tag){
    const node = el.querySelector(tag);
    return node ? node.textContent.trim() : '';
  }
  function getLink(el){
    const linkEls = el.querySelectorAll('link');
    for(let i = 0; i < linkEls.length; i++){
      const href = linkEls[i].getAttribute('href');
      if(href) return href;
      const txt = linkEls[i].textContent && linkEls[i].textContent.trim();
      if(txt) return txt;
    }
    const guid = el.querySelector('guid');
    if(guid && guid.textContent) return guid.textContent.trim();
    return '';
  }

  return items.map(function(el){
    const pubDate = getText(el, 'pubDate') || getText(el, 'published') || getText(el, 'updated') || getText(el, 'date');
    return {
      title: getText(el, 'title'),
      link: getLink(el),
      pubDate: pubDate,
      source: {name: sourceName}
    };
  }).filter(function(it){ return it.title && it.link; });
}

function fetchWithTimeout(url, ms, isJSON){
  return Promise.race([
    fetch(url).then(function(r){
      if(!r.ok) throw new Error('http ' + r.status);
      return isJSON ? r.json() : r.text();
    }),
    new Promise(function(resolve, reject){
      setTimeout(function(){ reject(new Error('timeout')); }, ms);
    })
  ]);
}

function fetchFeedItems(url){
  const attempts = [
    {proxy: 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url), json: false},
    {proxy: 'https://corsproxy.io/?url=' + encodeURIComponent(url), json: false},
    {proxy: 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(url), json: true}
  ];
  function tryAttempt(i){
    if(i >= attempts.length) return [];
    const a = attempts[i];
    return fetchWithTimeout(a.proxy, 8000, a.json).then(function(data){
      const items = a.json ? (data.items || []) : parseFeedXML(data);
      if(!items.length) throw new Error('empty');
      return items;
    }).catch(function(){
      return tryAttempt(i + 1);
    });
  }
  return tryAttempt(0);
}

function loadFeed(){
  const feeds = getSavedFeeds();
  feedList.innerHTML = '<div class="feed-empty">読み込み中...</div>';
  const requests = feeds.map(function(url){
    return fetchFeedItems(url);
  });
  const allDone = Promise.all(requests).then(function(results){
    let all = [];
    results.forEach(function(items){ all = all.concat(items); });
    all.sort(function(a, b){
      return new Date(b.pubDate) - new Date(a.pubDate);
    });
    return all;
  });
  const hardTimeout = new Promise(function(resolve){
    setTimeout(function(){ resolve(null); }, 25000);
  });
  Promise.race([allDone, hardTimeout]).then(function(all){
    renderFeed(all || []);
  }).catch(function(){
    renderFeed([]);
  });
}
loadFeed();

  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
});

document.getElementById('importFile').addEventListener('change', function(){
  const file = this.files[0];
  this.value = '';
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    try{
      const data = JSON.parse(ev.target.result);

      // legacy format: a plain array was the old "apps" export
      if(Array.isArray(data)){
        apps = data;
        saveApps(apps);
        renderGrid();
        settingsOverlay.classList.remove('show');
        alert('設定を読み込みました');
        return;
      }

      if(typeof data !== 'object' || data === null) throw new Error('invalid');

      let failedKeys = [];
      Object.keys(data).forEach(function(key){
        try{
          localStorage.setItem(key, data[key]);
        }catch(e){
          failedKeys.push(key);
        }
      });

      // reload everything from storage
      apps = loadApps();
      bannerLinks = loadBannerLinks();
      renderGrid();
      renderCategoryTabs();
      renderBannerLinks();
      renderFavorites();
      applyBackground();
      applyTheme();
      loadFeed();

      settingsOverlay.classList.remove('show');
      if(failedKeys.length){
        alert('一部のデータは容量不足のため復元できませんでした: ' + failedKeys.join(', '));
      }else{
        alert('バックアップから復元しました');
      }
    }catch(err){
      alert('読み込みに失敗しました。正しいバックアップファイルか確認してね');
    }
  };
  reader.readAsText(file);
});

function getStorageUsage(){
  let total = 0;
  for(let i = 0; i < localStorage.length; i++){
    const key = localStorage.key(i);
    const val = localStorage.getItem(key) || '';
    total += key.length + val.length;
  }
  return total;
}

function updateStorageUsage(){
  const bytes = getStorageUsage();
  const kb = (bytes / 1024).toFixed(0);
  const el = document.getElementById('storageUsage');
  if(el) el.textContent = '使用容量: 約 ' + kb + ' KB(目安上限 5,000〜10,000 KB)';
}

/* service worker */
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
</script>
