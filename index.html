<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="theme-color" content="#ec4464">
<title>ホームランチャー</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root{
    --bg:#eef0f6;
    --card:rgba(255,255,255,.6);
    --card-solid:#ffffff;
    --card2:#f4f5fa;
    --text:#2d2a45;
    --sub:#9a96b3;
    --accent:#ec4464;
    --accent2:#ec4464;
    --border:#e6e8f2;
  }
  body.dark{
    --bg:#1a1825;
    --card:rgba(38,35,51,.6);
    --card-solid:#262333;
    --card2:#322e44;
    --text:#f1eefb;
    --sub:#a9a3c4;
    --border:#3c3852;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:"Hiragino Sans","Noto Sans JP",sans-serif;
    overflow:hidden;
  }
  .pager{
    position:relative;
    width:100%;height:100%;
    overflow:hidden;
  }
  .pager-inner{
    width:100%;
    height:100%;
  }
  .page{
    width:100%;
    height:100%;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:env(safe-area-inset-top) 14px calc(env(safe-area-inset-bottom) + 80px) 14px;
  }
  .wrap{max-width:480px;margin:0 auto;}

  /* page dots */
  /* feed page header */
  .page-header{
    display:flex;align-items:center;justify-content:space-between;
    margin:14px 0 14px;
  }
  .page-header h2{font-size:17px;font-weight:800;margin:0;}
  .page-icon-btn{
    background:var(--card);border:none;
    width:36px;height:36px;border-radius:50%;
    font-size:16px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 1px 4px rgba(0,0,0,.08);color:var(--text);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  }

  /* weekly weather strip — fixed above search bar, transparent on background */
  .weather-half{
    flex:0 0 65%;
    display:flex;
    align-items:center;
    gap:4px;
    padding:8px 10px;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    cursor:pointer;
    min-width:0;
  }
  .weather-half::-webkit-scrollbar{display:none;}
  .clock-half{
    flex:0 0 35%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:8px 6px;
    border-left:1px solid var(--border);
    min-width:0;
  }
  .clock-time{
    font-size:19px;font-weight:800;
    color:var(--text);
    line-height:1.1;
    letter-spacing:.02em;
    font-variant-numeric:tabular-nums;
  }
  .clock-date{
    font-size:10px;
    color:var(--text);
    opacity:.6;
    margin-top:2px;
  }
  .ws-day{
    flex:1 0 auto;
    min-width:40px;
    text-align:center;
  }
  .ws-day .ws-name{
    font-size:11px;font-weight:700;
    color:var(--text);
    margin-bottom:2px;
    opacity:.7;
  }
  .ws-day .ws-icon{font-size:18px;line-height:1;}
  .ws-day .ws-temp{
    font-size:10px;
    color:var(--text);
    opacity:.65;
    margin-top:2px;white-space:nowrap;
  }
  .ws-reload{
    background:none;border:none;
    color:var(--text);
    font-size:14px;padding:4px 6px;flex-shrink:0;opacity:.45;
  }

  /* inline weather strip at top of home */
  .weather-inline{
    display:flex;
    align-items:stretch;
    gap:0;
    -webkit-user-select:none;user-select:none;
    -webkit-touch-callout:none;
    margin-bottom:4px;
  }
    position:absolute;
    z-index:30;
    background:rgba(0,0,0,.45);
    color:#fff;
    font-weight:700;
    padding:4px 9px;
    border-radius:999px;
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    font-variant-numeric:tabular-nums;
    letter-spacing:.02em;
    touch-action:none;
    cursor:grab;
    user-select:none;
    -webkit-user-select:none;
    white-space:nowrap;
  }
  .browser-clock-resize{
    position:absolute;
    right:-4px;bottom:-4px;
    width:18px;height:18px;
    background:rgba(255,255,255,.5);
    border-radius:50%;
    touch-action:none;
  }

  /* banner */
  /* feed */
  .feed-section{margin-top:18px;}
  .feed-heading{
    font-size:13px;font-weight:800;color:var(--text);
    margin-bottom:8px;display:flex;align-items:center;gap:6px;
  }
  .feed-list{display:flex;flex-direction:column;gap:10px;}
  .feed-card{
    display:block;
    background:var(--card);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 2px 6px rgba(0,0,0,.06);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  }
  .feed-thumb-img{
    width:100%;
    aspect-ratio:16/9;
    object-fit:cover;
    display:block;
  }
  .feed-link{
    display:flex;
    align-items:flex-start;
    gap:12px;
    text-decoration:none;
    color:var(--text);
    padding:14px 14px 0;
  }
  .feed-link.has-thumb{
    padding:12px 14px 0;
  }
  .feed-icon{
    width:36px;height:36px;
    border-radius:10px;
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-size:15px;font-weight:800;
    color:#fff;
  }
  .feed-card:nth-child(6n+1) .feed-icon{background:#ec4464;}
  .feed-card:nth-child(6n+2) .feed-icon{background:#f5a623;}
  .feed-card:nth-child(6n+3) .feed-icon{background:#4f8cff;}
  .feed-card:nth-child(6n+4) .feed-icon{background:#39b873;}
  .feed-card:nth-child(6n+5) .feed-icon{background:#9b6cf0;}
  .feed-card:nth-child(6n+6) .feed-icon{background:#30b6c9;}
  .feed-card-title{
    flex:1;
    font-size:14px;font-weight:700;line-height:1.5;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
  }
  .feed-meta-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:8px 14px 12px;
  }
  .feed-meta{font-size:11px;color:var(--sub);}
  .feed-share{
    background:none;border:none;color:var(--sub);font-size:17px;
    padding:4px 6px;flex-shrink:0;
  }
  .feed-empty{font-size:12px;color:var(--sub);padding:10px 2px;}

  /* favorites / read-later section */
  .fav-section-head{
    font-size:14px;font-weight:800;
    color:var(--text);
    margin-bottom:8px;
    padding-bottom:6px;
    border-bottom:2px solid var(--accent);
    opacity:.85;
  }
  .read-later-add{
    display:flex;gap:8px;
    margin-top:12px;
  }
  .read-later-add input{
    flex:1;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 12px;
    color:var(--text);
    font-size:14px;
  }
  .read-later-add button{
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:10px;
    padding:10px 14px;
    font-size:14px;font-weight:700;
    flex-shrink:0;
  }


  /* divider */
  .divider{
    height:4px;
    background:var(--accent);
    border-radius:2px;
    margin:14px 0 16px;
    opacity:.85;
  }

  /* section tabs (大カテゴリ) */
  .section-tabs{
    display:flex;
    gap:0;
    margin:8px 0 12px;
    background:linear-gradient(135deg,#ff6b8a 0%,#a855f7 50%,#3b82f6 100%);
    border-radius:16px;
    padding:6px;
    box-shadow:0 4px 12px rgba(168,85,247,.3);
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
  }
  .section-tabs::-webkit-scrollbar{display:none;}
  .section-tab{
    flex:1;
    min-width:70px;
    padding:10px 8px;
    border-radius:11px;
    border:none;
    background:transparent;
    color:rgba(255,255,255,.75);
    font-size:13px;font-weight:800;
    transition:background .15s, color .15s, transform .15s;
    white-space:nowrap;
    letter-spacing:.01em;
  }
  .section-tab.active{
    background:rgba(255,255,255,.25);
    color:#fff;
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    box-shadow:0 2px 8px rgba(0,0,0,.15);
  }
  .section-tab:not(.active):active{
    background:rgba(255,255,255,.1);
  }
  .section-tab-actions{
    display:flex;align-items:center;gap:2px;
    margin-left:auto;flex-shrink:0;
  }
  .stab-btn{
    width:32px;height:32px;border-radius:50%;
    border:none;background:transparent;
    color:rgba(255,255,255,.8);font-size:15px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .stab-btn:active{background:rgba(255,255,255,.2);}
  .sec-header{
    display:flex;justify-content:flex-end;
    margin-bottom:8px;
  }
  /* search modal */
  .search-modal{
    position:fixed;inset:0;
    background:var(--bg);
    z-index:60;
    display:flex;flex-direction:column;
  }
  .search-modal-bar{
    display:flex;align-items:center;gap:8px;
    padding:10px 12px;
    padding-top:calc(env(safe-area-inset-top) + 10px);
    background:var(--card);
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  .search-modal-back{
    background:none;border:none;color:var(--text);font-size:20px;padding:4px 6px;flex-shrink:0;
  }
  .search-modal-input-wrap{
    flex:1;background:var(--card2);border-radius:10px;
    display:flex;align-items:center;padding:0 12px;height:38px;
  }
  .search-modal-input-wrap input{
    flex:1;border:none;background:transparent;
    color:var(--text);font-size:15px;outline:none;
  }
  .search-modal-go{
    background:var(--accent);color:#fff;border:none;
    border-radius:10px;padding:8px 12px;font-size:16px;flex-shrink:0;
  }
  .search-modal-body{
    flex:1;overflow-y:auto;padding:12px 14px;
  }
  .search-trend-head{
    font-size:12px;font-weight:800;color:var(--sub);
    margin:4px 0 8px;letter-spacing:.04em;
  }
  .trend-list{display:flex;flex-direction:column;gap:2px;}
  .trend-item{
    display:flex;align-items:center;gap:12px;
    padding:11px 14px;
    border-radius:10px;
    background:var(--card);
    color:var(--text);font-size:14px;
    cursor:pointer;
  }
  .trend-item:active{background:var(--card2);}
  .trend-item .trend-icon{font-size:16px;flex-shrink:0;width:22px;text-align:center;}
  .trend-item .trend-text{flex:1;}

  /* fixed bottom search bar */
  .search-bar-fixed{
    position:fixed;
    bottom:calc(env(safe-area-inset-bottom) + 12px);
    left:50%;transform:translateX(-50%);
    width:calc(100% - 28px);
    max-width:452px;
    z-index:40;
    transition:bottom .15s;
  }
  .suggest-list{
    position:absolute;
    bottom:calc(100% + 8px);
    left:0;right:0;
    background:var(--card);
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 -4px 20px rgba(0,0,0,.18);
    display:none;
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    max-height:280px;
    overflow-y:auto;
  }
  .suggest-list .item{
    display:flex;align-items:center;gap:12px;
    padding:12px 18px;
    font-size:14px;
    border-bottom:1px solid var(--border);
    color:var(--text);
  }
  .suggest-list .item:last-child{border-bottom:none;}
  .suggest-list .item:active{background:var(--card2);}
  .suggest-list .item::before{content:'🔍';font-size:12px;opacity:.45;}
  .search-box{
    display:flex;
    align-items:center;
    background:var(--card);
    border-radius:999px;
    padding:6px 6px 6px 16px;
    box-shadow:0 4px 20px rgba(0,0,0,.18);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid var(--border);
  }
  .search-g-logo{
    font-size:17px;font-weight:900;
    margin-right:4px;flex-shrink:0;
    background:linear-gradient(135deg,#4285f4,#34a853,#fbbc05,#ea4335);
    -webkit-background-clip:text;background-clip:text;
    color:transparent;
  }
  .search-box input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:var(--text);
    font-size:16px;
    padding:10px 0;
  }
  .search-box input::placeholder{color:var(--sub);}
  .search-box button{
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:999px;
    width:42px;height:42px;
    font-size:18px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }

  /* extra bottom padding on home page so links aren't hidden behind search bar */
  #secHome{ transition: background 0.3s ease; border-radius: 12px; }

  /* pull to refresh */
  .ptr-indicator{
    position:absolute;
    top:-50px;
    left:50%;transform:translateX(-50%);
    width:36px;height:36px;
    border-radius:50%;
    background:var(--card);
    box-shadow:0 2px 8px rgba(0,0,0,.15);
    display:flex;align-items:center;justify-content:center;
    font-size:18px;
    transition:top .2s;
    z-index:30;
    pointer-events:none;
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  }
  .ptr-indicator.visible{ top:12px; }
  .ptr-indicator.spinning{ animation:spin .6s linear infinite; }
  @keyframes spin{ to{ transform:translateX(-50%) rotate(360deg); } }

  /* app grid */
  .grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
  }
  .app-card{
    position:relative;
    background:var(--card);
    border-radius:16px;
    padding:10px 6px 8px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-decoration:none;
    color:var(--text);
    box-shadow:0 2px 8px rgba(0,0,0,.06);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  }
  .app-card .ic{
    width:56px;height:56px;
    border-radius:14px;
    overflow:hidden;
    background:var(--card2);
    display:flex;align-items:center;justify-content:center;
    margin-bottom:6px;
    font-size:24px;
    font-weight:700;
    color:var(--accent);
  }
  .app-card:nth-child(6n+1) .ic{background:#ffe1e6;}
  .app-card:nth-child(6n+2) .ic{background:#fff4d6;}
  .app-card:nth-child(6n+3) .ic{background:#e1ecff;}
  .app-card:nth-child(6n+4) .ic{background:#e1f7e8;}
  .app-card:nth-child(6n+5) .ic{background:#f0e6ff;}
  .app-card:nth-child(6n+6) .ic{background:#e6f7ff;}
  .app-card .ic img{width:100%;height:100%;object-fit:cover;display:block;}
  .app-card .name{
    font-size:12px;
    font-weight:700;
    text-align:center;
    line-height:1.3;
    word-break:break-all;
    max-width:100%;
  }
  .app-card .edit-btn{
    position:absolute;
    top:4px;right:4px;
    width:24px;height:24px;
    border-radius:50%;
    background:rgba(0,0,0,.25);
    border:none;
    color:#fff;
    font-size:12px;
    display:flex;align-items:center;justify-content:center;
  }
  .add-card{
    background:transparent;
    border:2px dashed var(--border);
    color:var(--sub);
    box-shadow:none;
    backdrop-filter:none;-webkit-backdrop-filter:none;
  }
  .add-card .ic{background:transparent;font-size:28px;color:var(--sub);}

  /* category tabs */
  .category-tabs{
    display:none;
    gap:6px;
    overflow-x:auto;
    margin-top:14px;
    padding-bottom:4px;
    align-items:flex-end;
  }
  .category-tab{
    flex:0 0 auto;
    padding:8px 14px 6px;
    border-radius:6px 6px 0 0;
    border:none;
    border-bottom:3px solid transparent;
    color:#fff;
    font-size:12px;font-weight:800;
    letter-spacing:.02em;
    opacity:.75;
    transform:translateY(2px);
    transition:opacity .15s, transform .15s;
  }
  .category-tab.active{
    opacity:1;
    transform:translateY(0px);
    border-bottom-color:rgba(255,255,255,.4);
  }
  /* sticky note colors cycle */
  .category-tab:nth-child(7n+1){background:#e85d75;}
  .category-tab:nth-child(7n+2){background:#f5a623;}
  .category-tab:nth-child(7n+3){background:#4f8cff;}
  .category-tab:nth-child(7n+4){background:#39b873;}
  .category-tab:nth-child(7n+5){background:#9b6cf0;}
  .category-tab:nth-child(7n+6){background:#30b6c9;}
  .category-tab:nth-child(7n+0){background:#e67e3a;}
  .category-tab-add{
    background:transparent!important;
    color:var(--sub);
    border:none;
    font-size:18px;
    padding:8px 8px 6px;
    opacity:.5;
    transform:translateY(2px);
  }
  .category-order-list{
    display:flex;flex-direction:column;gap:6px;margin-top:6px;
  }
  .category-order-item{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--card2);
    border-radius:10px;
    padding:8px 12px;
    font-size:13px;
    color:var(--text);
  }
  .category-order-item .order-btns{display:flex;gap:4px;}
  .category-order-item button{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:8px;
    width:30px;height:30px;
    font-size:13px;
    color:var(--text);
  }
  .category-order-item button:disabled{opacity:.35;}
  .category-order-empty{font-size:12px;color:var(--sub);padding:4px 2px;}

  /* wide banner links */
  .layout-toggle{
    display:flex;gap:8px;margin-top:6px;
  }
  .layout-btn{
    flex:1;
    padding:10px 6px;
    border-radius:10px;
    border:1.5px solid var(--border);
    background:var(--card2);
    color:var(--sub);
    font-size:13px;font-weight:700;
  }
  .layout-btn.active{
    border-color:var(--accent);
    color:var(--accent);
  }
  .banner-links{
    display:flex;flex-direction:column;gap:12px;
    margin-top:14px;
  }
  .banner-links .square-row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
  }
  .banner-link-card{
    position:relative;
    display:block;
    aspect-ratio:3/1;
    border-radius:14px;
    overflow:hidden;
    background:var(--card);
    box-shadow:0 2px 8px rgba(0,0,0,.06);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  }
  .banner-link-card.square{
    aspect-ratio:1/1;
  }
  .banner-link-card.tall{
    aspect-ratio:3/2;
  }
  .banner-link-card.square .banner-link-title{
    font-size:11px;
    white-space:normal;
    overflow:visible;
    text-overflow:unset;
    border-radius:8px;
    max-width:100%;
    line-height:1.4;
    display:block;
  }
  .banner-link-card.square .banner-link-overlay{
    background:linear-gradient(to top, rgba(0,0,0,.7) 0%, rgba(0,0,0,.2) 60%, rgba(0,0,0,0) 100%);
    padding:8px 8px;
    align-items:flex-end;
  }
  .banner-link-card img{
    width:100%;height:100%;object-fit:cover;display:block;
    pointer-events:none;
    -webkit-user-select:none;user-select:none;
    -webkit-touch-callout:none;
  }
  .banner-link-card{
    -webkit-touch-callout:none;
    -webkit-user-select:none;
    user-select:none;
  }
  .banner-link-overlay{
    position:absolute;inset:0;
    display:flex;align-items:flex-end;
    padding:10px 10px;
    background:linear-gradient(to top, rgba(0,0,0,.55), rgba(0,0,0,0) 50%);
    pointer-events:none;
  }
  .banner-link-title{
    display:inline-block;
    color:#fff;
    font-size:13px;font-weight:800;
    letter-spacing:.03em;
    background:rgba(0,0,0,.52);
    backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
    padding:4px 10px;
    border-radius:999px;
    max-width:calc(100% - 36px);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  /* drag mode */
  .banner-links.drag-mode .banner-link-card{
    cursor:grab;
    transition:transform .15s, opacity .15s, box-shadow .15s;
  }
  .banner-link-card.dragging{
    opacity:.6;
    transform:scale(.96);
    box-shadow:0 8px 24px rgba(0,0,0,.25)!important;
  }
  .banner-links.drag-mode .edit-btn{
    display:none;
  }
  .banner-links.drag-mode::after{

    color:#fff;
    font-size:12px;
    display:flex;align-items:center;justify-content:center;

    color:var(--sub);

    margin-top:6px;
  }

  /* modal */
  .overlay{
    position:fixed;inset:0;
    background:rgba(0,0,0,.45);

    align-items:flex-end;
    justify-content:center;
    z-index:50;
  }
  .overlay.show{display:flex;}
  .sheet{
    background:var(--card-solid);
    border-radius:20px 20px 0 0;
    width:100%;max-width:480px;

    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:20px 20px calc(env(safe-area-inset-bottom) + 20px);
  }
  .sheet h2{margin:0 0 14px;font-size:16px;color:var(--text);}
  .sheet label{font-size:12px;color:var(--sub);display:block;margin:10px 0 4px;}
  .sheet input[type=text],.sheet input[type=url]{
    width:100%;
    background:var(--card2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 12px;
    color:var(--text);
    font-size:15px;
  }
  .sheet select{
    width:100%;
    background:var(--card2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 12px;
    color:var(--text);
    font-size:14px;
    -webkit-appearance:none;
    appearance:none;
  }
  .feed-checks{
    display:flex;flex-direction:column;gap:6px;margin-top:6px;
  }
  .feed-checks label{
    display:flex;align-items:center;gap:10px;
    background:var(--card2);
    border-radius:10px;
    padding:10px 12px;
    font-size:13px;
    color:var(--text);
    margin:0;
  }
  .feed-checks input{width:18px;height:18px;accent-color:var(--accent);flex-shrink:0;}
  .icon-pick{
    display:flex;align-items:center;gap:12px;margin-top:6px;
  }
  .icon-pick .preview{
    width:48px;height:48px;border-radius:12px;background:var(--card2);
    display:flex;align-items:center;justify-content:center;overflow:hidden;
    font-weight:700;color:var(--accent);font-size:20px;
  }
  .icon-pick .preview img{width:100%;height:100%;object-fit:cover;}
  .icon-pick label.file-label{
    background:var(--card2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:8px 14px;
    font-size:13px;
    color:var(--text);
    margin:0;
  }
  .sheet-actions{display:flex;gap:10px;margin-top:18px;}
  .sheet-actions button{
    flex:1;
    border:none;border-radius:12px;
    padding:12px;
    font-size:15px;font-weight:700;
  }
  /* browser section */
  #secBrowser{
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    z-index:35;
    display:none;
    flex-direction:column;
    background:var(--bg);
  }
  #secBrowser.visible{ display:flex; }
  .browser-bar{
    display:flex;align-items:center;gap:6px;
    padding:8px 10px;
    padding-top:calc(env(safe-area-inset-top) + 8px);
    background:var(--card);
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  .browser-back{
    width:34px;height:34px;border-radius:50%;border:none;
    background:var(--card2);color:var(--text);font-size:18px;flex-shrink:0;
  }
  .browser-url-bar{
    flex:1;display:flex;align-items:center;
    background:var(--card2);
    border-radius:10px;padding:0 10px;height:34px;overflow:hidden;
  }
  .browser-url-bar input{
    flex:1;border:none;background:transparent;
    color:var(--text);font-size:13px;outline:none;
    padding:0;min-width:0;
  }
  .browser-go{
    background:var(--accent);color:#fff;border:none;
    border-radius:8px;padding:4px 10px;font-size:13px;font-weight:700;
    flex-shrink:0;
  }
  .browser-tabs-bar{
    display:flex;align-items:center;gap:6px;
    padding:6px 10px;
    background:var(--card);
    border-bottom:1px solid var(--border);
    overflow-x:auto;flex-shrink:0;
  }
  .browser-tabs-bar::-webkit-scrollbar{display:none;}
  .btab{
    display:flex;align-items:center;gap:6px;
    padding:4px 10px;border-radius:999px;
    background:var(--card2);border:none;
    color:var(--text);font-size:12px;font-weight:700;
    flex-shrink:0;white-space:nowrap;max-width:130px;
  }
  .btab.active{background:var(--accent);color:#fff;}
  .btab.pinned{
    border:1.5px solid var(--accent);
    padding-left:8px;
  }
  .btab.pinned .btab-pin{color:var(--accent);}
  .btab .btab-close{
    background:none;border:none;color:inherit;
    font-size:14px;padding:0;line-height:1;flex-shrink:0;
    opacity:.7;
  }
  .btab .btab-pin{
    background:none;border:none;color:inherit;
    font-size:11px;padding:0;line-height:1;flex-shrink:0;
    opacity:.6;
  }
  .btab-add{
    width:30px;height:30px;border-radius:50%;
    background:var(--card2);border:none;
    color:var(--text);font-size:18px;flex-shrink:0;
  }
  .browser-frame-wrap{
    flex:1;position:relative;overflow:hidden;
  }
  .browser-iframe{
    position:absolute;inset:0;
    width:100%;height:100%;
    border:none;
  }
  .browser-blocked{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:12px;padding:20px;text-align:center;
  }
  .browser-blocked .msg{font-size:14px;color:var(--sub);}
  .browser-blocked .ext-btn{
    background:var(--accent);color:#fff;border:none;
    border-radius:12px;padding:12px 20px;font-size:14px;font-weight:700;
  }
  .browser-action-btn{
    width:34px;height:34px;border-radius:50%;border:none;
    background:var(--card2);color:var(--text);font-size:16px;flex-shrink:0;
  }
  .browser-action-btn.starred{ color:#f5a623; }

  /* tab grid overlay */
  .tab-grid-panel{
    position:absolute;top:0;left:0;right:0;bottom:0;
    background:var(--bg);
    z-index:52;
    display:flex;flex-direction:column;
  }
  .tab-grid-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 16px;
    padding-top:calc(env(safe-area-inset-top) + 12px);
    background:var(--card);
    border-bottom:1px solid var(--border);
    font-size:15px;font-weight:800;color:var(--text);
    flex-shrink:0;
  }
  .tab-grid{
    flex:1;overflow-y:auto;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:12px;
  }
  .tab-grid-card{
    position:relative;
    background:var(--card);
    border-radius:12px;
    overflow:hidden;
    aspect-ratio:3/4;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
    cursor:pointer;
    border:2px solid transparent;
  }
  .tab-grid-card.active{ border-color:var(--accent); }
  .tab-grid-card.pinned{ border-color:#f5a623; }
  .tab-grid-thumb{
    width:100%;height:calc(100% - 44px);
    background:var(--card2);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }
  .tab-grid-thumb iframe{
    width:200%;height:200%;
    transform:scale(0.5);
    transform-origin:0 0;
    pointer-events:none;
    border:none;
  }
  .tab-grid-thumb .thumb-placeholder{
    font-size:13px;color:var(--sub);text-align:center;padding:8px;
  }
  .tab-grid-info{
    height:44px;padding:0 8px;
    display:flex;align-items:center;gap:6px;
    border-top:1px solid var(--border);
  }
  .tab-grid-title{
    flex:1;font-size:11px;font-weight:700;color:var(--text);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .tab-grid-close{
    background:none;border:none;color:var(--sub);font-size:14px;padding:2px 4px;flex-shrink:0;
  }
  .tab-grid-pin{
    background:none;border:none;font-size:11px;padding:2px 4px;flex-shrink:0;color:var(--sub);
  }
  .browser-menu-panel{
    position:absolute;top:calc(env(safe-area-inset-top) + 90px);right:8px;
    background:var(--card-solid);
    border-radius:14px;
    box-shadow:0 4px 20px rgba(0,0,0,.25);
    overflow:hidden;
    z-index:50;
    width:calc(100% - 16px);
    max-width:340px;
  }
  .bmenu-tab-title{
    flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    min-width:0;
  }
  .bmenu-tab-row{
    display:flex;align-items:center;gap:10px;
    padding:10px 16px;border-bottom:1px solid var(--border);
    cursor:pointer;
    min-width:0;
  }
  .bmenu-item{
    display:block;width:100%;text-align:left;
    padding:14px 18px;border:none;
    background:transparent;color:var(--text);font-size:14px;
    border-bottom:1px solid var(--border);
  }
  .bmenu-item:last-child{border-bottom:none;}
  .bmenu-item:active{background:var(--card2);}
  .bmenu-divider{height:1px;background:var(--border);margin:4px 0;}
  .bmenu-tabs-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 16px 6px;
    font-size:12px;font-weight:800;color:var(--sub);letter-spacing:.04em;
  }
  .bmenu-new-tab{
    background:var(--accent);color:#fff;border:none;
    border-radius:999px;padding:4px 12px;font-size:12px;font-weight:700;
  }
  .bmenu-tab-row{
    display:flex;align-items:center;gap:10px;
    padding:10px 16px;border-bottom:1px solid var(--border);
    cursor:pointer;
  }
  .bmenu-tab-row:active{background:var(--card2);}
  .bmenu-tab-row.active-tab{ background:rgba(236,68,100,.06); }
  .bmenu-tab-favicon{
    width:20px;height:20px;border-radius:4px;
    background:var(--card2);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:800;color:var(--accent);overflow:hidden;
  }
  .bmenu-tab-favicon img{width:100%;height:100%;object-fit:cover;}
  .bmenu-tab-title{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bmenu-tab-pin{background:none;border:none;font-size:12px;color:var(--sub);padding:0 4px;flex-shrink:0;}
  .bmenu-tab-close{background:none;border:none;font-size:14px;color:var(--sub);padding:0 4px;flex-shrink:0;}

  /* bookmark panel */
  .bm-panel{
    position:absolute;top:0;right:0;bottom:0;
    width:100%;
    background:var(--card-solid);
    z-index:51;
    display:flex;flex-direction:column;
  }
  .bm-panel-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px;
    padding-top:calc(env(safe-area-inset-top) + 14px);
    border-bottom:1px solid var(--border);
    font-size:16px;font-weight:800;color:var(--text);
    flex-shrink:0;
  }
  .bm-close{
    background:none;border:none;color:var(--sub);font-size:20px;padding:4px 8px;
  }
  .bm-tabs{
    display:flex;gap:0;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  .bm-tab{
    flex:1;padding:12px 6px;
    border:none;background:transparent;
    color:var(--sub);font-size:13px;font-weight:700;
    border-bottom:2px solid transparent;
  }
  .bm-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .bm-list{
    flex:1;overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }
  .bm-row{
    display:flex;align-items:center;
    padding:12px 16px;
    border-bottom:1px solid var(--border);
    gap:12px;
  }
  .bm-row-icon{
    width:32px;height:32px;border-radius:8px;
    background:var(--card2);
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:800;color:var(--accent);
    flex-shrink:0;
  }
  .bm-row-body{flex:1;min-width:0;}
  .bm-row-title{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bm-row-url{font-size:11px;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px;}
  .bm-row-del{background:none;border:none;color:var(--sub);font-size:16px;padding:4px 6px;flex-shrink:0;}
</style>
</head>
<body>
<div class="pager" id="pager">
<div class="pager-inner" id="pagerInner">

  <div class="page" id="pageHome">
    <div class="ptr-indicator" id="ptrIndicator">↓</div>

    <div class="wrap">

      <!-- weather strip above section tabs -->
      <div class="weather-inline" id="weatherBox">
        <div class="weather-half" style="flex:1;">
          <div class="weather-week" id="weatherWeek" style="display:contents;"></div>
          <button class="ws-reload" id="wReload" title="更新">↻</button>
        </div>
      </div>

      <!-- section tabs -->
      <div class="section-tabs" id="sectionTabs">
        <button class="section-tab" data-sec="browser">🌐 ブラウザ</button>
        <button class="section-tab active" data-sec="home">🏠 ホーム</button>
        <button class="section-tab" data-sec="feed">📰 フィード</button>
        <div class="section-tab-actions">
          <span id="syncIndicator" style="font-size:10px;color:var(--sub);padding:0 4px;"></span>
          <button class="stab-btn" id="themeBtn" title="テーマ">🌙</button>
          <button class="stab-btn" id="refreshBtn" title="更新">🔄</button>
          <button class="stab-btn" id="settingsBtn" title="設定">⚙️</button>
        </div>
      </div>

      <!-- home section -->
      <div class="section" id="secHome">
        <div class="grid" id="appGrid" style="display:none;"></div>
        <div class="category-tabs" id="categoryTabs"></div>
        <div class="banner-links" id="bannerLinks"></div>
        <div id="bottomSpacer" style="height:80px;pointer-events:none;flex-shrink:0;"></div>
      </div>

      <!-- feed section -->
      <div class="section" id="secFeed" style="display:none;">
        <div class="sec-header">
          <button class="page-icon-btn" id="feedRefreshBtn" title="更新">🔄</button>
        </div>
        <div class="feed-list" id="feedList"></div>
      </div>

      <!-- favorites section -->
      <div class="section" id="secFav" style="display:none;">
        <div class="fav-section-head">⭐ お気に入り</div>
        <div class="feed-list" id="favoritesList"></div>
        <div class="fav-section-head" id="readLaterHead" style="margin-top:18px;">🕐 あとで読む</div>
        <div class="feed-list" id="readLaterList"></div>
        <div class="read-later-add">
          <input type="url" id="readLaterInput" placeholder="URLを貼り付け">
          <button id="readLaterBtn">追加</button>
        </div>
      </div>

      <!-- browser section is rendered full-screen outside wrap -->

    </div>
  </div>

  <!-- browser full-screen panel -->
  <div id="secBrowser">
    <div class="browser-bar">
      <button class="browser-back" id="browserBack">←</button>
      <div class="browser-url-bar">
        <input type="url" id="browserUrlInput" placeholder="URLを入力">
      </div>
      <button class="browser-go" id="browserGo">移動</button>
      <button class="browser-action-btn" id="browserReloadBtn" title="更新">🔄</button>
      <button class="browser-action-btn" id="browserBookmarkBtn" title="お気に入り">☆</button>
      <button class="browser-action-btn" id="browserMenuBtn" title="メニュー">⋮</button>
    </div>
    <div class="browser-frame-wrap" id="browserFrameWrap"></div>

    <!-- browser action menu -->
    <div class="browser-menu-panel" id="browserMenuPanel" style="display:none;">
      <!-- tabs section -->
      <div class="bmenu-tabs-head">
        <span>タブ</span>
        <button class="bmenu-new-tab" id="bmenuNewTab">＋ 新しいタブ</button>
      </div>
      <div id="bmenuTabList"></div>
      <div class="bmenu-divider"></div>
      <button class="bmenu-item" id="bmenuBookmarks">⭐ ブックマーク・あとで読む</button>
      <button class="bmenu-item" id="bmenuHistory">🕐 履歴</button>
      <button class="bmenu-item" id="bmenuPdf">📄 PDFとして保存</button>
      <button class="bmenu-item" id="bmenuCloseAll">✕ タブを全て閉じる</button>
      <button class="bmenu-item" id="bmenuExternal">🌐 外部ブラウザで開く</button>
    </div>

    <!-- bookmark slide panel -->
    <div class="bm-panel" id="bmPanel" style="display:none;">
      <div class="bm-panel-head">
        <span>ブックマーク</span>
        <button class="bm-close" id="bmClose">✕</button>
      </div>
      <div class="bm-tabs">
        <button class="bm-tab active" data-bm="fav">⭐ お気に入り</button>
        <button class="bm-tab" data-bm="later">🕐 あとで読む</button>
        <button class="bm-tab" data-bm="history">📋 履歴</button>
      </div>
      <div class="bm-list" id="bmFavList"></div>
      <div class="bm-list" id="bmLaterList" style="display:none;">
        <div class="read-later-add" style="padding:10px 10px 0;">
          <input type="url" id="bmLaterInput" placeholder="URLを追加">
          <button id="bmLaterAddBtn">追加</button>
        </div>
        <div id="bmLaterItems"></div>
      </div>
      <div class="bm-list" id="bmHistoryList" style="display:none;"></div>
    </div>
  </div>

</div><!-- end pager-inner -->
</div><!-- end pager -->

<div class="search-bar-fixed" id="searchBarFixed">
  <form class="search-box" id="searchForm" autocomplete="off">
    <span class="search-g-logo">G</span>
    <input type="text" id="searchInput" placeholder="Google で検索" autocomplete="off" readonly>
    <button type="submit">🔍</button>
  </form>
</div>

<!-- search modal -->
<div class="search-modal" id="searchModal" style="display:none;">
  <div class="search-modal-bar">
    <button class="search-modal-back" id="searchModalBack">←</button>
    <div class="search-modal-input-wrap">
      <input type="text" id="searchModalInput" placeholder="Google で検索" autocomplete="off">
    </div>
    <button class="search-modal-go" id="searchModalGo">🔍</button>
  </div>
  <div class="search-modal-body">
    <div id="suggestSection" style="display:none;">
      <div class="search-trend-head">💡 候補</div>
      <div id="suggestList" class="trend-list"></div>
    </div>
    <div class="search-trend-head">🔥 急上昇ワード</div>
    <div id="trendList" class="trend-list"></div>
  </div>
</div>



<div class="overlay" id="overlay">
  <div class="sheet">

    <input type="text" id="appName" placeholder="例: 競馬予想">

      <div class="preview" id="iconPreview">A</div>

      <button class="btn-cancel" id="btnCancel">キャンセル</button>
      <button class="btn-save" id="btnSave">保存</button>

      <button class="btn-delete" id="btnDelete">このアプリを削除</button>

<div class="overlay" id="linkOverlay">
  <div class="sheet">
    <h2 id="linkSheetTitle">リンクを追加</h2>
    <label>表示形式</label>
    <div class="layout-toggle">
      <button class="layout-btn active" id="layoutBanner" data-layout="banner">📰 横長</button>
      <button class="layout-btn" id="layoutTall" data-layout="tall">📋 縦長</button>
      <button class="layout-btn" id="layoutSquare" data-layout="square">🟦 正方形</button>
    </div>
    <label>タイトル(任意・画像の左下に表示)</label>
    <input type="text" id="linkTitle" placeholder="例: 競馬ラボ">
    <label>カテゴリ(任意・🔒始まりで隠しカテゴリ)</label>
    <input type="text" id="linkCategory" placeholder="例: 競馬　隠し: 🔒プライベート">
    <label>リンク先URL</label>

/* ---- Supabase cloud sync ---- */
const SB_URL = 'https://lttrqfbwhyktypddgtpn.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0dHJxZmJ3aHlrdHlwZGRndHBuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjY1MDMsImV4cCI6MjA5NTgwMjUwM30.SKn7Okr9UGR5jKapPmD3IAoVW_NThZL4FoXl09wkgCU';
const SB_HEADERS = { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };

/* keys to sync to cloud (heavy image data stays local) */
const CLOUD_SYNC_KEYS = [
  'launcherApps', 'launcherFeeds', 'launcherBannerLinks',
  'launcherBannerCategory', 'launcherCategoryOrder',
  'launcherBrowserTabs', 'launcherFavorites', 'launcherReadLater',
  'launcherTheme', 'launcherBackground', 'launcherBanner',
  'launcherBrowserHistory'
];

let syncDebounceTimer = null;

async function sbSet(key, value){
  try{
    await fetch(SB_URL + '/rest/v1/launcher_data', {
      method: 'POST',
      headers: { ...SB_HEADERS, 'Prefer': 'resolution=merge-duplicates' },
      body: JSON.stringify({ key, value, updated_at: new Date().toISOString() })
    });
  }catch(e){}
}

async function sbGet(key){
  try{
    const res = await fetch(SB_URL + '/rest/v1/launcher_data?key=eq.' + encodeURIComponent(key) + '&select=value', {
      headers: SB_HEADERS
    });
    const data = await res.json();
    return data && data[0] ? data[0].value : null;
  }catch(e){ return null; }
}

async function cloudSaveAll(){
  const promises = CLOUD_SYNC_KEYS.map(function(key){
    const val = localStorage.getItem(key);
    if(val !== null) return sbSet(key, val);
  }).filter(Boolean);
  await Promise.all(promises);
  localStorage.setItem(SB_LAST_SYNC_KEY, new Date().toISOString());
}

const SB_LAST_SYNC_KEY = 'launcherLastCloudSync';

async function cloudLoadAll(){
  const indicator = document.getElementById('syncIndicator');
  if(indicator) indicator.textContent = '☁️ 同期中...';
  try{
    const res = await fetch(SB_URL + '/rest/v1/launcher_data?key=in.(' + CLOUD_SYNC_KEYS.map(function(k){ return '"' + k + '"'; }).join(',') + ')&select=key,value,updated_at', {
      headers: SB_HEADERS
    });
    const data = await res.json();
    if(Array.isArray(data) && data.length){
      const lastSync = localStorage.getItem(SB_LAST_SYNC_KEY);
      data.forEach(function(row){
        if(row.value === null) return;
        /* only overwrite if cloud is newer than last sync */
        /* if user changed locally after last sync, keep local */
        if(!lastSync){
          /* first time: load everything from cloud */
          localStorage.setItem(row.key, row.value);
        }else{
          const cloudTime = new Date(row.updated_at).getTime();
          const syncTime = new Date(lastSync).getTime();
          if(cloudTime > syncTime){
            /* cloud updated after our last sync → use cloud */
            localStorage.setItem(row.key, row.value);
          }
          /* else: local is newer, keep local */
        }
      });
      localStorage.setItem(SB_LAST_SYNC_KEY, new Date().toISOString());
      if(indicator) indicator.textContent = '✓ 同期済み';
      setTimeout(function(){ if(indicator) indicator.textContent = ''; }, 2000);
      return true;
    }
  }catch(e){}
  if(indicator) indicator.textContent = '';
  return false;
}

/* debounced save — waits 2s after last change before saving */
function schedulCloudSave(){
  clearTimeout(syncDebounceTimer);
  syncDebounceTimer = setTimeout(cloudSaveAll, 2000);
}

/* patch localStorage.setItem to auto-sync on changes */
const _origSetItem = localStorage.setItem.bind(localStorage);
localStorage.setItem = function(key, value){
  _origSetItem(key, value);
  if(CLOUD_SYNC_KEYS.indexOf(key) !== -1) schedulCloudSave();
};

iconFile.addEventListener('change', function(){
  const file = iconFile.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){
      const size = 192;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const scale = Math.max(size/img.width, size/img.height);
      const w = img.width*scale, h = img.height*scale;
      ctx.drawImage(img, (size-w)/2, (size-h)/2, w, h);
      pickedIcon = canvas.toDataURL('image/png');
      showPreview(pickedIcon, appNameInput.value);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

function getCategoryList(){
  const set = new Set();
  let hasUncategorized = false;
  bannerLinks.forEach(function(item){
    if(item.category && item.category.trim()){
      set.add(item.category.trim());
    }else{
      hasUncategorized = true;
    }
  });
  const cats = Array.from(set);
  if(hasUncategorized) cats.push('未分類');
  return cats;
}

function getOrderedCategories(){
  const cats = getCategoryList();
  let order = [];
  try{
    const raw = localStorage.getItem(CATEGORY_ORDER_KEY);
    if(raw) order = JSON.parse(raw);
    if(!Array.isArray(order)) order = [];
  }catch(e){ order = []; }

  const ordered = order.filter(function(c){ return cats.indexOf(c) !== -1; });
  cats.forEach(function(c){
    if(ordered.indexOf(c) === -1) ordered.push(c);
  });
  if(JSON.stringify(ordered) !== JSON.stringify(order)){
    localStorage.setItem(CATEGORY_ORDER_KEY, JSON.stringify(ordered));
  }
  return ordered;
}

const SECRET_KEY = 'launcherSecretMode';
let secretMode = false;

function isSecretCategory(cat){
  return cat && cat.startsWith('🔒');
}

function renderCategoryTabs(){
  const cats = getOrderedCategories();
  categoryTabsEl.innerHTML = '';
  categoryTabsEl.style.display = 'flex';

  /* filter: show secret cats only in secret mode, hide them otherwise */
  const visible = cats.filter(function(cat){
    return secretMode ? isSecretCategory(cat) : !isSecretCategory(cat);
  });

  if(visible.length){
    /* always start from first category */
    if(visible.indexOf(currentCategory) === -1){
      currentCategory = visible[0];
      localStorage.setItem(CATEGORY_KEY, currentCategory);
    }
    visible.forEach(function(cat){
      const tab = document.createElement('button');
      tab.className = 'category-tab' + (cat === currentCategory ? ' active' : '');
      tab.textContent = cat;
      tab.addEventListener('click', function(){
        currentCategory = cat;
        localStorage.setItem(CATEGORY_KEY, currentCategory);
        renderCategoryTabs();
        renderBannerLinks();
      });
      categoryTabsEl.appendChild(tab);
    });
  }

  /* subtle add button always at end */
  const addTab = document.createElement('button');
  addTab.className = 'category-tab category-tab-add';
  addTab.textContent = '＋';
  addTab.title = 'リンクを追加';
  addTab.addEventListener('click', function(){ openLinkAdd(); });
  categoryTabsEl.appendChild(addTab);
}

function getFilteredLinks(){
  const cats = getOrderedCategories();
  const visible = cats.filter(function(cat){
    return secretMode ? isSecretCategory(cat) : !isSecretCategory(cat);
  });
  if(!visible.length) return bannerLinks.filter(function(item){
    const cat = (item.category && item.category.trim()) || '未分類';
    return secretMode ? isSecretCategory(cat) : !isSecretCategory(cat);
  });
  return bannerLinks.filter(function(item){
    const cat = (item.category && item.category.trim()) || '未分類';
    return cat === currentCategory;
  });
}

function moveCategory(index, dir){
  const cats = getOrderedCategories();
  const target = index + dir;
  if(target < 0 || target >= cats.length) return;
  const tmp = cats[index];
  cats[index] = cats[target];
  cats[target] = tmp;
  localStorage.setItem(CATEGORY_ORDER_KEY, JSON.stringify(cats));
  renderCategoryOrderList();
  renderCategoryTabs();
  renderBannerLinks();
}

  /* tap = open link / long press = drag */

  card.addEventListener('touchstart', function(e){
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchMoved = false;
    if(dragMode){
      dragSrcId = item.id;
      card.classList.add('dragging');
      return;
    }
    longPressTimer = setTimeout(function(){
      enterDragMode();
      dragSrcId = item.id;
      card.classList.add('dragging');
    }, LONG_PRESS_MS);
  }, {passive:true});

  card.addEventListener('touchmove', function(e){
    const dx = Math.abs(e.touches[0].clientX - touchStartX);
    const dy = Math.abs(e.touches[0].clientY - touchStartY);
    if(dx > 8 || dy > 8) touchMoved = true;
    clearTimeout(longPressTimer);
    if(!dragMode || dragSrcId !== item.id) return;
    e.preventDefault();
    const touch = e.touches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    const target = el && el.closest('.banner-link-card');
    if(target && target.dataset.id && target.dataset.id !== dragSrcId){
      const srcIdx = bannerLinks.findIndex(function(a){ return a.id === dragSrcId; });
      const tgtIdx = bannerLinks.findIndex(function(a){ return a.id === target.dataset.id; });
      if(srcIdx !== -1 && tgtIdx !== -1){
        const tmp = bannerLinks[srcIdx];
        bannerLinks[srcIdx] = bannerLinks[tgtIdx];
        bannerLinks[tgtIdx] = tmp;
        saveBannerLinks();
        renderBannerLinks();
      }
    }
  }, {passive:false});

  card.addEventListener('touchend', function(){
    clearTimeout(longPressTimer);
    if(dragMode && dragSrcId === item.id){
      card.classList.remove('dragging');
      setTimeout(exitDragMode, 400);
      return;
    }
    if(!dragMode && !touchMoved){
      if(item.url){
        if(item.browser === 'external'){
          window.open(item.url, '_blank');
        }else{
          launchApp(item.url);
        }
      }else{
        openLinkEdit(item.id);
      }
    }
  });

  card.addEventListener('touchcancel', function(){
    clearTimeout(longPressTimer);
    touchMoved = false;
    card.classList.remove('dragging');
  });

  return card;
}

async function fetchLinkMeta(url){
  try{
    const res = await fetch('https://api.microlink.io/?url=' + encodeURIComponent(url));
    const json = await res.json();
    if(json && json.status === 'success' && json.data){
      const d = json.data;
      return {
        title: (d.title || '').trim(),
        image: (d.image && d.image.url) || (d.screenshot && d.screenshot.url) || ''
      };
    }
  }catch(e){}
  return null;
}

  thumbStatus.textContent = '取得中...';
  const meta = await fetchLinkMeta(url);

    if(meta.image){
      pickedLinkImage = meta.image;
      showLinkPreview(meta.image);
      thumbStatus.textContent = '✓ 取得成功';
    }else{
      thumbStatus.textContent = '画像なし';
    }
    if(meta.title && !linkTitleInput.value.trim()){
      linkTitleInput.value = meta.title;
    }
  }else{
    thumbStatus.textContent = '取得失敗';
  }
  setTimeout(function(){ thumbStatus.textContent = ''; }, 3000);
}

  const reader = new FileReader();
  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){
      const maxW = 800;
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      pickedLinkImage = canvas.toDataURL('image/jpeg', 0.75);
      showLinkPreview(pickedLinkImage);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

function saveTabs(){

      return { id: t.id, url: t.url, title: t.title, pinned: t.pinned || false };
    });
    localStorage.setItem(TABS_KEY, JSON.stringify({ tabs: data, activeId: activeTabId }));

}

function loadTabsFromStorage(){
  try{
    const raw = localStorage.getItem(TABS_KEY);
    if(!raw) return;
    const data = JSON.parse(raw);
    if(!data || !Array.isArray(data.tabs)) return;
    data.tabs.forEach(function(t){
      if(!t.url) return;
      btabs.push({ id: t.id, url: t.url, title: t.title || '', pinned: t.pinned || false, iframe: null });
    });
    if(btabs.length){
      const restoreId = data.activeId && btabs.find(function(t){ return t.id === data.activeId; }) ? data.activeId : btabs[0].id;
      activeTabId = restoreId;
      /* update URL bar to show last active URL */
      const activeTab = btabs.find(function(t){ return t.id === restoreId; });
      const urlInput = document.getElementById('browserUrlInput');
      if(activeTab && urlInput) urlInput.value = activeTab.url || '';
    }
  }catch(e){}
}

function normalizeUrl(raw){
  raw = raw.trim();
  if(!raw) return '';
  if(!/^https?:\/\//i.test(raw)){
    if(raw.includes('.') && !raw.includes(' ')) raw = 'https://' + raw;
    else return 'https://www.google.com/search?q=' + encodeURIComponent(raw);
  }
  return raw;
}

function renderBrowserTabs(){

    pinBtn.addEventListener('click', function(e){

      tab.pinned = !tab.pinned;
      saveTabs();
      renderBrowserTabs();
    });

    row.appendChild(pinBtn);

      closeBtn.addEventListener('click', function(e){

        closeTab(tab.id);

      });

    }

    row.addEventListener('click', function(){
      switchTab(tab.id);
      browserMenuPanel.style.display = 'none';
      goToSection('browser');
    });

    tabList.appendChild(row);
  });

function showFrame(tab){
  /* hide all iframes */
  btabs.forEach(function(t){
    if(t.iframe) t.iframe.style.display = 'none';
  });
  browserFrameWrap.querySelectorAll('.browser-blocked').forEach(function(el){ el.remove(); });

  if(!tab) return;
  browserUrlInput.value = tab.url || '';

  if(!tab.url){
    /* blank new tab */
    return;
  }
  if(!tab.iframe){
    const iframe = document.createElement('iframe');
    iframe.className = 'browser-iframe';
    iframe.sandbox = 'allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation-by-user-activation allow-presentation';
    iframe.setAttribute('allowfullscreen', '');
    iframe.setAttribute('allow', 'fullscreen; screen-orientation; accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture');
    iframe.src = tab.url;
    iframe.addEventListener('load', function(){
      const t2 = btabs.find(function(t){ return t.id === tab.id; });
      if(!t2 || !t2.url) return;

      /* record history on every page load */
      addHistory(t2.url, t2.title || '');

      /* try same-origin title first */
      try{
        const sameOriginTitle = iframe.contentDocument && iframe.contentDocument.title;
        if(sameOriginTitle){
          t2.title = sameOriginTitle;
          addHistory(t2.url, sameOriginTitle);
          renderBrowserTabs();
          saveTabs();
          return;
        }
      }catch(e){}

      /* cross-origin: use microlink for title */
      if(!t2.title){
        fetchLinkMeta(t2.url).then(function(meta){
          if(meta && meta.title){
            t2.title = meta.title;
            addHistory(t2.url, meta.title);
            renderBrowserTabs();
            saveTabs();
          }
        }).catch(function(){});
      }
    });
    iframe.addEventListener('error', function(){
      showBlocked(tab);
    });
    browserFrameWrap.appendChild(iframe);
    tab.iframe = iframe;
  }else{
    tab.iframe.style.display = '';
  }
}

function showBlocked(tab){
  if(!tab.iframe) return;
  tab.iframe.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'browser-blocked';
  div.innerHTML = '<div class="msg">😢 このサイトはiframe内での表示をブロックしています</div>';
  const extBtn = document.createElement('button');
  extBtn.className = 'ext-btn';
  extBtn.textContent = '🌐 外部ブラウザで開く';
  extBtn.addEventListener('click', function(){ window.open(tab.url, '_blank'); });
  div.appendChild(extBtn);
  browserFrameWrap.appendChild(div);
}

function switchTab(id){
  activeTabId = id;
  const tab = btabs.find(function(t){ return t.id === id; });
  renderBrowserTabs();
  showFrame(tab || null);
  if(typeof updateBookmarkBtn === 'function') updateBookmarkBtn();
  saveTabs();
}

function openNewTab(url){
  const id = 'btab_' + Date.now();
  const tab = { id: id, url: normalizeUrl(url), title: '', iframe: null };
  btabs.push(tab);
  switchTab(id);
  saveTabs();
}

function closeTab(id){
  const idx = btabs.findIndex(function(t){ return t.id === id; });
  if(idx === -1) return;
  const tab = btabs[idx];
  if(tab.pinned) return;
  if(tab.iframe) tab.iframe.remove();
  btabs.splice(idx, 1);
  saveTabs();
  if(btabs.length === 0){
    activeTabId = null;
    renderBrowserTabs();
    browserFrameWrap.innerHTML = '';
    browserUrlInput.value = '';
    goToSection('home');
  }else{
    const next = btabs[Math.min(idx, btabs.length - 1)];
    switchTab(next.id);
  }
}

function browserNavigate(url){
  url = normalizeUrl(url);
  if(!url) return;
  if(!activeTabId){
    openNewTab(url);
    return;
  }
  const tab = btabs.find(function(t){ return t.id === activeTabId; });
  if(!tab) return;
  tab.url = url;
  tab.title = '';
  if(tab.iframe){ tab.iframe.remove(); tab.iframe = null; }
  browserFrameWrap.querySelectorAll('.browser-blocked').forEach(function(el){ el.remove(); });
  renderBrowserTabs();
  showFrame(tab);
  addHistory(url, '');
  saveTabs();
  /* try to update history title after load */
  setTimeout(function(){
    if(tab.title) addHistory(url, tab.title);
  }, 3000);
}

    toggleFavorite({ link: tab.url, title: tab.title || tab.url, pubDate: new Date().toISOString(), source: '' });
    updateBookmarkBtn();
    return;

const HISTORY_KEY = 'launcherBrowserHistory';
const HISTORY_MAX = 200;

function loadHistory(){
  const raw = localStorage.getItem(HISTORY_KEY);
  if(!raw) return [];
  try{ const a = JSON.parse(raw); return Array.isArray(a) ? a : []; }catch(e){ return []; }
}
function saveHistory(items){
  try{ localStorage.setItem(HISTORY_KEY, JSON.stringify(items)); }catch(e){}
}
function addHistory(url, title){
  if(!url) return;
  let items = loadHistory();
  /* remove duplicate */
  items = items.filter(function(h){ return h.url !== url; });
  items.unshift({ url: url, title: title || url, visitedAt: new Date().toISOString() });
  if(items.length > HISTORY_MAX) items = items.slice(0, HISTORY_MAX);
  saveHistory(items);
}

function switchBmTab(tab){
  currentBmTab = tab;
  document.querySelectorAll('.bm-tab').forEach(function(b){
    b.classList.toggle('active', b.dataset.bm === tab);
  });
  bmFavList.style.display = tab === 'fav' ? '' : 'none';
  document.getElementById('bmLaterList').style.display = tab === 'later' ? '' : 'none';
  document.getElementById('bmHistoryList').style.display = tab === 'history' ? '' : 'none';
  /* always re-render to pick up latest data */
  if(tab === 'fav') renderBmFavs();
  else if(tab === 'later') renderBmLater();
  else if(tab === 'history') renderBmHistory();
}

function renderBmHistory(){
  const list = document.getElementById('bmHistoryList');

  /* clear button at top */
  const clearRow = document.createElement('div');
  clearRow.style.cssText = 'display:flex;justify-content:flex-end;padding:8px 16px;';
  const clearBtn = document.createElement('button');

  clearBtn.style.cssText = 'background:none;border:none;color:var(--sub);font-size:12px;';
  clearBtn.addEventListener('click', function(){
    localStorage.removeItem(HISTORY_KEY);
    renderBmHistory();
  });
  clearRow.appendChild(clearBtn);
  list.appendChild(clearRow);

  const items = loadHistory();
  if(!items.length){

    empty.textContent = '履歴はまだありません';
    list.appendChild(empty);
    return;
  }

  let lastDate = '';
  items.forEach(function(item){
    /* date separator */
    const d = new Date(item.visitedAt);
    const dateStr = isNaN(d) ? '' : d.toLocaleDateString('ja-JP', {month:'numeric', day:'numeric', weekday:'short'});
    if(dateStr && dateStr !== lastDate){
      lastDate = dateStr;
      const sep = document.createElement('div');

    const row = makeBmRow(item.title, item.url, function(){
      const updated = loadHistory().filter(function(h){ return h.url !== item.url; });
      saveHistory(updated); renderBmHistory();
    }, true /* showExternal */);
    list.appendChild(row);
  });
}

/* ---- section swipe navigation ---- */
(function(){
  const SECTIONS = ['browser', 'home', 'feed'];
  const THRESHOLD = 60;
  const MAX_TIME = 400;
  let sx = 0, sy = 0, st = 0;

  const pageHome = document.getElementById('pageHome');

  pageHome.addEventListener('touchstart', function(e){
    if(e.touches.length !== 1) return;
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    st = Date.now();
  }, {passive:true});

  pageHome.addEventListener('touchend', function(e){
    if(currentSection === 'browser') return;
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    const dt = Date.now() - st;
    if(Math.abs(dx) < THRESHOLD || Math.abs(dy) > Math.abs(dx) * 0.8 || dt > MAX_TIME) return;
    const idx = SECTIONS.indexOf(currentSection);
    if(dx > 0 && idx > 0){
      /* swipe right → go left in array (browser) */
      goToSection(SECTIONS[idx - 1]);
    }else if(dx < 0 && idx < SECTIONS.length - 1){
      /* swipe left → go right in array (feed) */
      goToSection(SECTIONS[idx + 1]);
    }
  }, {passive:true});
})();

function weatherEmoji(code){
  if(code === 0) return {icon:'☀️', text:'晴れ'};
  if(code === 1 || code === 2) return {icon:'🌤️', text:'晴れ時々曇り'};
  if(code === 3) return {icon:'☁️', text:'曇り'};
  if(code === 45 || code === 48) return {icon:'🌫️', text:'霧'};
  if(code >= 51 && code <= 57) return {icon:'🌦️', text:'霧雨'};
  if(code >= 61 && code <= 65) return {icon:'🌧️', text:'雨'};
  if(code === 66 || code === 67) return {icon:'🌧️', text:'凍雨'};
  if(code >= 71 && code <= 77) return {icon:'🌨️', text:'雪'};
  if(code === 80 || code === 81 || code === 82) return {icon:'🌧️', text:'にわか雨'};
  if(code === 85 || code === 86) return {icon:'🌨️', text:'にわか雪'};
  if(code >= 95) return {icon:'⛈️', text:'雷雨'};
  return {icon:'🌡️', text:''};
}

/* in-browser floating clock (draggable + resizable) */
(function(){
  const browserPanelEl = document.getElementById('secBrowser');
  if(!browserPanelEl) return;

  const CLOCK_POS_KEY = 'launcherBrowserClockPos';
  const defaultPos = { top: 96, right: 10, fontSize: 11 };

  function loadClockPos(){
    try{
      const raw = localStorage.getItem(CLOCK_POS_KEY);
      if(raw) return Object.assign({}, defaultPos, JSON.parse(raw));
    }catch(e){}
    return Object.assign({}, defaultPos);
  }
  function saveClockPos(pos){
    try{ localStorage.setItem(CLOCK_POS_KEY, JSON.stringify(pos)); }catch(e){}
  }

  let pos = loadClockPos();

  const clk = document.createElement('div');
  clk.className = 'browser-clock';
  clk.id = 'browserClock';

  const resizeHandle = document.createElement('div');
  resizeHandle.className = 'browser-clock-resize';
  clk.appendChild(resizeHandle);

  browserPanelEl.appendChild(clk);

  function applyPos(){
    clk.style.top = (pos.top) + 'px';
    clk.style.left = pos.left !== undefined ? pos.left + 'px' : '';
    clk.style.right = pos.left !== undefined ? '' : pos.right + 'px';
    clk.style.fontSize = pos.fontSize + 'px';
  }
  applyPos();

  function updateBrowserClock(){
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    /* keep resize handle as last child; set text via a span */
    if(!clk.querySelector('.clock-text')){
      const span = document.createElement('span');
      span.className = 'clock-text';
      clk.insertBefore(span, resizeHandle);
    }
    clk.querySelector('.clock-text').textContent = hh + ':' + mm;
  }
  updateBrowserClock();
  setInterval(updateBrowserClock, 1000 * 15);

  /* drag logic */
  let dragging = false, dragStartX = 0, dragStartY = 0, startTop = 0, startLeft = 0;

  clk.addEventListener('pointerdown', function(e){
    if(e.target === resizeHandle) return;
    dragging = true;
    clk.setPointerCapture(e.pointerId);
    clk.style.cursor = 'grabbing';
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    const rect = clk.getBoundingClientRect();
    const parentRect = browserPanelEl.getBoundingClientRect();
    startTop = rect.top - parentRect.top;
    startLeft = rect.left - parentRect.left;
  });
  clk.addEventListener('pointermove', function(e){
    if(!dragging) return;
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    pos.top = Math.max(0, startTop + dy);
    pos.left = Math.max(0, startLeft + dx);
    delete pos.right;
    applyPos();
  });
  clk.addEventListener('pointerup', function(e){
    if(!dragging) return;
    dragging = false;
    clk.style.cursor = 'grab';
    saveClockPos(pos);
  });

  /* resize logic */
  let resizing = false, resizeStartX = 0, startFontSize = 11;
  resizeHandle.addEventListener('pointerdown', function(e){
    e.stopPropagation();
    resizing = true;
    resizeHandle.setPointerCapture(e.pointerId);
    resizeStartX = e.clientX;
    startFontSize = pos.fontSize;
  });
  resizeHandle.addEventListener('pointermove', function(e){
    if(!resizing) return;
    e.stopPropagation();
    const dx = e.clientX - resizeStartX;
    pos.fontSize = Math.max(9, Math.min(40, startFontSize + dx * 0.3));
    applyPos();
  });
  resizeHandle.addEventListener('pointerup', function(e){
    if(!resizing) return;
    resizing = false;
    saveClockPos(pos);
  });
})();

function applyBackground(){

    document.body.style.backgroundSize = 'cover';
    document.body.style.backgroundPosition = 'center';

bgFile.addEventListener('change', function(){
  const file = bgFile.files[0];
  bgFile.value = '';
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){
      const maxW = 1080;
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
      try{
        localStorage.setItem(BG_KEY, dataUrl);
        applyBackground();
      }catch(e){
        alert('画像の保存に失敗しました(サイズが大きすぎるかも)');
      }
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});
