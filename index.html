  applyBackground();
});

/* ---- feed ---- */
const feedList = document.getElementById('feedList');
const favoritesList = document.getElementById('favoritesList');
const FAVORITES_KEY = 'launcherFavorites';

function loadFavorites(){
  const raw = localStorage.getItem(FAVORITES_KEY);
  if(!raw) return [];
  try{
    const arr = JSON.parse(raw);
    if(Array.isArray(arr)) return arr;
  }catch(e){}
  return [];
}
function saveFavorites(favs){
  localStorage.setItem(FAVORITES_KEY, JSON.stringify(favs));
}
function isFavorited(link){
  return loadFavorites().some(function(f){ return f.link === link; });
}
function toggleFavorite(item){
  let favs = loadFavorites();
  if(favs.some(function(f){ return f.link === item.link; })){
    favs = favs.filter(function(f){ return f.link !== item.link; });
  }else{
    favs.unshift({
      link: item.link,
      title: item.title || '',
      pubDate: item.pubDate || '',
      source: (item.source && item.source.name) || item.author || ''
    });
  }
  saveFavorites(favs);
  renderFavorites();
}

function renderFavorites(){
  const favs = loadFavorites();
  favoritesList.innerHTML = '';
  if(!favs.length){
    const empty = document.createElement('div');
    empty.className = 'feed-empty';
    empty.textContent = 'お気に入りはまだありません';
    favoritesList.appendChild(empty);
    return;
  }
  favs.forEach(function(item){
    const card = document.createElement('div');
    card.className = 'feed-card';

    const link = document.createElement('a');
    link.className = 'feed-link';
    link.href = item.link;
    link.target = '_blank';
    link.rel = 'noopener';

    const icon = document.createElement('div');
    icon.className = 'feed-icon';
    icon.textContent = item.source ? item.source.trim().charAt(0) : '⭐';

    const title = document.createElement('div');
    title.className = 'feed-card-title';
    title.textContent = item.title || '';

    link.appendChild(icon);
    link.appendChild(title);

    const metaRow = document.createElement('div');
    metaRow.className = 'feed-meta-row';

    const meta = document.createElement('div');
    meta.className = 'feed-meta';
    const date = formatRelative(item.pubDate);
    meta.textContent = [item.source, date].filter(Boolean).join(' ・ ');

    const removeBtn = document.createElement('button');
    removeBtn.className = 'feed-share';
    removeBtn.title = '削除';
    removeBtn.textContent = '🗑️';
    removeBtn.addEventListener('click', function(e){
      e.preventDefault();
      e.stopPropagation();
      toggleFavorite(item);
    });

    const shareBtn = document.createElement('button');
    shareBtn.className = 'feed-share';
    shareBtn.title = '共有';
    shareBtn.textContent = '🔗';
    shareBtn.addEventListener('click', function(e){
      e.preventDefault();
      e.stopPropagation();
      if(navigator.share){
        navigator.share({title: item.title || '', url: item.link}).catch(function(){});
      }else{
        window.open(item.link, '_blank');
      }
    });

    metaRow.appendChild(meta);
    metaRow.appendChild(removeBtn);
    metaRow.appendChild(shareBtn);

    card.appendChild(link);
    card.appendChild(metaRow);
    favoritesList.appendChild(card);
  });
}
renderFavorites();

/* ---- read-later ---- */
const READ_LATER_KEY = 'launcherReadLater';
const readLaterList = document.getElementById('readLaterList');
const readLaterInput = document.getElementById('readLaterInput');

function loadReadLater(){
  const raw = localStorage.getItem(READ_LATER_KEY);
  if(!raw) return [];
  try{ const a = JSON.parse(raw); return Array.isArray(a) ? a : []; }catch(e){ return []; }
}
function saveReadLater(items){
  try{ localStorage.setItem(READ_LATER_KEY, JSON.stringify(items)); }catch(e){}
}

function renderReadLater(){
  readLaterList.innerHTML = '';
  const items = loadReadLater();
  if(!items.length){
    const empty = document.createElement('div');
    empty.className = 'feed-empty';
    empty.textContent = 'あとで読むURLはまだありません';
    readLaterList.appendChild(empty);
    return;
  }
  items.forEach(function(item){
    const card = document.createElement('div');
    card.className = 'feed-card';

    const link = document.createElement('a');
    link.className = 'feed-link';
    link.href = item.url;
    link.target = '_blank';
    link.rel = 'noopener';

    const icon = document.createElement('div');
    icon.className = 'feed-icon';
    try{ icon.textContent = new URL(item.url).hostname.charAt(0).toUpperCase(); }
    catch(e){ icon.textContent = '🔗'; }

    const title = document.createElement('div');
    title.className = 'feed-card-title';
    title.textContent = item.title || item.url;

    link.appendChild(icon);
    link.appendChild(title);

    const metaRow = document.createElement('div');
    metaRow.className = 'feed-meta-row';

    const meta = document.createElement('div');
    meta.className = 'feed-meta';
    meta.textContent = formatRelative(item.savedAt);

    const removeBtn = document.createElement('button');
    removeBtn.className = 'feed-share';
    removeBtn.textContent = '🗑️';
    removeBtn.title = '削除';
    removeBtn.addEventListener('click', function(e){
      e.preventDefault(); e.stopPropagation();
      const updated = loadReadLater().filter(function(r){ return r.url !== item.url; });
      saveReadLater(updated); renderReadLater();
    });

    const shareBtn = document.createElement('button');
    shareBtn.className = 'feed-share';
    shareBtn.textContent = '🔗';
    shareBtn.addEventListener('click', function(e){
      e.preventDefault(); e.stopPropagation();
      if(navigator.share){ navigator.share({url: item.url}).catch(function(){}); }
      else{ window.open(item.url, '_blank'); }
    });

    metaRow.appendChild(meta);
    metaRow.appendChild(removeBtn);
    metaRow.appendChild(shareBtn);
    card.appendChild(link);
    card.appendChild(metaRow);
    readLaterList.appendChild(card);
  });
}

async function addReadLater(url){
  if(!url) return;
  try{ new URL(url); }catch(e){ return; }
  const items = loadReadLater();
  if(items.some(function(r){ return r.url === url; })) return;
  const entry = { url: url, title: '', savedAt: new Date().toISOString() };
  items.unshift(entry);
  saveReadLater(items);
  renderReadLater();
  readLaterInput.value = '';
  const meta = await fetchLinkMeta(url).catch(function(){ return null; });
  if(meta && meta.title){
    const updated = loadReadLater();
    const found = updated.find(function(r){ return r.url === url; });
    if(found){ found.title = meta.title; saveReadLater(updated); renderReadLater(); }
  }
}

document.getElementById('readLaterBtn').addEventListener('click', function(){
  addReadLater(readLaterInput.value.trim());
});
readLaterInput.addEventListener('keydown', function(e){
  if(e.key === 'Enter'){ addReadLater(readLaterInput.value.trim()); }
});
renderReadLater();

function formatRelative(pubDate){
  const d = new Date(pubDate);
  if(isNaN(d.getTime())) return '';
  const diffMs = Date.now() - d.getTime();
  const diffH = Math.floor(diffMs / 3600000);
  if(diffH < 1) return '1時間以内';
  if(diffH < 24) return diffH + '時間前';
  return Math.floor(diffH / 24) + '日前';
}

/* ---- feed thumbnail cache ---- */
const THUMB_CACHE_KEY = 'launcherThumbCache';
const THUMB_CACHE_MAX = 200;

function loadThumbCache(){
  try{
    const raw = localStorage.getItem(THUMB_CACHE_KEY);
    return raw ? JSON.parse(raw) : {};
  }catch(e){ return {}; }
}
function saveThumbCache(cache){
  try{
    const keys = Object.keys(cache);
    if(keys.length > THUMB_CACHE_MAX){
      const trimmed = {};
      keys.slice(-THUMB_CACHE_MAX).forEach(function(k){ trimmed[k] = cache[k]; });
      localStorage.setItem(THUMB_CACHE_KEY, JSON.stringify(trimmed));
    }else{
      localStorage.setItem(THUMB_CACHE_KEY, JSON.stringify(cache));
    }
  }catch(e){}
}

let thumbCache = loadThumbCache();

async function fetchAndApplyThumb(link, imgEl, iconEl){
  if(thumbCache[link] !== undefined){
    if(thumbCache[link]){
      imgEl.src = thumbCache[link];
      imgEl.style.display = 'block';
      if(iconEl) iconEl.style.display = 'none';
    }
    return;
  }
  try{
    const res = await fetch('https://api.microlink.io/?url=' + encodeURIComponent(link));
    const json = await res.json();
    if(json && json.status === 'success' && json.data){
      const d = json.data;
      const imageUrl = (d.image && d.image.url) || '';
      thumbCache[link] = imageUrl;
      saveThumbCache(thumbCache);
      if(imageUrl){
        imgEl.src = imageUrl;
        imgEl.style.display = 'block';
        if(iconEl) iconEl.style.display = 'none';
      }
    }else{
      thumbCache[link] = '';
      saveThumbCache(thumbCache);
    }
  }catch(e){
    thumbCache[link] = '';
  }
}

function renderFeed(items){
  feedList.innerHTML = '';
  if(!items || !items.length){
    const empty = document.createElement('div');
    empty.className = 'feed-empty';
    empty.textContent = 'フィードを取得できませんでした';
    feedList.appendChild(empty);
    return;
  }

  const observer = new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if(!entry.isIntersecting) return;
      observer.unobserve(entry.target);
      const link = entry.target.dataset.link;
      const imgEl = entry.target.querySelector('.feed-thumb-img');
      const iconEl = entry.target.querySelector('.feed-icon');
      if(link && imgEl) fetchAndApplyThumb(link, imgEl, iconEl);
    });
  }, {rootMargin:'200px'});

  items.slice(0, 40).forEach(function(item){
    const card = document.createElement('div');
    card.className = 'feed-card';
    card.dataset.link = item.link;

    /* thumbnail area (hidden until loaded) */
    const thumbImg = document.createElement('img');
    thumbImg.className = 'feed-thumb-img';
    thumbImg.alt = '';
    thumbImg.style.display = 'none';
    thumbImg.onerror = function(){ this.style.display='none'; };
    card.appendChild(thumbImg);

    const linkEl = document.createElement('a');
    linkEl.className = 'feed-link';
    linkEl.href = item.link;
    linkEl.target = '_blank';
    linkEl.rel = 'noopener';

    const icon = document.createElement('div');
    icon.className = 'feed-icon';
    const srcName = (item.source && item.source.name) || item.author || '';
    icon.textContent = srcName ? srcName.trim().charAt(0) : '📰';

    const title = document.createElement('div');
    title.className = 'feed-card-title';
    title.textContent = item.title || '';

    linkEl.appendChild(icon);
    linkEl.appendChild(title);

    const metaRow = document.createElement('div');
    metaRow.className = 'feed-meta-row';

    const meta = document.createElement('div');
    meta.className = 'feed-meta';
    const src = (item.source && item.source.name) || item.author || '';
    const date = formatRelative(item.pubDate);
    meta.textContent = [src, date].filter(Boolean).join(' ・ ');

    const favBtn = document.createElement('button');
    favBtn.className = 'feed-share';
    favBtn.title = 'お気に入り';
    favBtn.textContent = isFavorited(item.link) ? '⭐' : '☆';
    favBtn.addEventListener('click', function(e){
      e.preventDefault();
      e.stopPropagation();
      toggleFavorite(item);
      favBtn.textContent = isFavorited(item.link) ? '⭐' : '☆';
    });

    const shareBtn = document.createElement('button');
    shareBtn.className = 'feed-share';
    shareBtn.textContent = '🔗';
    shareBtn.title = '共有';
    shareBtn.addEventListener('click', function(e){
      e.preventDefault();
      e.stopPropagation();
      if(navigator.share){
        navigator.share({title: item.title || '', url: item.link}).catch(function(){});
      }else{
        window.open(item.link, '_blank');
      }
    });

    metaRow.appendChild(meta);
    metaRow.appendChild(favBtn);
    metaRow.appendChild(shareBtn);

    card.appendChild(linkEl);
    card.appendChild(metaRow);
    feedList.appendChild(card);

    /* lazy observe for thumbnail */
    observer.observe(card);
  });
}

function getSavedFeeds(){
  const raw = localStorage.getItem(FEED_KEY);
  if(!raw) return DEFAULT_FEEDS.slice();
  try{
    const arr = JSON.parse(raw);
    if(Array.isArray(arr) && arr.length) return arr;
  }catch(e){
    // legacy: previously stored as a plain URL string
    if(raw.indexOf('http') === 0) return [raw];
  }
  return DEFAULT_FEEDS.slice();
}

function parseFeedXML(text, fallbackSourceName){
  let doc;
  try{
    doc = new DOMParser().parseFromString(text, 'text/xml');
  }catch(e){
    return [];
  }
  if(!doc || doc.querySelector('parsererror')) return [];

  let items = Array.from(doc.querySelectorAll('item'));
  if(!items.length){
    items = Array.from(doc.querySelectorAll('entry'));
  }

  const channelTitleEl = doc.querySelector('channel > title') || doc.querySelector('feed > title');
  const sourceName = channelTitleEl ? channelTitleEl.textContent.trim() : (fallbackSourceName || '');

  function getText(el, tag){
    const node = el.querySelector(tag);
    return node ? node.textContent.trim() : '';
  }
  function getLink(el){
    const linkEls = el.querySelectorAll('link');
    for(let i = 0; i < linkEls.length; i++){
      const href = linkEls[i].getAttribute('href');
      if(href) return href;
      const txt = linkEls[i].textContent && linkEls[i].textContent.trim();
      if(txt) return txt;
    }
    const guid = el.querySelector('guid');
    if(guid && guid.textContent) return guid.textContent.trim();
    return '';
  }

  return items.map(function(el){
    const pubDate = getText(el, 'pubDate') || getText(el, 'published') || getText(el, 'updated') || getText(el, 'date');
    return {
      title: getText(el, 'title'),
      link: getLink(el),
      pubDate: pubDate,
      source: {name: sourceName}
    };
  }).filter(function(it){ return it.title && it.link; });
}

function fetchWithTimeout(url, ms, isJSON){
  return Promise.race([
    fetch(url).then(function(r){
      if(!r.ok) throw new Error('http ' + r.status);
      return isJSON ? r.json() : r.text();
    }),
    new Promise(function(resolve, reject){
      setTimeout(function(){ reject(new Error('timeout')); }, ms);
    })
  ]);
}

function fetchFeedItems(url){
  const attempts = [
    {proxy: 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url), json: false},
    {proxy: 'https://corsproxy.io/?url=' + encodeURIComponent(url), json: false},
    {proxy: 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(url), json: true}
  ];
  function tryAttempt(i){
    if(i >= attempts.length) return [];
    const a = attempts[i];
    return fetchWithTimeout(a.proxy, 8000, a.json).then(function(data){
      const items = a.json ? (data.items || []) : parseFeedXML(data);
      if(!items.length) throw new Error('empty');
      return items;
    }).catch(function(){
      return tryAttempt(i + 1);
    });
  }
  return tryAttempt(0);
}

function loadFeed(){
  const feeds = getSavedFeeds();
  feedList.innerHTML = '<div class="feed-empty">読み込み中...</div>';
  const requests = feeds.map(function(url){
    return fetchFeedItems(url);
  });
  const allDone = Promise.all(requests).then(function(results){
    let all = [];
    results.forEach(function(items){ all = all.concat(items); });
    all.sort(function(a, b){
      return new Date(b.pubDate) - new Date(a.pubDate);
    });
    return all;
  });
  const hardTimeout = new Promise(function(resolve){
    setTimeout(function(){ resolve(null); }, 25000);
  });
  Promise.race([allDone, hardTimeout]).then(function(all){
    renderFeed(all || []);
  }).catch(function(){
    renderFeed([]);
  });
}
loadFeed();

/* ---- refresh button ---- */
document.getElementById('refreshBtn').addEventListener('click', function(){
  if('serviceWorker' in navigator && 'caches' in window){
    Promise.all([
      navigator.serviceWorker.getRegistrations().then(function(regs){
        return Promise.all(regs.map(function(r){ return r.update(); }));
      }),
      caches.keys().then(function(keys){
        return Promise.all(keys.map(function(k){ return caches.delete(k); }));
      })
    ]).then(function(){
      location.reload();
    }).catch(function(){
      location.reload();
    });
  }else{
    location.reload();
  }
});

/* ---- pull to refresh ---- */
(function(){
  const pageHome = document.getElementById('pageHome');
  const ptr = document.getElementById('ptrIndicator');
  const THRESHOLD = 70;
  let startY = 0, pulling = false, triggered = false;

  function doRefresh(){
    ptr.textContent = '🔄';
    ptr.classList.add('spinning');
    setTimeout(function(){
      if('serviceWorker' in navigator && 'caches' in window){
        Promise.all([
          navigator.serviceWorker.getRegistrations().then(function(regs){
            return Promise.all(regs.map(function(r){ return r.update(); }));
          }),
          caches.keys().then(function(keys){
            return Promise.all(keys.map(function(k){ return caches.delete(k); }));
          })
        ]).then(function(){ location.reload(); })
          .catch(function(){ location.reload(); });
      }else{
        location.reload();
      }
    }, 600);
  }

  pageHome.addEventListener('touchstart', function(e){
    if(pageHome.scrollTop === 0 && e.touches.length === 1){
      startY = e.touches[0].clientY;
      pulling = true;
      triggered = false;
    }
  }, {passive:true});

  pageHome.addEventListener('touchmove', function(e){
    if(!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if(dy <= 0){ pulling = false; return; }
    if(dy > 10) ptr.classList.add('visible');
    if(dy >= THRESHOLD && !triggered){
      ptr.textContent = '✓';
    }else if(dy < THRESHOLD){
      ptr.textContent = '↓';
    }
  }, {passive:true});

  pageHome.addEventListener('touchend', function(e){
    if(!pulling) return;
    pulling = false;
    const dy = (e.changedTouches[0] ? e.changedTouches[0].clientY : startY) - startY;
    if(dy >= THRESHOLD){
      triggered = true;
      doRefresh();
    }else{
      ptr.classList.remove('visible');
      ptr.textContent = '↓';
    }
  });
})();

/* ---- settings: backup / restore ---- */
const settingsOverlay = document.getElementById('settingsOverlay');
const feedUrlInput = document.getElementById('feedUrlInput');
const feedChecks = document.getElementById('feedChecks');

FEED_PRESETS.forEach(function(preset, i){
  const label = document.createElement('label');
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.value = preset.url;
  cb.id = 'feedCheck_' + i;
  const span = document.createElement('span');
  span.textContent = preset.label;
  label.appendChild(cb);
  label.appendChild(span);
  feedChecks.appendChild(label);
});

document.getElementById('settingsBtn').addEventListener('click', function(){
  const saved = getSavedFeeds();
  let customUrl = '';
  const checks = feedChecks.querySelectorAll('input[type=checkbox]');
  checks.forEach(function(cb){
    cb.checked = saved.indexOf(cb.value) !== -1;
  });
  saved.forEach(function(url){
    const isPreset = FEED_PRESETS.some(function(p){ return p.url === url; });
    if(!isPreset) customUrl = url;
  });
  feedUrlInput.value = customUrl;
  renderCategoryOrderList();
  updateStorageUsage();
  settingsOverlay.classList.add('show');
});
document.getElementById('settingsCloseBtn').addEventListener('click', function(){
  settingsOverlay.classList.remove('show');
});

document.getElementById('feedRefreshBtn').addEventListener('click', function(){
  loadFeed();
});

document.getElementById('saveFeedBtn').addEventListener('click', function(){
  const selected = [];
  const checks = feedChecks.querySelectorAll('input[type=checkbox]');
  checks.forEach(function(cb){
    if(cb.checked) selected.push(cb.value);
  });
  const custom = feedUrlInput.value.trim();
  if(custom) selected.push(custom);

  if(!selected.length){
    localStorage.removeItem(FEED_KEY);
  }else{
    localStorage.setItem(FEED_KEY, JSON.stringify(selected));
  }
  loadFeed();
  settingsOverlay.classList.remove('show');
});

document.getElementById('exportBtn').addEventListener('click', function(){
  const data = {};
  for(let i = 0; i < localStorage.length; i++){
    const key = localStorage.key(i);
    data[key] = localStorage.getItem(key);
  }
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'launcher-backup.json';
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
});

document.getElementById('importFile').addEventListener('change', function(){
  const file = this.files[0];
  this.value = '';
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    try{
      const data = JSON.parse(ev.target.result);

      // legacy format: a plain array was the old "apps" export
      if(Array.isArray(data)){
        apps = data;
        saveApps(apps);
        renderGrid();
        settingsOverlay.classList.remove('show');
        alert('設定を読み込みました');
        return;
      }

      if(typeof data !== 'object' || data === null) throw new Error('invalid');

      let failedKeys = [];
      Object.keys(data).forEach(function(key){
        try{
          localStorage.setItem(key, data[key]);
        }catch(e){
          failedKeys.push(key);
        }
      });

      // reload everything from storage
      apps = loadApps();
      bannerLinks = loadBannerLinks();
      renderGrid();
      renderCategoryTabs();
      renderBannerLinks();
      renderFavorites();
      applyBackground();
      applyTheme();
      loadFeed();

      settingsOverlay.classList.remove('show');
      if(failedKeys.length){
        alert('一部のデータは容量不足のため復元できませんでした: ' + failedKeys.join(', '));
      }else{
        alert('バックアップから復元しました');
      }
    }catch(err){
      alert('読み込みに失敗しました。正しいバックアップファイルか確認してね');
    }
  };
  reader.readAsText(file);
});

function getStorageUsage(){
  let total = 0;
  for(let i = 0; i < localStorage.length; i++){
    const key = localStorage.key(i);
    const val = localStorage.getItem(key) || '';
    total += key.length + val.length;
  }
  return total;
}

function updateStorageUsage(){
  const bytes = getStorageUsage();
  const kb = (bytes / 1024).toFixed(0);
  const el = document.getElementById('storageUsage');
  if(el) el.textContent = '使用容量: 約 ' + kb + ' KB(目安上限 5,000〜10,000 KB)';
}

/* service worker */
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
